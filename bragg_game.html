<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Bragg Racing</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111;display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;touch-action:none;font-family:'Press Start 2P',monospace;}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

/* ── TIP MODAL ── */
#tipModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);
  z-index:999;align-items:center;justify-content:center;}
#tipModal.active{display:flex;}
.tip-card{background:#1a1a2e;border-radius:18px;padding:28px 24px;max-width:320px;
  width:88%;text-align:center;border:1px solid rgba(255,215,0,0.3);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  animation:tipUp 0.35s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes tipUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.tip-emoji{font-size:48px;display:block;margin-bottom:10px;}
.tip-card h3{font-family:'Press Start 2P',monospace;font-size:13px;color:#ffd700;margin-bottom:10px;}
.tip-card p{font-family:'Press Start 2P',monospace;font-size:7px;color:#ccc;
  line-height:1.8;margin-bottom:20px;}
.tip-btn{display:block;background:#3D95CE;color:#fff;padding:12px;border-radius:20px;
  font-family:'Press Start 2P',monospace;font-size:8px;text-decoration:none;
  margin-bottom:10px;box-shadow:0 4px 14px rgba(61,149,206,0.4);}
.tip-btn:hover{background:#2f80b5;}
.tip-dismiss{background:transparent;border:none;color:#888;font-size:9px;
  cursor:pointer;font-family:'Press Start 2P',monospace;padding:4px;}
.tip-dismiss:hover{color:#fff;}
</style>
</head>

<canvas id="c"></canvas>

// ── CANVAS ──
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=360;
canvas.width=W;canvas.height=H;
function resize(){const s=Math.min(window.innerWidth/W,window.innerHeight/H);canvas.style.width=(W*s)+'px';canvas.style.height=(H*s)+'px';}
resize();window.addEventListener('resize',resize);

// ── ROUNDED RECT ──
function rr(x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill!==false)ctx.fill();if(stroke)ctx.stroke();
}

// ── DRAW IMAGE HELPER ──
function di(k,x,y,w,h,flip){
  const img=IMG[k];
  if(!img||!img.complete||!img.naturalWidth)return;
  try{
    ctx.save();
    if(flip){ctx.translate(x+w,y);ctx.scale(-1,1);ctx.drawImage(img,0,0,w,h);}
    else ctx.drawImage(img,x,y,w,h);
    ctx.restore();
  }catch(e){}
}

// ── AUDIO ──
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v,t){v=v||0.25;t=t||'square';const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function sfxJump(){beep(380,0.05,0.18,'sine');setTimeout(()=>beep(560,0.07,0.13,'sine'),45);}
function sfxHurt(){beep(180,0.1,0.28,'sawtooth');setTimeout(()=>beep(130,0.14,0.22,'sawtooth'),95);}
function sfxPow(){[580,700,820,1020].forEach((f,i)=>setTimeout(()=>beep(f,0.08,0.18,'sine'),i*55));}
function sfxWin(){[523,659,784,1047,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.18,0.22,'sine'),i*110));}

const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code])return; keys[e.code]=true;
  if(GS.state==='playing'&&(e.code==='Space'||e.code==='ArrowUp')){AC.resume();jump();}
  if(GS.state==='win') handleNameKey(e);
  if(GS.state==='title'&&e.code==='Enter'&&GS.lbOK) GS.state='charselect';
  if(GS.state==='charselect'){
    if(e.code==='ArrowLeft'||e.code==='KeyA') GS.char='jackie';
    if(e.code==='ArrowRight'||e.code==='KeyD') GS.char='dizzle';
    if(e.code==='Enter'||e.code==='Space') startGame();
  }
  if((GS.state==='dead'||GS.state==='leaderboard')&&e.code==='Enter') restartGame();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

const _touches={};
function cXY(t){const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)*(W/r.width),y:(t.clientY-r.top)*(H/r.height)};}
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();AC.resume();
  for(const t of e.changedTouches){
    const p=cXY(t);_touches[t.identifier]={...p,side:null};
    if(GS.state==='playing'){
      // JUMP: top-left button (x<120, y<95)
      if(p.x<120&&p.y>30&&p.y<95){_touches[t.identifier].side='J';jump();}
      // LEFT: bottom-left (x<120, y>220)
      else if(p.x<120&&p.y>220){_touches[t.identifier].side='L';}
      // RIGHT: right edge (x>520)
      else if(p.x>520){_touches[t.identifier].side='R';}
      // anywhere else = jump
      else{_touches[t.identifier].side='J';jump();}
    }else{
      uiTouch(p.x,p.y);
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches)delete _touches[t.identifier];},{passive:false});
canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  uiTouch((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
  AC.resume();
});
const goL=()=>Object.values(_touches).some(t=>t.side==='L');
const goR=()=>Object.values(_touches).some(t=>t.side==='R');

function jump(){
  if(GS.state!=='playing')return;
  sfxJump();
  if(player.onGround){player.vy=-11;player.onGround=false;}
  else if(player.dblJump&&!player.usedDbl){player.vy=-10;player.usedDbl=true;}
}

// ── PHYSICS ──
function updatePlayer(){
  const spd=player.inMud?1.9:(boost&&boost.type==='bouquet'?5.8:3.9);
  const rgt=keys['ArrowRight']||keys['KeyD']||goR();
  const lft=keys['ArrowLeft']||keys['KeyA']||goL();
  if(rgt){player.vx=spd;player.right=true;}
  else if(lft){player.vx=-spd;player.right=false;}
  else player.vx*=0.7;
  if(player.x<10){player.vx=0;player.x=10;}
  player.vy=Math.min(player.vy+0.46,16);
  player.x+=player.vx;player.y+=player.vy;
  player.onGround=false;player.inMud=false;

  // Ground collision
  const cx=player.x+player.w/2;
  const inGap=gaps.some(g=>cx>g[0]&&cx<g[1]);
  const bootOn=boost&&boost.type==='boot';
  if(!inGap){
    if(player.y+player.h>=GROUND_Y&&player.vy>=0){
      player.y=GROUND_Y-player.h;player.vy=0;player.onGround=true;player.usedDbl=false;
    }
  }
  if(player.y>H+80){takeDmg();return;}

  // Platform collision
  for(const pl of platforms){
    const px=pl.x,py=pl.y,pw=pl.w;
    if(cx>px&&cx<px+pw&&player.y+player.h>py&&player.y+player.h<py+PLAT_H&&player.vy>=0){
      player.y=py-player.h;player.vy=0;player.onGround=true;player.usedDbl=false;
    }
  }

  // Mud
  for(const m of mudZones){if(cx>m[0]&&cx<m[1]&&player.onGround&&!bootOn)player.inMud=true;}

  // Powerup pickup
  const ph=pHB();
  for(const pu of powerups){
    if(pu.got)continue;
    if(ph.x<pu.x+28&&ph.x+ph.w>pu.x-28&&ph.y<pu.y+28&&ph.y+ph.h>pu.y-28){
      pu.got=true;sfxPow();applyBoost(pu.type);
    }
  }

  // Enemy hits
  if(invT<=0){
    for(const en of enemies){
      let hb;
      if(en.type==='snake')hb=sHB(en);
      else if(en.type==='armadillo')hb=aHB(en);
      else hb=wHB(en);
      if(hits(hb)){
        if(boost&&boost.type==='ring'){invT=40;}
        else{takeDmg();return;}
      }
    }
  }
  if(player.x>7350)doWin();
  cam.x=Math.max(0,Math.min(player.x-W*0.28,WORLD_W-W));
}

function updateEnemies(){
  for(const en of enemies){
    if(en.type==='wasp'){
      // Cruise high, dive at player when close, continue left
      en.x-=1.6;
      const dist=en.x-(player.x+player.w/2);
      if(en.state==='cruise'){
        en.y=en.y+(Math.sin(frame*0.04)*0.4); // gentle bob
        if(dist>0&&dist<250&&!en.dived){en.state='dive';en.vy=1.8;en.dived=true;}
      }else if(en.state==='dive'){
        en.y+=en.vy;
        // Stop above player head - always dodgeable by crouching under or jumping over
        if(en.y>=player.y-55||dist<-80){en.state='recover';en.vy=-3;}
      }else if(en.state==='recover'){
        en.y+=en.vy;en.vy*=0.9;
        if(en.y<=45){en.y=45;en.state='cruise';en.vy=0;}
      }
    }else{
      en.x+=en.vx;
      if(en.x<=en.minX||en.x>=en.maxX)en.vx*=-1;
    }
  }
}

function updateBoost(){
  if(boost){boost.timer--;if(boost.timer<=0){if(boost.type==='boot')player.dblJump=false;boost=null;}}
  if(invT>0)invT--;if(hurtT>0)hurtT--;
}

function applyBoost(type){
  if(type==='bouquet')boost={type:'bouquet',timer:300};
  else if(type==='ring'){boost={type:'ring',timer:200};invT=200;}
  else if(type==='boot'){boost={type:'boot',timer:600};player.dblJump=true;}
}

function takeDmg(){
  if(invT>0)return;
  sfxHurt();GS.lives--;hurtT=80;invT=140;
  player.vx=-2;player.vy=-4;
  if(GS.lives<=0){GS.lives=0;GS.state='dead';}
  else{GS.state='hurt_pause';setTimeout(()=>{initLevel();GS.state='playing';},1100);}
}
function doWin(){
  sfxWin();GS.running=false;GS.state='win';

  hearts=[];
  // Big burst of hearts when they meet
  for(let i=0;i<12;i++){
    hearts.push({
      x:7360-cam.x+Math.random()*80-40,
      y:GROUND_Y-60,
      vx:(Math.random()-0.5)*3,

    });
  }
}

function drawBg(){

  // 2. Clouds - seamless wrap using two draws
  const cloudOff=Math.floor(cam.x*0.03)%1280;
  try{
    // First slice
    const src1=cloudOff, w1=Math.min(1280,1280-cloudOff);
    const dst1w=Math.round(w1/1280*640);
    ctx.drawImage(IMG['sky'],src1,0,w1,160,0,0,dst1w,160);
    // Second slice wraps around
    if(dst1w<640){
      const w2=1280-w1;
      ctx.drawImage(IMG['sky'],0,0,w2,160,dst1w,0,640-dst1w,160);
    }
  }catch(e){}
  // 3. Sky fill below clouds
  ctx.fillStyle='#66B7D8';
  ctx.fillRect(0,120,W,GROUND_Y-120);
  // 4. Hills
  const mw=800,mh=155,ms=Math.floor(cam.x*0.15)%mw;
  di('bg_mid',-ms,GROUND_Y-mh,mw,mh);di('bg_mid',mw-ms,GROUND_Y-mh,mw,mh);
}

// ── GROUND ──
function drawGround(){
  const cx=cam.x;

  // 1. Solid dirt fill under everything
  // Dark green fill (matches grass tile bottom, no brown boxes)
  // Only fill dirt below grass surface - no fill above or it shows as green blocks
  ctx.fillStyle='#1a3a10';
  ctx.fillRect(0,GROUND_Y+14,W,H-GROUND_Y);

  // 2. Ground tiles (256x80): grass at top of tile, anchored at GROUND_Y
  const gw=256,gh=GND_H;
  const go= -(Math.floor(cx)%gw+gw)%gw;
  for(let x=go;x<W+gw;x+=gw){
    const wLeft=x+cx, wRight=x+cx+gw;
    // Check if tile overlaps any gap
    const overlapGap=gaps.find(g=>wRight>g[0]&&wLeft<g[1]);
    if(!overlapGap){
      di('ground',x,GROUND_Y,gw,gh);
    } else {
      // Tile overlaps gap - clip it so only the non-gap portion draws
      const clipLeft=Math.max(x, overlapGap[0]-cx);
      const clipRight=Math.min(x+gw, overlapGap[1]-cx);
      // Draw left portion (before gap)
      if(x < clipLeft){
        ctx.save();ctx.beginPath();ctx.rect(x,GROUND_Y,clipLeft-x,gh);ctx.clip();
        di('ground',x,GROUND_Y,gw,gh);
        ctx.restore();
      }
      // Draw right portion (after gap)
      if(clipRight < x+gw){
        ctx.save();ctx.beginPath();ctx.rect(clipRight,GROUND_Y,x+gw-clipRight,gh);ctx.clip();
        di('ground',x,GROUND_Y,gw,gh);
        ctx.restore();
      }
    }
  }

  // 3. Creek gaps - all gaps are water, grass meets edge directly
  for(const g of gaps){
    const sx=g[0]-cx,ex=g[1]-cx,gW=ex-sx;
    if(ex<0||sx>W)continue;
    ctx.fillStyle='#1A6A82';
    ctx.fillRect(sx,GROUND_Y,gW,H-GROUND_Y);
    const cw=512,ch=90,ao=Math.floor(frame*0.4)%cw;
    ctx.save();ctx.beginPath();ctx.rect(sx,GROUND_Y,gW,ch);ctx.clip();
    const cs=sx-((Math.floor(sx+cx)%cw+cw)%cw)-cw;
    for(let c=cs;c<ex+cw;c+=cw){di('creek',c-ao,GROUND_Y,cw,ch);di('creek',c-ao+cw,GROUND_Y,cw,ch);}
    ctx.restore();
  }

  // 4. Mud zones: swap ground tile with mud tile
  for(const m of mudZones){
    const sx=m[0]-cx,ex=m[1]-cx;
    if(ex<0||sx>W)continue;
    const mw=256,mh=GND_H;
    ctx.save();ctx.beginPath();ctx.rect(sx,GROUND_Y,ex-sx,mh);ctx.clip();
    const mo=sx-((Math.floor(sx+cx)%mw+mw)%mw)-mw;
    for(let mx=mo;mx<ex+mw;mx+=mw)di('mud',mx,GROUND_Y,mw,mh);
    ctx.restore();

  }

  // 5. Rock platforms - each drawn as a single object (boulder or log)
  platforms.forEach(function(pl,idx){
    var plx=pl.x,ply=pl.y,plw=pl.w,sx=plx-cx;
    if(sx+plw<0||sx>W) return;
    var img,drawW,drawH,drawX,drawY;
    if(pl.t==='stump'){
      img=IMG['stump'];
      // Stump: narrow trunk, tall enough to reach from ply down to GROUND_Y+10
      drawW=plw+10;
      drawH=GROUND_Y-ply+10; // trunk height = from platform top to ground
      drawX=sx+(plw-drawW)/2; // center on platform
      drawY=ply;
    } else {
      img=IMG[idx%2===0?'platform1':'platform2'];
      drawW=plw+30;
      var nH=img?img.naturalHeight||80:80, nW=img?img.naturalWidth||140:140;
      drawH=Math.round(drawW*(nH/nW));
      drawY=ply-4;
      var minH=GROUND_Y-ply+44;
      if(drawH<minH) drawH=minH;
      drawX=sx-15;
    }
    if(!img||!img.complete||!img.naturalWidth) return;
    try{ctx.drawImage(img,drawX,drawY,drawW,drawH);}catch(e){}
  });
}

  }else{
    spr=ch==='dizzle'?'d_idle':'j_idle';

  di(spr,px-8,py-8,player.w+16,player.h+16,fl);
  if(boost)ctx.restore();

// ── UI TOUCH ──
function uiTouch(x,y){
  if(GS.state==='title'){
    if(y>H-56&&GS.lbOK)GS.state='charselect';
  }else if(GS.state==='charselect'){
    // Start button: bottom strip
    if(y>H-56){startGame();return;}
    // Card selection: only in card area y=46-294
    if(y>46&&y<294){
      GS.char=x<W/2?'jackie':'dizzle';
    }
  }else if(GS.state==='dead'){
    if(y>76&&y<110)restartGame();
    else if(y>118&&y<150){if(window.showTip){window.shown=false;showTip();}}
    else if(y>226&&y<252){window.open('https://asherarcade.com','_blank');}
  }else if(GS.state==='win'){
    if(GS.name&&y>H-54)submitScore();
  }else if(GS.state==='leaderboard'){
    if(y>H-54)restartGame();
    else if(y>H-100&&y<H-58){if(window.showTip){window.shown=false;showTip();}}
    else if(y>238&&y<284){window.open('https://asherarcade.com','_blank');}
  }
}

function handleNameKey(e){
  if(e.key==='Enter'&&GS.name){submitScore();return;}
  if(e.key==='Backspace'){GS.name=GS.name.slice(0,-1);return;}
  if(e.key.length===1&&GS.name.length<12)GS.name+=e.key.toUpperCase();
}

function submitScore(){
  // Show tip after submitting score - reset shown so it fires fresh
  setTimeout(function(){if(window.showTip){window.shown=false;showTip();}},1500);
  const surl='https://script.google.com/macros/s/AKfycbwFs6IMY8op3GtUH0E3HCKnpfnvO42pRBeowsA172fRBf7GyR0_G4EZUQuCU_vjb4KQ0A/exec?name='+encodeURIComponent(GS.name)+'&score='+GS.timer.toFixed(2)+'&character='+GS.char+'&key=bragg_racing_lb_v1';
  fetch(surl,{mode:'no-cors'}).catch(()=>{});
  if(!GS.bestTime||GS.timer<GS.bestTime)GS.bestTime=GS.timer;
  GS.state='leaderboard';fetchLB();
}
function startGame(){window._deadTipShown=false;GS.lives=3;GS.timer=0;GS.running=true;GS.name='';initLevel();GS.state='playing';}
function restartGame(){GS.lbOK=false;GS.state='title';fetchLB();}
function fetchLB(){
  GS.lbOK=false;
  fetch('https://script.google.com/macros/s/AKfycbwFs6IMY8op3GtUH0E3HCKnpfnvO42pRBeowsA172fRBf7GyR0_G4EZUQuCU_vjb4KQ0A/exec?key=bragg_racing_lb_v1')
    .then(r=>r.json()).then(d=>{GS.lb=d.sort((a,b)=>parseFloat(a.score)-parseFloat(b.score));GS.lbOK=true;})
    .catch(()=>{GS.lbOK=true;GS.lb=[];});
}

// ── MAIN LOOP ──
let lastTS=0;
function loop(ts){
  const dt=Math.min((ts-lastTS)/16.67,3);lastTS=ts;frame++;
  ctx.clearRect(0,0,W,H);
  if(GS.state==='title')drawTitle();
  else if(GS.state==='charselect')drawCharSelect();
  else if(GS.state==='playing'||GS.state==='hurt_pause'){
    if(GS.running&&GS.state==='playing')GS.timer+=dt/60;
    if(GS.state==='playing'){updatePlayer();updateEnemies();updateBoost();}
    drawBg();drawChurch();drawGround();drawPowerups();drawEnemies();drawPlayer();updateHearts();drawHearts();drawHUD();
    if(GS.state==='hurt_pause'){
      ctx.fillStyle='rgba(220,0,0,0.3)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='22px Press Start 2P';
      ctx.strokeStyle='#000';ctx.lineWidth=3;ctx.strokeText('OOF!',W/2,H/2-8);ctx.fillText('OOF!',W/2,H/2-8);
      ctx.font='24px serif';ctx.fillText('🩷'.repeat(GS.lives)+'🖤'.repeat(3-GS.lives),W/2,H/2+24);
      ctx.textAlign='left';
    }
  }
  else if(GS.state==='win'){
    drawBg();drawChurch();drawGround();
    updateHearts();drawHearts();
    drawWin();
  }
  else if(GS.state==='dead'){
    drawBg();drawGround();drawDead();
    // Show tip 3s after game over
    if(!window._deadTipShown){window._deadTipShown=true;setTimeout(function(){if(window.showTip)showTip();},3000);}
  }
  else if(GS.state==='leaderboard')drawLB();
  requestAnimationFrame(loop);
}

// Heart particles
function spawnHearts(){
  for(let i=0;i<8;i++){
    hearts.push({
      x:W*0.72+Math.random()*60-30,
      y:GROUND_Y-80,
      vx:(Math.random()-0.5)*2,
      vy:-(2+Math.random()*3),
      life:1.0,
      size:14+Math.random()*10
    });
  }
}
function updateHearts(){
  for(let i=hearts.length-1;i>=0;i--){
    const h=hearts[i];
    h.x+=h.vx; h.y+=h.vy; h.vy+=0.05;
    h.life-=0.018;
    if(h.life<=0)hearts.splice(i,1);
  }
}
function drawHearts(){
  for(const h of hearts){
    ctx.globalAlpha=h.life;
    ctx.font=h.size+'px serif';
    ctx.textAlign='center';
    ctx.fillText('🩷',h.x,h.y);
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
}

fetchLB();
requestAnimationFrame(loop);
