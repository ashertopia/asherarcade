<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#e8d9b6">
<title>Sand Garden — Asher Arcade</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --sand-light: #f3e6c5;
    --sand: #e8d9b6;
    --sand-deep: #c9b58a;
    --groove: #8a7349;
    --ink: #3a2e1c;
    --ui: rgba(58,46,28,0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--sand);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    cursor: crosshair;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .ui {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    padding: 8px;
    background: rgba(253,247,232,0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 999px;
    border: 1px solid rgba(138,115,73,0.18);
    box-shadow: 0 4px 20px rgba(58,46,28,0.08);
    z-index: 10;
    transition: opacity 0.6s ease;
  }

  .ui.hidden { opacity: 0.15; pointer-events: none; }
  .ui.hidden:hover, .ui.hidden:focus-within { opacity: 1; pointer-events: auto; }

  .btn {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ui);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    min-width: 44px;
    min-height: 36px;
  }

  .btn:hover { background: rgba(138,115,73,0.08); color: var(--ink); }
  .btn.active { background: rgba(138,115,73,0.18); color: var(--ink); }

  .label {
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ui);
    z-index: 10;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  .label.fade { opacity: 0; }

  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--ui);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s ease;
  }

  .hint.gone { opacity: 0; }

  @media (max-width: 380px) {
    .btn { font-size: 11px; padding: 9px 11px; }
    .label { font-size: 10px; letter-spacing: 0.3em; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="sand"></canvas>
</div>

<div class="label" id="label">Sand Garden</div>
<div class="hint" id="hint">drag to draw · lines slowly settle</div>

<div class="ui" id="ui">
  <button class="btn active" data-sym="1" aria-label="Single">●</button>
  <button class="btn" data-sym="2" aria-label="Mirror x2">●●</button>
  <button class="btn" data-sym="4" aria-label="Mirror x4">✦</button>
  <button class="btn" data-sym="6" aria-label="Mirror x6">❋</button>
  <button class="btn" data-sym="8" aria-label="Mirror x8">❉</button>
  <button class="btn" id="clear" aria-label="Smooth">⟳</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('sand');
  const ctx = canvas.getContext('2d', { alpha: false });
  const ui = document.getElementById('ui');
  const label = document.getElementById('label');
  const hint = document.getElementById('hint');

  let W = 0, H = 0, cx = 0, cy = 0;
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let symmetry = 1;
  let drawing = false;
  let lastPts = []; // last point per symmetric stroke index
  let hintShown = true;

  // Sand color stops for procedural texture
  const SAND_BASE = [232, 217, 182];
  const SAND_HIGHLIGHT = [243, 230, 197];
  const SAND_SHADOW = [201, 181, 138];

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    paintSand();
  }

  // Paint a textured sand background
  function paintSand() {
    // base
    ctx.fillStyle = `rgb(${SAND_BASE.join(',')})`;
    ctx.fillRect(0, 0, W, H);

    // soft radial wash (warm center, cooler edges)
    const grad = ctx.createRadialGradient(cx, cy * 0.85, 40, cx, cy, Math.max(W, H) * 0.75);
    grad.addColorStop(0, 'rgba(255, 240, 200, 0.18)');
    grad.addColorStop(1, 'rgba(160, 130, 80, 0.10)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // grainy noise speckles
    const grainCount = Math.floor(W * H / 600);
    for (let i = 0; i < grainCount; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const t = Math.random();
      const a = 0.04 + Math.random() * 0.06;
      if (t < 0.5) {
        ctx.fillStyle = `rgba(${SAND_SHADOW.join(',')},${a})`;
      } else {
        ctx.fillStyle = `rgba(${SAND_HIGHLIGHT.join(',')},${a})`;
      }
      ctx.fillRect(x, y, 1, 1);
    }
  }

  // Draw a single groove segment (darker line + light highlight above)
  function drawSegment(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len < 0.5) return;

    // Subtle highlight (top-left of the groove)
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    ctx.strokeStyle = 'rgba(255,245,215,0.28)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(x1 - 0.6, y1 - 0.6);
    ctx.lineTo(x2 - 0.6, y2 - 0.6);
    ctx.stroke();

    // Main groove
    ctx.strokeStyle = 'rgba(138,115,73,0.55)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // Inner darker core for crispness
    ctx.strokeStyle = 'rgba(80,60,30,0.18)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }

  // For each new point, compute symmetric copies and draw segments from lastPts
  function drawSymmetric(x, y, isStart) {
    const n = symmetry;
    for (let i = 0; i < n; i++) {
      const ang = (Math.PI * 2 * i) / n;
      const dx = x - cx;
      const dy = y - cy;
      const cos = Math.cos(ang);
      const sin = Math.sin(ang);
      const rx = cx + dx * cos - dy * sin;
      const ry = cy + dx * sin + dy * cos;

      if (!isStart && lastPts[i]) {
        drawSegment(lastPts[i].x, lastPts[i].y, rx, ry);
      }
      lastPts[i] = { x: rx, y: ry };
    }
  }

  // Slow fade: every animation frame, draw a translucent sand wash
  function fadeStep() {
    // Re-grain a subset to keep it from looking flat as it fades
    ctx.fillStyle = 'rgba(232,217,182,0.012)'; // very faint sand wash
    ctx.fillRect(0, 0, W, H);

    // Sprinkle tiny grains so fading lines look like settling sand
    const grainCount = 40;
    for (let i = 0; i < grainCount; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const t = Math.random();
      const a = 0.025;
      ctx.fillStyle = t < 0.5
        ? `rgba(${SAND_SHADOW.join(',')},${a})`
        : `rgba(${SAND_HIGHLIGHT.join(',')},${a})`;
      ctx.fillRect(x, y, 1, 1);
    }

    requestAnimationFrame(fadeStep);
  }

  // ─── Pointer handling ─────────────────────────────────────
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function onDown(e) {
    if (e.target.closest('.ui')) return;
    e.preventDefault();
    drawing = true;
    lastPts = [];
    const p = pointerPos(e);
    drawSymmetric(p.x, p.y, true);
    if (hintShown) {
      hint.classList.add('gone');
      hintShown = false;
      // also gently fade the title after first interaction
      setTimeout(() => label.classList.add('fade'), 1200);
    }
    if (e.pointerId !== undefined) canvas.setPointerCapture?.(e.pointerId);
  }

  function onMove(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pointerPos(e);
    drawSymmetric(p.x, p.y, false);
  }

  function onUp(e) {
    if (!drawing) return;
    drawing = false;
    lastPts = [];
  }

  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);

  // ─── UI ─────────────────────────────────────────────────
  ui.querySelectorAll('button[data-sym]').forEach(btn => {
    btn.addEventListener('click', () => {
      ui.querySelectorAll('button[data-sym]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      symmetry = parseInt(btn.dataset.sym, 10);
    });
  });

  document.getElementById('clear').addEventListener('click', () => {
    // Smooth: a quick wash over the canvas
    let t = 0;
    const smooth = () => {
      ctx.fillStyle = 'rgba(232,217,182,0.18)';
      ctx.fillRect(0, 0, W, H);
      t++;
      if (t < 18) requestAnimationFrame(smooth);
      else paintSand();
    };
    smooth();
    label.classList.remove('fade');
    setTimeout(() => label.classList.add('fade'), 2400);
  });

  // Auto-hide UI when idle
  let idleTimer = null;
  function bumpIdle() {
    ui.classList.remove('hidden');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => ui.classList.add('hidden'), 4000);
  }
  ['pointerdown', 'pointermove', 'keydown'].forEach(ev =>
    window.addEventListener(ev, bumpIdle, { passive: true })
  );
  bumpIdle();

  // ─── Init ───────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  fadeStep();
})();
</script>
</body>
</html>
