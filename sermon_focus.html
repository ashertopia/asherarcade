<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0820">
<title>Light Garden — Asher Arcade</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --bg-deep: #050316;
    --bg: #0a0820;
    --ui: rgba(255,255,255,0.55);
    --ink: rgba(255,255,255,0.9);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  #stage {
    position: fixed;
    inset: 0;
    cursor: crosshair;
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .ui-stack {
    position: fixed;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    z-index: 10;
    transition: opacity 0.6s ease;
    max-width: 96vw;
    pointer-events: none;
  }
  .ui-stack .ui { pointer-events: auto; }

  .ui-stack.hidden { opacity: 0.18; }
  .ui-stack.hidden:hover, .ui-stack.hidden:focus-within { opacity: 1; }

  .ui {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(20, 16, 46, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    align-items: center;
    max-width: 96vw;
  }

  .swatch {
    appearance: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: var(--c, white);
    cursor: pointer;
    padding: 0;
    margin: 2px;
    flex: 0 0 auto;
    transition: transform 0.15s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 0 6px var(--c, rgba(255,255,255,0.4));
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active {
    border-color: rgba(255,255,255,0.95);
    box-shadow: 0 0 14px var(--c, rgba(255,255,255,0.6));
    transform: scale(1.1);
  }
  .swatch.rainbow {
    background: conic-gradient(from 0deg, #ff3a8c, #ffa83a, #ffe23a, #7cff3a, #3affe0, #00b4ff, #a86cff, #ff3ad9, #ff3a8c);
  }
  .swatch.rainbow.active {
    box-shadow: 0 0 14px rgba(255,255,255,0.7);
  }

  .swatch-toggle {
    width: 28px;
    height: 28px;
    margin: 0 2px;
    border: 2px solid rgba(255,255,255,0.3);
    font-family: inherit;
    font-size: 16px;
    line-height: 1;
    color: rgba(255,255,255,0.55);
  }
  .swatch-toggle.rainbow {
    background: conic-gradient(from 0deg, #ff3a8c, #ffa83a, #ffe23a, #7cff3a, #3affe0, #00b4ff, #a86cff, #ff3ad9, #ff3a8c);
  }
  .swatch-toggle.empty {
    background: transparent !important;
    border-style: dashed;
    box-shadow: none;
  }
  .swatch-toggle:not(.empty) { font-size: 0; }
  #colorAToggle { margin-left: 2px; margin-right: 0; }
  #colorBToggle { margin-left: 2px; margin-right: 6px; }
  #uiColors.picking-b {
    border-color: rgba(255,255,255,0.35);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.18);
  }

  .divider {
    width: 1px;
    height: 22px;
    background: rgba(255,255,255,0.12);
    margin: 0 4px;
  }

  #uiColors {
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    pointer-events: none;
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  #uiColors.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }

  .btn {
    appearance: none;
    border: none;
    background: transparent;
    color: var(--ui);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    min-width: 40px;
    min-height: 32px;
  }

  .btn:hover { background: rgba(255,255,255,0.08); color: var(--ink); }
  .btn.active { background: rgba(255,255,255,0.14); color: var(--ink); }

  .label {
    position: fixed;
    top: max(20px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ui);
    z-index: 10;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }

  .label.fade { opacity: 0; }

  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--ui);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    opacity: 1;
    transition: opacity 1s ease;
  }

  .hint.gone { opacity: 0; }

  @media (max-width: 380px) {
    .btn { font-size: 11px; padding: 7px 9px; }
    .swatch { width: 22px; height: 22px; }
    .label { font-size: 10px; letter-spacing: 0.3em; }
  }
</style>
</head>
<body>
<div id="stage">
  <canvas id="sand"></canvas>
</div>

<div class="label" id="label">Light Garden</div>
<div class="hint" id="hint">drag to draw · light fades slowly</div>

<div class="ui-stack" id="uiStack">
  <div class="ui" id="uiColors">
    <button class="swatch active" data-color="#ff3a3a" style="--c:#ff3a3a" aria-label="Red"></button>
    <button class="swatch" data-color="#ff6a3a" style="--c:#ff6a3a" aria-label="Coral"></button>
    <button class="swatch" data-color="#ffa83a" style="--c:#ffa83a" aria-label="Orange"></button>
    <button class="swatch" data-color="#ffe23a" style="--c:#ffe23a" aria-label="Yellow"></button>
    <button class="swatch" data-color="#c8ff3a" style="--c:#c8ff3a" aria-label="Chartreuse"></button>
    <button class="swatch" data-color="#7cff3a" style="--c:#7cff3a" aria-label="Lime"></button>
    <button class="swatch" data-color="#3affb4" style="--c:#3affb4" aria-label="Mint"></button>
    <button class="swatch" data-color="#3affe0" style="--c:#3affe0" aria-label="Aqua"></button>
    <button class="swatch" data-color="#00e6ff" style="--c:#00e6ff" aria-label="Cyan"></button>
    <button class="swatch" data-color="#3aa5ff" style="--c:#3aa5ff" aria-label="Sky"></button>
    <button class="swatch" data-color="#5a6cff" style="--c:#5a6cff" aria-label="Indigo"></button>
    <button class="swatch" data-color="#a86cff" style="--c:#a86cff" aria-label="Violet"></button>
    <button class="swatch" data-color="#ff3ad9" style="--c:#ff3ad9" aria-label="Magenta"></button>
    <button class="swatch" data-color="#ff3a8c" style="--c:#ff3a8c" aria-label="Pink"></button>
    <button class="swatch" data-color="#f0f0ff" style="--c:#f0f0ff" aria-label="White"></button>
    <button class="swatch rainbow" data-color="rainbow" aria-label="Rainbow"></button>
  </div>
  <div class="ui" id="uiSym">
    <button class="swatch swatch-toggle" id="colorAToggle" style="--c:#ff3a3a" aria-label="Pick color"></button>
    <button class="swatch swatch-toggle empty" id="colorBToggle" aria-label="Add blend color">+</button>
    <span class="divider"></span>
    <button class="btn active" data-sym="1" aria-label="Single">●</button>
    <button class="btn" data-sym="2" aria-label="Mirror x2">●●</button>
    <button class="btn" data-sym="4" aria-label="Mirror x4">✦</button>
    <button class="btn" data-sym="6" aria-label="Mirror x6">❋</button>
    <button class="btn" data-sym="8" aria-label="Mirror x8">❉</button>
    <button class="btn" id="clear" aria-label="Clear">⟳</button>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('sand');
  const ctx = canvas.getContext('2d', { alpha: false });
  // Persistent off-screen canvas: bare colored lines that don't fade
  const pCanvas = document.createElement('canvas');
  const pCtx = pCanvas.getContext('2d');
  const uiStack = document.getElementById('uiStack');
  const uiColors = document.getElementById('uiColors');
  const uiSym = document.getElementById('uiSym');
  const label = document.getElementById('label');
  const hint = document.getElementById('hint');

  let W = 0, H = 0, cx = 0, cy = 0;
  let dpr = Math.min(window.devicePixelRatio || 1, 2);
  let symmetry = 1;
  let drawing = false;
  let lastPts = [];
  let hintShown = true;

  let currentColor = '#ff3a3a';
  let blendColor = null;
  let pickingB = false;
  let rainbowMode = false;

  function hexToRgb(h) {
    return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  }
  function lerpColor(a, b, t) {
    const ra = hexToRgb(a), rb = hexToRgb(b);
    const r = Math.round(ra[0] + (rb[0]-ra[0])*t);
    const g = Math.round(ra[1] + (rb[1]-ra[1])*t);
    const bl = Math.round(ra[2] + (rb[2]-ra[2])*t);
    return `rgb(${r},${g},${bl})`;
  }

  // ─── Background ────────────────────────────────────────
  function paintBg() {
    ctx.fillStyle = '#06041a';
    ctx.fillRect(0, 0, W, H);

    const grad = ctx.createRadialGradient(cx, cy * 1.2, 40, cx, cy, Math.max(W, H) * 0.85);
    grad.addColorStop(0, 'rgba(70, 50, 140, 0.18)');
    grad.addColorStop(1, 'rgba(8, 4, 28, 0.0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    const starCount = Math.floor(W * H / 3500);
    for (let i = 0; i < starCount; i++) {
      const x = Math.random() * W;
      const y = Math.random() * H;
      const a = 0.15 + Math.random() * 0.5;
      const r = Math.random() < 0.92 ? 0.6 : 1.1;
      ctx.fillStyle = `rgba(220, 230, 255, ${a * 0.35})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function resize() {
    // Preserve any existing persistent picture across resize
    let saved = null;
    if (pCanvas.width > 0 && pCanvas.height > 0) {
      saved = document.createElement('canvas');
      saved.width = pCanvas.width;
      saved.height = pCanvas.height;
      saved.getContext('2d').drawImage(pCanvas, 0, 0);
    }

    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    cx = W / 2;
    cy = H / 2;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    pCanvas.width = canvas.width;
    pCanvas.height = canvas.height;
    pCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    paintBg();

    if (saved) {
      pCtx.save();
      pCtx.setTransform(1, 0, 0, 1, 0, 0);
      pCtx.drawImage(saved, 0, 0, pCanvas.width, pCanvas.height);
      pCtx.restore();
    }
  }

  // ─── Drawing ───────────────────────────────────────────
  function activeColor() {
    if (rainbowMode) {
      const hue = (Date.now() / 14) % 360;
      return `hsl(${hue}, 100%, 62%)`;
    }
    if (blendColor) {
      const t = (Math.sin(Date.now() / 1100) + 1) / 2;
      return lerpColor(currentColor, blendColor, t);
    }
    return currentColor;
  }

  function drawSegment(x1, y1, x2, y2, color) {
    if (Math.hypot(x2 - x1, y2 - y1) < 0.4) return;

    // Fresh stroke with soft glow on the visible canvas (this fades)
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = color;
    ctx.shadowBlur = 4;
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Bare colored line on the persistent canvas (this stays)
    pCtx.lineCap = 'round';
    pCtx.lineJoin = 'round';
    pCtx.strokeStyle = color;
    pCtx.lineWidth = 2;
    pCtx.beginPath();
    pCtx.moveTo(x1, y1);
    pCtx.lineTo(x2, y2);
    pCtx.stroke();
  }

  function drawSymmetric(x, y, isStart) {
    const n = symmetry;
    const color = activeColor();
    for (let i = 0; i < n; i++) {
      const ang = (Math.PI * 2 * i) / n;
      const dx = x - cx;
      const dy = y - cy;
      const cos = Math.cos(ang);
      const sin = Math.sin(ang);
      const rx = cx + dx * cos - dy * sin;
      const ry = cy + dx * sin + dy * cos;

      if (!isStart && lastPts[i]) {
        drawSegment(lastPts[i].x, lastPts[i].y, rx, ry, color);
      }
      lastPts[i] = { x: rx, y: ry };
    }
  }

  // ─── Slow fade ─────────────────────────────────────────
  function fadeStep() {
    // Fade the fresh-stroke glow on the visible canvas (1-2 sec settle)
    ctx.fillStyle = 'rgba(8, 4, 26, 0.04)';
    ctx.fillRect(0, 0, W, H);

    // Restore the persistent colored picture on top, so lines never disappear
    ctx.save();
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.drawImage(pCanvas, 0, 0);
    ctx.restore();

    requestAnimationFrame(fadeStep);
  }

  // ─── Pointer ───────────────────────────────────────────
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  function onDown(e) {
    if (e.target.closest('.ui-stack')) return;
    e.preventDefault();
    uiColors.classList.remove('open');
    drawing = true;
    lastPts = [];
    const p = pointerPos(e);
    drawSymmetric(p.x, p.y, true);
    if (hintShown) {
      hint.classList.add('gone');
      hintShown = false;
      setTimeout(() => label.classList.add('fade'), 1200);
    }
    if (e.pointerId !== undefined) canvas.setPointerCapture?.(e.pointerId);
  }

  function onMove(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = pointerPos(e);
    drawSymmetric(p.x, p.y, false);
  }

  function onUp() {
    if (!drawing) return;
    drawing = false;
    lastPts = [];
  }

  canvas.addEventListener('pointerdown', onDown);
  canvas.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);

  // ─── UI ────────────────────────────────────────────────
  uiSym.querySelectorAll('button[data-sym]').forEach(btn => {
    btn.addEventListener('click', () => {
      uiSym.querySelectorAll('button[data-sym]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      symmetry = parseInt(btn.dataset.sym, 10);
    });
  });

  const colorAToggle = document.getElementById('colorAToggle');
  const colorBToggle = document.getElementById('colorBToggle');

  colorAToggle.addEventListener('click', () => {
    pickingB = false;
    uiColors.classList.remove('picking-b');
    uiColors.classList.toggle('open');
  });

  colorBToggle.addEventListener('click', () => {
    if (blendColor) {
      // Clear blend color
      blendColor = null;
      colorBToggle.classList.add('empty');
      colorBToggle.textContent = '+';
      colorBToggle.style.removeProperty('--c');
      pickingB = false;
      uiColors.classList.remove('picking-b');
    } else {
      // Open picker in "pick B" mode
      pickingB = true;
      uiColors.classList.add('open');
      uiColors.classList.add('picking-b');
    }
  });

  uiColors.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      const c = sw.dataset.color;

      if (pickingB && c !== 'rainbow') {
        blendColor = c;
        colorBToggle.classList.remove('empty');
        colorBToggle.textContent = '';
        colorBToggle.style.setProperty('--c', c);
        pickingB = false;
        uiColors.classList.remove('picking-b');
        setTimeout(() => uiColors.classList.remove('open'), 140);
        return;
      }

      uiColors.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      if (c === 'rainbow') {
        rainbowMode = true;
        colorAToggle.classList.add('rainbow');
        colorAToggle.style.removeProperty('--c');
      } else {
        rainbowMode = false;
        currentColor = c;
        colorAToggle.classList.remove('rainbow');
        colorAToggle.style.setProperty('--c', c);
      }
      setTimeout(() => uiColors.classList.remove('open'), 140);
    });
  });

  document.getElementById('clear').addEventListener('click', () => {
    // Wipe the persistent picture so it stops being restored each frame
    pCtx.save();
    pCtx.setTransform(1, 0, 0, 1, 0, 0);
    pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
    pCtx.restore();

    let t = 0;
    const smooth = () => {
      ctx.fillStyle = 'rgba(8, 4, 26, 0.28)';
      ctx.fillRect(0, 0, W, H);
      t++;
      if (t < 14) requestAnimationFrame(smooth);
      else paintBg();
    };
    smooth();
    label.classList.remove('fade');
    setTimeout(() => label.classList.add('fade'), 2400);
  });

  // ─── Auto-hide UI ──────────────────────────────────────
  let idleTimer = null;
  function bumpIdle() {
    uiStack.classList.remove('hidden');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      uiStack.classList.add('hidden');
      uiColors.classList.remove('open');
    }, 4500);
  }
  ['pointerdown', 'pointermove', 'keydown'].forEach(ev =>
    window.addEventListener(ev, bumpIdle, { passive: true })
  );
  bumpIdle();

  // ─── Init ──────────────────────────────────────────────
  window.addEventListener('resize', resize);
  resize();
  fadeStep();
})();
</script>
</body>
</html>
