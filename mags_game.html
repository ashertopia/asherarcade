<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Mag's Endless Skate</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#0d0010;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:-webkit-fill-available;overflow:hidden;touch-action:none;}canvas{display:block;}</style>
</head>
<body>
<canvas id="c"></canvas>
<input id="nameOverlay" type="text" maxlength="12" autocomplete="off"
  autocorrect="off" autocapitalize="characters" spellcheck="false"
  placeholder="YOUR NAME"
  style="position:fixed;opacity:0;pointer-events:none;font-size:16px;
  width:252px;height:28px;text-align:center;border:2px solid #9900ff;
  border-radius:5px;background:rgba(0,0,0,0.85);color:#fff;
  font-family:'Press Start 2P',monospace;letter-spacing:2px;
  z-index:100;transform:translate(-50%,-50%);">
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=360;
canvas.width=W;canvas.height=H;

// ── Mobile name input overlay ──
const nameOverlay=document.getElementById('nameOverlay');
if(nameOverlay){
  nameOverlay.addEventListener('input',()=>{
    GS.name=nameOverlay.value.toUpperCase().substring(0,12);
  });
  nameOverlay.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();if(GS.name&&!GS.submitted)submitScore();hideNameInput();}
  });
}
function showNameInput(){
  if(!nameOverlay)return;
  nameOverlay.value=GS.name||'';
  const r=canvas.getBoundingClientRect();
  const scaleX=r.width/W,scaleY=r.height/H;
  nameOverlay.style.left=(r.left+(W/2)*scaleX)+'px';
  nameOverlay.style.top=(r.top+210*scaleY)+'px';
  nameOverlay.style.pointerEvents='auto';
  nameOverlay.style.opacity='0';
  setTimeout(()=>nameOverlay.focus(),80);
}
function hideNameInput(){
  if(!nameOverlay)return;
  nameOverlay.style.pointerEvents='none';
  nameOverlay.blur();
}
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const isPortrait=vh>vw;
  if(isPortrait){
    // Rotate canvas via CSS transform — game renders landscape, phone is portrait
    const s=Math.min(vh/W,vw/H); // swap W/H for rotated fit
    const cw=Math.floor(W*s), ch=Math.floor(H*s);
    canvas.style.width=cw+'px';
    canvas.style.height=ch+'px';
    canvas.style.transform='rotate(90deg)';
    canvas.style.transformOrigin='center center';
    canvas.style.position='fixed';
    canvas.style.left=Math.floor((vw-ch)/2)+'px';
    canvas.style.top=Math.floor((vh-cw)/2)+'px';
    canvas.style.margin='0';
  } else {
    canvas.style.transform='none';
    canvas.style.position='static';
    canvas.style.left='';canvas.style.top='';canvas.style.margin='';
    const s=Math.min(vw/W,vh/H);
    canvas.style.width=Math.floor(W*s)+'px';
    canvas.style.height=Math.floor(H*s)+'px';
  }
}
resize();window.addEventListener('resize',resize);

const IMG={};
function loadImages(){return Promise.all(Object.entries(ASSETS).map(([k,src])=>new Promise(res=>{const img=new Image();img.onload=()=>{IMG[k]=img;res();};img.onerror=()=>res();img.src=src;})));}

// AUDIO
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v=0.18,t='square'){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function sfxJump(){beep(280,0.05,0.13,'sine');setTimeout(()=>beep(460,0.07,0.1,'sine'),40);}
function sfxFlip(){[380,560,760].forEach((f,i)=>setTimeout(()=>beep(f,0.05,0.1,'sine'),i*28));}
function sfxGrind(){beep(160,0.4,0.08,'sawtooth');}
function sfxCrash(){beep(180,0.1,0.28,'sawtooth');setTimeout(()=>beep(90,0.2,0.22,'sawtooth'),70);}

let charQueue=[]; // scheduled character appearances {score, type}
function buildCharQueue(){
  charQueue=[];
  let sc=CHAR_INTERVAL_FIRST;
  const order=['lady','dog','kevin'];
  let idx=0;
  for(let i=0;i<30;i++){ // generate 30 appearances
    charQueue.push({score:sc,type:order[idx%3]});
    sc+=(i<3?CHAR_INTERVAL_FIRST:CHAR_INTERVAL); // first 3 at 10k apart, then 20k

  }
}

// BACKGROUND + POLES
// Poles appear every 640px of scroll, skater draws BEHIND them (drawn after player)
function drawBg(){
  const bgImg=IMG['bg'];
  if(bgImg&&bgImg.complete&&bgImg.naturalWidth){
    const off=bgOff%BG_W;
    try{
      // Draw strip so pixel [off] appears at screen x=0
      ctx.drawImage(bgImg,-off,0,BG_W,H);
      // If the strip doesn't reach the right edge, wrap with second copy
      if(BG_W-off<W) ctx.drawImage(bgImg,BG_W-off,0,BG_W,H);
    }catch(e){}
  } else {
    ctx.fillStyle='#1a0030';ctx.fillRect(0,0,W,H);
  }
}

// Draw poles AFTER player (player goes behind pole)
// Alternates between pole_img and pole2_img each panel
function drawPoles(){
  const p1=IMG['pole_img'],p2=IMG['pole2_img'];
  if(!p1||!p1.complete)return;
  const pw=28,ph=H;
  const poleOffsets=[626, 1266, 1906, 2546]; // centered on panel seams (640/1280/1920/2560)
  const off=bgOff%BG_W;
  poleOffsets.forEach((po,i)=>{
    const pimg=(i%2===0)?p1:(p2&&p2.complete?p2:p1); // alternate
    for(let wrap=0;wrap<2;wrap++){
      const sx=po-off+wrap*BG_W;
      if(sx>-pw&&sx<W+pw){
        try{ctx.drawImage(pimg,sx-pw/2,0,pw,ph);}catch(e){}
      }
    }
  });
}

// UTILS
function rr(x,y,w,h,r,fill=true,stroke=false){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();if(fill)ctx.fill();if(stroke)ctx.stroke();}
function di(k,x,y,w,h){const img=IMG[k];if(!img||!img.complete||!img.naturalWidth)return;try{ctx.drawImage(img,x,y,w,h);}catch(e){}}
function tc(x,y,txt,font,color,align='center'){ctx.fillStyle=color;ctx.font=font;ctx.textAlign=align;ctx.fillText(txt,x,y);ctx.textAlign='left';}
function drawBtn(x,y,w,h,bg,border,label,font,textCol){ctx.fillStyle=bg;rr(x,y,w,h,6);ctx.strokeStyle=border;ctx.lineWidth=2;rr(x,y,w,h,6,false,true);ctx.fillStyle=textCol;ctx.font=font;ctx.textAlign='center';ctx.fillText(label,x+w/2,y+h/2+5);ctx.textAlign='left';}

// OBSTACLE DRAW — all real images
function drawCone(o){di('cone_img',o.x,o.y,o.w,o.h);}
function drawTrash(o){di('trash_img',o.x,o.y,o.w,o.h);}
function drawSedan(o){
  // Draw at correct aspect ratio using drawW, centered on hitbox
  const dw=o.drawW||o.w;
  const dx=o.x-(dw-o.w)/2; // center wider image over hitbox
  di(o.carKey||'sedan1',dx,o.y,dw,o.h);
}

// POWERUPS — heart and star, drawn floating with real images
function drawPowerups(){
  powerups.forEach(pu=>{
    if(pu.collected)return;
    const x=Math.floor(pu.x),y=Math.floor(pu.y);
    const bob=Math.sin(pu.frame*0.08)*5;
    // Star blinks
    if(pu.type==='star'&&Math.floor(pu.frame/6)%2===0&&pu.frame>10)return;
    const img=IMG[pu.type==='heart'?'heart_img':'star_img'];
    const sz=38;
    ctx.save();
    // Neon yellow aura for both power-ups — bright and unmissable
    ctx.shadowBlur=24;
    ctx.shadowColor='#FFEE00';
    // Extra outer glow ring
    ctx.strokeStyle='rgba(255,238,0,0.5)';
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x,y+bob,sz/2+6,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(255,238,0,0.2)';
    ctx.lineWidth=6;
    ctx.beginPath();ctx.arc(x,y+bob,sz/2+12,0,Math.PI*2);ctx.stroke();
    if(pu.type==='star'){
      ctx.translate(x,y+bob);
      ctx.rotate(pu.frame*0.03);
      if(img&&img.complete)try{ctx.drawImage(img,-sz/2,-sz/2,sz,sz);}catch(e){}
    } else {
      const pulse=1+Math.sin(pu.frame*0.1)*0.1;
      ctx.translate(x,y+bob);ctx.scale(pulse,pulse);
      if(img&&img.complete)try{ctx.drawImage(img,-sz/2,-sz/2,sz,sz);}catch(e){}
    }
    ctx.restore();
  });
}

// DOG — enter facing left (toward Mag), then towed behind Mag facing right
function drawDog(){
  if(!dog.visible&&!dogTow.active)return;
  const dw=58,dh=40; // true half of Mag's PH=100
  const bob=Math.abs(Math.sin((dog.waveFrame||dogTow.frame)*0.25))*5;

  if(dogTow.active){
    const pimg=IMG['dog_pull'];
    if(!pimg||!pimg.complete)return;
    // Dog on skateboard: 91x75px, faces LEFT (toward Mag) — behind Mag = lower x
    const pw=63,ph=52;
    const ropeLen=55;
    const tx=P.x-PW/2-ropeLen-pw;
    const hist=towHistory;
    const tPos=hist.length>TOW_DELAY?hist[hist.length-1-TOW_DELAY]:hist[0]||{x:P.x,y:P.y};
    const ty=Math.min(tPos.y+PH-ph+8, GROUND_Y-ph-2);
    ctx.save();
    // Rope from Mag's left/back to dog collar (right side of dog image)
    ctx.strokeStyle='#FF2D78';ctx.lineWidth=2;ctx.setLineDash([4,3]);
    ctx.beginPath();
    ctx.moveTo(P.x-PW/2,P.y+38);
    ctx.lineTo(tx+pw-6,ty+ph*0.25);
    ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=0.92;
    // Dog faces LEFT on board — correct, leash pulls him rightward behind Mag
    try{ctx.drawImage(pimg,tx,ty,pw,ph);}catch(e){}
    ctx.restore();
  } else {
    // Normal: dog enters from right scrolling left, faces LEFT toward Mag
    const dimg=IMG['dog_img'];
    if(!dimg||!dimg.complete)return;
    const x=Math.floor(dog.x);
    // Animate: alternate between two body positions to simulate running legs
    // Compress height slightly on odd frames (legs down) vs even (legs up)
    const runCycle=Math.floor(dog.waveFrame/6)%4; // 4-frame run cycle
    const legBob=runCycle<2?0:3; // body bobs up/down
    const squish=runCycle===0||runCycle===2?1:0.92; // slight body squish
    const y=GROUND_Y-dh-4;
    ctx.save();ctx.globalAlpha=0.92;
    ctx.translate(Math.floor(x+dw/2),y+dh-legBob);
    ctx.scale(1,squish);
    try{ctx.drawImage(dimg,-dw/2,-(dh),dw,dh);}catch(e){}
    ctx.globalAlpha=1;ctx.restore();
  }
}

// OLD LADY (GG) — real image, appears at 40k
function drawOldLady(){
  if(!oldLady.visible&&!ladyTow.active)return;
  if(ladyTow.active){
    const pimg=IMG['lady_pull'];
    if(!pimg||!pimg.complete)return;
    const lw=133,lh=95; // native resolution — no upscaling = sharp
    // GG is BEHIND Mag = to Mag's RIGHT on canvas
    // Mag sits at ~x=130. "Behind" = higher x = right side of screen.
    // Rope length ~100px. GG's left edge starts at Mag's right + rope.
    // Mag faces RIGHT on screen. Her BACK = LEFT = lower x.
    // GG must be to Mag's LEFT (lower x) to appear BEHIND her.
    const ropeLen=85;
    const tx=P.x-ropeLen-lw; // GG's left edge: ropeLen px behind (left of) Mag
    // Follow Mag's Y from history — GG flies up/down behind her
    const hist2=towHistory;
    const tPos2=hist2.length>TOW_DELAY?hist2[hist2.length-1-TOW_DELAY]:hist2[0]||{x:P.x,y:P.y};
    const ty=Math.min(tPos2.y+PH-lh+10, GROUND_Y-lh-4);
    ctx.save();
    // Rope from Mag's LEFT/back side to GG's right edge
    ctx.strokeStyle='#FF2D78';ctx.lineWidth=2.5;ctx.setLineDash([5,4]);
    ctx.beginPath();
    ctx.moveTo(P.x-PW/2,P.y+38); // Mag's back (left side)
    ctx.lineTo(tx+lw,ty+lh*0.4); // GG's front (right edge)
    ctx.stroke();ctx.setLineDash([]);
    ctx.globalAlpha=0.92;
    // GG faces RIGHT in the art — she's being pulled leftward, body flying right = correct
    try{ctx.drawImage(pimg,tx,ty,lw,lh);}catch(e){}
    ctx.restore();
  } else {
    const limg=IMG['lady_img'];
    if(!limg||!limg.complete)return;
    const lw=51,lh=88;
    const x=Math.floor(oldLady.x);
    const y=GROUND_Y-lh-14;
    const fadeIn=Math.min(1,(oldLady.waveFrame||1)/30);
    ctx.save();ctx.globalAlpha=0.9*fadeIn;
    try{ctx.drawImage(limg,x,y,lw,lh);}catch(e){}
    ctx.globalAlpha=1;ctx.restore();
  }
}

// SPAWN — gap enforced, frequent rails for daisy-chaining
function lastObsRight(){return obstacles.length?Math.max(...obstacles.map(o=>o.x+o.w)):-9999;}
function lastRailRight(){return rails.length?Math.max(...rails.map(r=>r.x+r.w)):-9999;}

function spawnObs(){
  if(lastRailRight()>W-80)return;
  if(lastObsRight()>W-240)return;
  // Pick obs type — avoid sedan if last obs was also a sedan (too hard to jump)
  let t;
  const smallTypes=OBS_TYPES.filter(x=>x.id!=='sedan');
  const lastWasCar=obstacles.length&&obstacles[obstacles.length-1].id==='sedan';
  if(lastWasCar){
    // Force small obs after a car
    t=smallTypes[Math.floor(Math.random()*smallTypes.length)];
  } else {
    // Sedan only 25% of the time
    t=Math.random()<0.25?OBS_TYPES.find(x=>x.id==='sedan'):smallTypes[Math.floor(Math.random()*smallTypes.length)];
  }
  const o={...t,x:W+30,y:GROUND_Y-t.h};
  if(t.id==='sedan'){
    o.carKey=Math.random()<0.5?'sedan1':'sedan2';
    // Draw car at full aspect ratio width, hitbox is narrower
    o.drawW=o.carKey==='sedan1'?250:250; // native res at h=80
  }
  obstacles.push(o);
}
function spawnRail(){
  if(lastObsRight()>W-110)return;
  // Allow close-ish gaps for daisy chains
  const minGap=50+Math.floor(Math.random()*70);
  const sx=Math.max(W+30, lastRailRight()+minGap);
  if(sx>W+250)return;
  const rw=120+Math.floor(Math.random()*100);
  rails.push({x:sx,y:GROUND_Y-28,w:rw,h:28});
}

// PARTICLES & POPUPS
function sparks(x,y,col){for(let i=0;i<8;i++)particles.push({x,y,vx:(Math.random()-.5)*5,vy:(Math.random()-1.8)*3,life:1,color:col||(Math.random()<.5?C.pk:C.yl),sz:2+Math.random()*4});}
function popup(x,y,txt,color=C.yl){popups.push({x,y,txt,color,life:1,vy:-1.8});}
function addScore(pts,lbl,col){
  const a=Math.floor(pts*GS.mult);GS.score+=a;GS.combo++;GS.comboT=130;
  GS.mult=Math.min(1+Math.floor(GS.combo/3),6);
  sfxScore();popup(P.x,P.y-15,'+'+a+(GS.mult>1?' x'+GS.mult:''),col||C.yl);
  if(lbl)popup(P.x,P.y-34,lbl,C.wh);
}
function tickParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.18;p.life-=.045;ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.sz,p.sz);});
  ctx.globalAlpha=1;
}
function tickPopups(){
  popups=popups.filter(p=>p.life>0);
  popups.forEach(p=>{p.y+=p.vy;p.life-=.028;ctx.globalAlpha=p.life;tc(p.x,p.y,p.txt,'bold 8px Press Start 2P',p.color);ctx.globalAlpha=1;});
}

// PLAYER DRAW
function drawPlayer(){
  if(P.invT>0&&Math.floor(GS.frame/4)%2===0)return;

  // Kevin crash slide-off — Kevin hurt sprite scrolling left, then gone
  if(kevTow.crashing){
    const kc=IMG['kev_crash'];
    if(kc&&kc.complete){
      kevTow.crashFrame++;
      kevTow.crashX-=spd*0.6; // Kevin slides off left slower than bg
      const alpha=Math.max(0,1-kevTow.crashFrame/80);
      ctx.save();ctx.globalAlpha=alpha;
      try{ctx.drawImage(kc,kevTow.crashX-40,GROUND_Y-96,80,96);}catch(e){}
      ctx.restore();
    }
    if(kevTow.crashFrame>90){kevTow.crashing=false;}
    // Also draw Mag normally during Kevin crash
  }

  // Kevin active — show Kevin+Mag combined sprite matching player state
  if(kevTow.active){
    let ksp='kev_idle',kw=117,kh=112;
    if(P.state==='ollie'||P.state==='grind')   {ksp='kev_ollie';   kw=112;kh=118;}
    if(P.state==='kickflip')                    {ksp='kev_kickflip';kw=113;kh=122;}
    // No crash sprite here — crash handled above via shield
    const kimg=IMG[ksp];
    if(kimg&&kimg.complete){
      try{ctx.drawImage(kimg,P.x-kw/2,P.y+(PH-kh),kw,kh);}catch(e){}
    }
    return;
  }

  // Normal Mag sprites
  let sp='idle',sw=PW,sh=PH;
  if(P.state==='crash')    {sp='crash';    sw=100;sh=85;}
  else if(P.state==='kickflip'){sp='kickflip';sw=82; sh=100;}
  else if(P.state==='ollie')  {sp='ollie';   sw=70; sh=95;}
  else if(P.state==='grind')  {sp='grind';   sw=94; sh=112;}
  di(sp,P.x-sw/2,P.y-(sh-PH),sw,sh);
}

  ctx.textAlign='left';
  for(let i=0;i<3;i++){ctx.font='15px sans-serif';ctx.fillText(i<GS.lives?'🩷':'🖤',W-26-i*24,22);}
  // Shield badge — below hearts, right side, no overlap
  if(towedChar){
    ctx.fillStyle='rgba(0,0,0,0.5)';rr(W-68,28,60,20,4);
    ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(towedChar==='dog'?'🐕🛡️':towedChar==='kevin'?'🤙🛡️':'👵🛡️',W-38,43);ctx.textAlign='left';
  }
  // Touch buttons — only draw on touch devices (phone/tablet)
  if(GS.state==='playing'&&'ontouchstart' in window){
    ctx.save();
    // Forward button (left side)
    const fAlpha=touchForward?0.55:0.22;
    ctx.globalAlpha=fAlpha;
    ctx.fillStyle=touchForward?C.pk:'rgba(255,255,255,0.9)';
    rr(4,H-52,BTN_W-8,44,10);ctx.fill();
    ctx.globalAlpha=touchForward?0.95:0.45;
    ctx.fillStyle=touchForward?'#fff':C.wh;
    ctx.font='8px Press Start 2P';ctx.textAlign='center';
    ctx.fillText('▶ PUSH',BTN_W/2,H-25);

    const jAlpha=0.22;
    ctx.globalAlpha=jAlpha;
    ctx.fillStyle='rgba(255,255,255,0.9)';
    rr(BTN_W+4,H-52,W-BTN_W-8,44,10);ctx.fill();
    ctx.globalAlpha=0.45;ctx.fillStyle=C.wh;
    ctx.fillText('▲ JUMP',BTN_W+(W-BTN_W)/2,H-25);
    // Divider
    ctx.globalAlpha=0.1;ctx.strokeStyle='#fff';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(BTN_W,H-56);ctx.lineTo(BTN_W,H);ctx.stroke();
    ctx.restore();
  }
  const s=Math.max(0,Math.floor((spd-BASE_SPD)*10));
  ctx.fillStyle='rgba(0,0,0,0.45)';rr(W-68,28,60,20,4);
  tc(W-38,42,'SPD+'+(s),'5px Press Start 2P',C.pu);
  if(GS.combo>1){
    // Combo sits below score box (y=60), left side — away from hearts and shield
    ctx.save();const pulse=1+Math.sin(GS.frame*.14)*.07;ctx.translate(70,64);ctx.scale(pulse,pulse);
    ctx.fillStyle='rgba(0,0,0,0.6)';rr(-62,-12,124,22,4);
    tc(0,5,'x'+GS.combo+' COMBO','8px Press Start 2P',C.yl);ctx.restore();
  }
  if(P.stTimer>0&&(P.state==='kickflip'||P.state==='grind')){
    const lbl=P.state==='kickflip'?'KICKFLIP! 💀':'GRINDIN! ⚡';
    ctx.save();ctx.shadowColor=P.state==='kickflip'?C.pk:C.yl;ctx.shadowBlur=10;
    tc(W/2,H-72,lbl,'8px Press Start 2P',P.state==='kickflip'?C.pk:C.yl);ctx.restore();
  }
  drawStarHUD();
  // Fade-out controls hint
  if(GS.frame<320){
    ctx.globalAlpha=Math.max(0,(320-GS.frame)/320);
    ctx.fillStyle='rgba(0,0,0,0.42)';rr(W/2-118,H-28,236,20,4);
    tc(W/2,H-14,'SPACE=JUMP  SPACE×2=FLIP  AUTO-GRIND','5px Press Start 2P','rgba(255,255,255,0.75)');
    ctx.globalAlpha=1;
  }
}

// INPUT
const keys={};
let txS=0,tyS=0,ttS=0,tiltG=0,tiltOn=false;
let touchForward=false; // left btn held = push Mag right
let activeTouches={}; // id->zone
const BTN_W=160; // left 160px = forward button; rest = jump

document.addEventListener('keydown',e=>{
  if(keys[e.code])return;
  keys[e.code]=true;
  if(GS.state==='playing'){
    AC.resume();
    if(e.code==='Space'||e.code==='ArrowUp'){
      const now=Date.now();
      if(now-lastSpaceUp<320&&!P.onGround){doFlip();}
      else{doJump();}
    }
  }
  if(GS.state==='dead'){
    if(e.key==='Backspace'){GS.name=GS.name.slice(0,-1);return;}
    if(e.key==='Enter'&&GS.name&&!GS.submitted){submitScore();return;}
    if(e.key.length===1&&GS.name.length<12)GS.name+=e.key.toUpperCase();
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='Space'||e.code==='ArrowUp')lastSpaceUp=Date.now();
  keys[e.code]=false;
});
window.addEventListener('deviceorientation',e=>{if(e.gamma!==null){tiltOn=true;tiltG=e.gamma;}});

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();AC.resume();
  const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches){
    const gx=(t.clientX-r.left)*(W/r.width);
    const gy=(t.clientY-r.top)*(H/r.height);
    if(GS.state==='title'&&GS.lbOK){startGame();return;}
    if(GS.state==='dead'){txS=gx;tyS=gy;ttS=Date.now();continue;}
    if(GS.state!=='playing')continue;
    const zone=gx<BTN_W?'fwd':'jump';
    activeTouches[t.identifier]=zone;
    if(zone==='fwd')touchForward=true;
    else{txS=gx;tyS=gy;ttS=Date.now();}
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  for(const t of e.changedTouches){
    const gx=(t.clientX-r.left)*(W/r.width);
    const gy=(t.clientY-r.top)*(H/r.height);
    if(GS.state==='dead'){handleDeadTouch(gx,gy);continue;}
    if(GS.state!=='playing'){delete activeTouches[t.identifier];continue;}
    const zone=activeTouches[t.identifier];
    if(zone==='jump'){
      const now=Date.now();
      if(Math.hypot(gx-txS,gy-tyS)<60&&(now-ttS)<320){
        if(now-lastTapTime<320&&!P.onGround){doFlip();}
        else{doJump();}
        lastTapTime=now;
      }
    }
    delete activeTouches[t.identifier];
  }
  touchForward=Object.values(activeTouches).some(z=>z==='fwd');
},{passive:false});

canvas.addEventListener('click',e=>{
  const r=canvas.getBoundingClientRect();
  const x=(e.clientX-r.left)*(W/r.width),y=(e.clientY-r.top)*(H/r.height);
  if(GS.state==='title'&&GS.lbOK){startGame();return;}
  if(GS.state==='dead'){handleDeadTouch(x,y);}
});

function handleDeadTouch(x,y){
  // Tap name input area — show mobile keyboard
  if(!GS.submitted&&y>193&&y<227&&x>W/2-130&&x<W/2+130){showNameInput();return;}
  if(GS.name&&!GS.submitted&&y>232&&y<258&&x>W/2-94&&x<W/2+94){submitScore();hideNameInput();return;}
  if(y>264&&y<292){restartGame();return;}
  if(y>H-62&&y<H-36){
    if(x<W/2-4){window.open('https://venmo.com/epecho','_blank');return;}
    if(x>W/2+4){window.open('https://asherarcade.com','_blank');return;}
  }
}

// ACTIONS
function doJump(){
  if(P.state==='crash')return;
  if(P.state==='grind'){
    // Jump off grind
    P.grindRail=null;P.state='ollie';P.stTimer=22;
    P.vy=-12.5;P.onGround=false;P.justLeftGrind=18;
    sfxJump();addScore(80,'GRIND JUMP! 🛹',C.yl);return;
  }
  if(!P.onGround)return;
  sfxJump();P.vy=-12;P.onGround=false;P.state='ollie';P.stTimer=22;
  addScore(40,'OLLIE!',C.pu);
}
function doFlip(){
  if(P.state==='crash')return;
  if(!P.onGround){
    // Max 2 mid-air flips before landing/grinding again
    if(P.flipCount>=2)return;
    P.flipCount++;
    sfxFlip();P.state='kickflip';P.stTimer=40;
    if(P.vy>-2)P.vy=-6;
    addScore(150,'KICKFLIP! 💀',C.pk);
  } else {
    P.flipCount=1;
    sfxFlip();P.vy=-10;P.onGround=false;P.state='kickflip';P.stTimer=40;
    addScore(100,'KICKFLIP!',C.pk);
  }
}

// UPDATE
function update(){
  GS.frame++;bgOff+=spd;
  spdT++;if(spdT>280){spdT=0;spd=Math.min(spd+.35,15);}
  if(GS.comboT>0)GS.comboT--;else{GS.combo=0;GS.mult=1;}
  if(P.justLeftGrind>0)P.justLeftGrind--;

  // Lean
  if(tiltOn)P.vx=Math.max(-3,Math.min(3,tiltG*.12));
  else if(keys['ArrowLeft']||keys['KeyA'])P.vx=-2.5;
  else if(keys['ArrowRight']||keys['KeyD'])P.vx=2.5;
  else if(touchForward)P.vx=2.5; // forward button held
  else if(towedChar){P.vx=Math.min(P.vx+0.08,1.5);} // auto-drift forward when towing so tow is visible
  else P.vx*=.82; // drift back to natural position
  P.x=Math.max(38,Math.min(225,P.x+P.vx));
  // Record player position history for tow rope delayed follow
  towHistory.push({x:P.x,y:P.y});
  if(towHistory.length>TOW_DELAY+20)towHistory.shift();

  // Physics
  if(P.state==='grind'&&P.grindRail){
    // If grinding a moving obstacle (car), sync the grindRail x with the obs
    if(P.grindObs){P.grindRail.x=P.grindObs.x;}
    P.y=P.grindRail.y-PH;P.vy=0;
    if(GS.frame%25===0)addScore(20,null,C.yl);
    sparks(P.x+20,P.y+PH,C.yl);
  } else {
    P.vy+=GV;P.y+=P.vy;
  }

  // Ground landing
  if(P.y+PH>=GROUND_Y){
    P.y=GROUND_Y-PH;P.vy=0;P.onGround=true;
    if(P.state!=='idle'&&GS.lives>0){P.state='idle';P.stTimer=0;} // don't reset if final crash
    P.grindRail=null;P.flipCount=0;
  }

  // Land on flat tops (trash lid)
  if(P.state!=='grind'&&!P.onGround&&P.vy>0){
    for(const o of obstacles){
      if(!o.landable)continue;
      const px=P.x-HB_W/2,pw=HB_W;
      if(px<o.x+o.w-4&&px+pw>o.x+4&&P.y+PH>o.y-2&&P.y+PH<o.y+16){
        P.y=o.y-PH;P.vy=0;P.onGround=true;
        if(P.state!=='idle'){P.state='idle';P.stTimer=0;}
        break;
      }
    }
  }

  // Auto-grind snap — rails and grindable obstacles
  if(P.justLeftGrind===0&&!P.onGround&&P.vy>=0&&P.state!=='grind'){
    // Rails
    for(const r of rails){
      const px=P.x-HB_W/2;
      if(px+HB_W>r.x&&px<r.x+r.w&&P.y+PH>r.y-10&&P.y+PH<r.y+22){
        snapGrind(r);break;
      }
    }
    // Grindable obstacles (sedan roof)
    if(P.state!=='grind'){
      for(const o of obstacles){
        if(!o.grindable||o.topFlat)continue;
        const roofY=o.y+o.h*(o.roofY||0);
        const px=P.x-HB_W/2;
        if(px+HB_W>o.x+8&&px<o.x+o.w-8&&P.y+PH>roofY-10&&P.y+PH<roofY+20){
          snapGrind({x:o.x,y:roofY,w:o.w,h:10},true,o.id==='sedan'?'CAR GRIND! 🚗':'GRIND! ⚡',o);break;
        }
      }
    }
  }

  function snapGrind(target,isObs=false,label='GRINDIN! ⚡',obsRef=null){
    P.state='grind';P.stTimer=999;P.y=target.y-PH;P.vy=0;P.onGround=true;P.grindRail=target;
    P.grindObs=obsRef; // track actual obstacle obj so we can follow its x as it moves
    P.flipCount=0;
    sfxGrind();addScore(isObs?250:200,label,C.yl);
  }

  // Grind end — fell off edge
  if(P.state==='grind'&&P.grindRail){
    const r=P.grindRail;
    if(P.x+HB_W/2<r.x-5||P.x-HB_W/2>r.x+r.w+5){
      P.grindRail=null;P.grindObs=null;P.state='ollie';P.stTimer=14;P.vy=-1.5;P.onGround=false;P.justLeftGrind=18;
    }
  }

  // State timer
  if(P.stTimer>0){P.stTimer--;if(P.stTimer===0&&P.state!=='grind')P.state=P.onGround?'idle':'ollie';}
  if(P.invT>0)P.invT--;

  // Spawn
  obsT++;const oi=Math.max(80-(spd-BASE_SPD)*6|0,42);if(obsT>oi){obsT=0;if(Math.random()>.3)spawnObs();}
  railT++;const ri=Math.max(110-(spd-BASE_SPD)*7|0,55);if(railT>ri){railT=0;spawnRail();}
  // Powerup spawn — heart very rare (1%), star rare (2%), only one at a time
  // Hearts only — ultra rare (star removed)
  if(powerups.filter(p=>!p.collected).length===0&&Math.random()<0.0006){
    const floatY=GROUND_Y-80-Math.random()*40;
    powerups.push({type:'heart',x:W+40,y:floatY,frame:0,collected:false});
  }

  obstacles.forEach(o=>o.x-=spd);
  rails.forEach(r=>r.x-=spd);
  // Powerups — scroll and collect
  powerups.forEach(pu=>{
    pu.x-=spd;pu.frame++;
    if(pu.collected)return;
    // Collect check
    if(Math.abs(P.x-pu.x)<44&&Math.abs(P.y+50-pu.y)<44){
      pu.collected=true;
      if(pu.type==='heart'){
        if(GS.lives<3){GS.lives++;sfxPowerup('heart');}
        popup(P.x,P.y-20,'❤️ EXTRA LIFE!','#FF2D78');
      } else {
        starTimer=300;P.invT=300;sfxPowerup('star');
        popup(P.x,P.y-20,'⭐ STAR POWER!','#FFE600');
      }
    }
  });
  if(starTimer>0)starTimer--;
  powerups=powerups.filter(p=>p.x>-60&&!p.collected||(p.collected&&p.frame<30));

  // Collision — only side hits, not top
  if(P.invT===0&&P.state!=='crash'&&starTimer===0){
    const px=P.x-HB_W/2+2,py=P.y+HB_TOP,pw=HB_W-4,ph=HB_H;
    for(const o of obstacles){
      // Skip if player is clearly on top
      if(P.y+PH<=o.y+4)continue;
      // For trash: skip if player landing on lid
      if(o.landable&&P.y+PH<=o.y+12)continue;
      if(px<o.x+o.w-2&&px+pw>o.x+2&&py<o.y+o.h&&py+ph>o.y+4){hitObs();break;}
    }
  }

  GS.score+=spd*.018*GS.mult;
  if(GS.score>GS.best)GS.best=GS.score;

  // Dog — repeats every 25k
  // Dog spawning handled by charQueue above
  if(dog.visible&&!dogTow.active){
    dog.waveFrame++;dog.phaseTimer++;
    dog.x-=spd; // scroll with bg during enter
    // Tow activates when dog.x passes to LEFT of Mag (Mag has overtaken the dog)
    // dog.x < P.x means dog is now to Mag's left = Mag passed it
    if(dog.x<P.x-10){
      if(P.onGround){
        if(towedChar==='kevin'){
          // Kevin riding + grab dog = x4 multiplier AND dog tow (double shield!)
          GS.mult=Math.min(GS.mult*4,16); // x4 multiplier, cap at 16x
          dogTow.active=true;dogTow.frame=0;
          // Keep Kevin AND add dog — towedChar stays 'kevin', dog just boosts score
          addScore(1000,'🐕+🤙 x4 POINTS!',C.yl);sfxPowerup('star');
          popup(P.x,P.y-50,'x4 SCORE! 🔥',C.yl);
          dog.visible=false;
        } else {
          // Normal tow — release lady if held, grab dog
          if(towedChar==='lady'){ladyTow.active=false;}
          dogTow.active=true;dogTow.frame=0;towedChar='dog';
          dog.visible=false;
          addScore(500,'DOG TOWED! 🐕',C.yl);sfxPowerup('star');
          popup(P.x,P.y-50,'🛡️ SHIELD!',C.yl);
        }
      } else {
        // Jumped over — keep scrolling naturally
      }
    }
    if(dog.x<-120)dog.visible=false;
  }
  if(dogTow.active){
    dogTow.frame++;
    if(dogTow.frame>=dogTow.duration){
      dogTow.active=false;
    }
  }
  // Character queue — spawn next character when score threshold reached
  if(charQueue.length>0&&GS.score>=charQueue[0].score){
    const next=charQueue.shift();
    if(next.type==='lady'&&!ladyTow.active){
      oldLady.triggered=true;oldLady.visible=true;oldLady.x=W+60;oldLady.waveFrame=0;oldLady.shown=false;
    } else if(next.type==='dog'&&!dogTow.active){
      dog.visible=true;dog.x=W+80;dog.waveFrame=0;dog.phase='enter';dog.phaseTimer=0;
    } else if(next.type==='kevin'&&!kevTow.active){
      waveGuy.triggered=true;waveGuy.visible=true;waveGuy.x=W+60;waveGuy.waveFrame=0;waveGuy.shown=false;
    }
  }
  // Old lady — enters right, scrolls with bg, Mag triggers tow when passing
  if(oldLady.visible&&!ladyTow.active){oldLady.triggered=true;}
  if(!oldLady.triggered&&GS.score>=LADY_SCORE){oldLady.triggered=true;oldLady.visible=true;oldLady.x=W+60;oldLady.waveFrame=0;}
  if(oldLady.visible&&!ladyTow.active){
    oldLady.x-=spd;oldLady.waveFrame++;
    // When Mag passes lady — tow activates
    if(oldLady.x<P.x+60&&oldLady.x>P.x-100&&!oldLady.shown){
      oldLady.shown=true;
      // Tow triggers on any contact — ground OR low jump (within 40px of ground)
      const nearGround = P.y+PH > GROUND_Y-40;
      if(nearGround){
        if(towedChar==='dog'){dogTow.active=false;}
        ladyTow.active=true;ladyTow.frame=0;towedChar='lady';
        addScore(750,'GG TOWED! 👵',C.pk);sfxPowerup('star');
        popup(P.x,P.y-50,'🛡️ SHIELD!',C.pk);
      } else {
        // High jump over — no tow, keep scrolling
        oldLady.visible=true; // don't hide, let her scroll off
      }
    }
    if(oldLady.x<-80&&!ladyTow.active){oldLady.visible=false;}
  }
  if(ladyTow.active){
    ladyTow.frame++;
    if(ladyTow.frame>=ladyTow.duration){ladyTow.active=false;oldLady.visible=false;}
  }
  // Kevin spawning handled by charQueue above
  if(waveGuy.visible&&!kevTow.active){
    waveGuy.x-=spd;waveGuy.waveFrame++;
    waveGuy.armAngle=Math.sin(waveGuy.waveFrame*0.15)*0.7;
    if(waveGuy.x<P.x+40&&waveGuy.x>P.x-60&&!waveGuy.shown){
      waveGuy.shown=true;
      if(P.onGround){
        if(towedChar==='dog'){dogTow.active=false;}
        else if(towedChar==='lady'){ladyTow.active=false;oldLady.visible=false;}
        kevTow.active=true;kevTow.frame=0;towedChar='kevin';waveGuy.visible=false;
        addScore(1000,'KEVIN RIDE! 🤙',C.pk);sfxPowerup('star');
        popup(P.x,P.y-50,'🛡️ SHIELD!',C.pk);
      }
    }
    if(waveGuy.x<-80){waveGuy.visible=false;}
  }
  if(kevTow.active){kevTow.frame++;}
  obstacles=obstacles.filter(o=>o.x+o.w>-100);
  rails=rails.filter(r=>r.x+r.w>-40);
}

function hitObs(){
  // If towing someone, they absorb the crash (shield hit) — release them instead of losing life
  if(towedChar){
    sfxCrash();
    if(towedChar==='dog'){dogTow.active=false;}
    else if(towedChar==='lady'){ladyTow.active=false;oldLady.visible=false;}
    else if(towedChar==='kevin'){
      // Kevin crash animation — he slides off left while Mag takes over
      kevTow.crashing=true;kevTow.crashX=P.x-60;kevTow.crashFrame=0;
      kevTow.active=false;
    }
    towedChar=null;
    P.invT=200;P.vy=-5;P.state='crash';P.stTimer=60;
    P.grindRail=null;P.grindObs=null;P.onGround=false;
    sparks(P.x,P.y+50,'#FFE600');
    popup(P.x,P.y-40,'SHIELD BROKE!','#FFE600');
    return;
  }
  sfxCrash();GS.lives--;GS.combo=0;GS.mult=1;GS.comboT=0;
  sparks(P.x,P.y+50,C.pk);P.state='crash';P.invT=140;P.vy=-4;P.grindRail=null;P.grindObs=null;P.onGround=false;
  if(GS.lives<=0){
    GS.lives=0;P.stTimer=9999;spd=0;
    setTimeout(()=>{GS.state='dead';setTimeout(showNameInput,300);},800);
  } else {
    P.stTimer=95;
  }
}

  ctx.fillStyle='rgba(255,255,255,0.05)';rr(rx+12,H-108,rw-24,76,4);
  tc(mx,H-100,'SPACE = OLLIE','5px Press Start 2P','rgba(255,255,255,0.8)');
  tc(mx,H-87,'SPACE×2 = KICKFLIP','5px Press Start 2P','rgba(255,255,255,0.65)');
  tc(mx,H-74,'LAND ON RAILS & CARS = GRIND','4px Press Start 2P',C.pk);
  tc(mx,H-61,'JUMP OFF GRIND = BONUS!','4px Press Start 2P',C.yl);
  tc(mx,H-48,'PICK UP FRIENDS = DOUBLE POINTS','4px Press Start 2P',C.pk);
  if(GS.lbOK){
    const pulse=0.96+Math.sin(GS.frame*.09)*.04,bw=rw-24;
    ctx.save();ctx.translate(mx,H-22);ctx.scale(pulse,pulse);
    drawBtn(-bw/2,-16,bw,26,C.pk,C.wh,"LET'S SHRED! 🛹",'7px Press Start 2P',C.wh);ctx.restore();
  }
}

// DEAD SCREEN — fully stacked, precise y coords, no overlaps
// crash sprite:  y=18 h=85 → bottom=103
// score panel:   y=110 h=78 → bottom=188
// name input:    y=196 h=28 → bottom=224
// submit btn:    y=232 h=24 → bottom=256  (conditional)
// play again:    y=264 h=26 → bottom=290
// [gap 8px]
// bottom btns:   y=300 h=24 → bottom=324
// footer:        y=352
function drawDead(){
  drawBg();ctx.fillStyle='rgba(0,0,0,0.72)';ctx.fillRect(0,0,W,H);
  di('crash',W/2-52,18,104,85);
  // Score panel
  ctx.fillStyle='rgba(0,0,0,0.65)';rr(W/2-150,110,300,78,8);
  ctx.strokeStyle=C.pk;ctx.lineWidth=2;rr(W/2-150,110,300,78,8,false,true);
  ctx.save();ctx.shadowColor=C.pk;ctx.shadowBlur=10;tc(W/2,132,'BAILED! 💀','13px Press Start 2P',C.pk);ctx.restore();
  tc(W/2,150,'SCORE: '+Math.floor(GS.score),'7px Press Start 2P',C.wh);
  tc(W/2,166,'BEST:  '+Math.floor(GS.best),'7px Press Start 2P',C.yl);
  tc(W/2,182,'MAX COMBO: x'+GS.mult,'5px Press Start 2P','rgba(155,0,255,0.85)');
  // Name input
  ctx.fillStyle='rgba(155,0,255,0.22)';rr(W/2-126,196,252,28,5);
  ctx.strokeStyle=C.pu;ctx.lineWidth=1.5;rr(W/2-126,196,252,28,5,false,true);
  tc(W/2,215,(!GS.submitted?'NAME: ':'')+(GS.name||'')+(GS.frame%28<14&&!GS.submitted?'|':''),'6px Press Start 2P',C.wh);
  // Submit btn
  if(!GS.submitted&&GS.name){drawBtn(W/2-94,232,188,24,C.pk,C.wh,'SUBMIT SCORE','6px Press Start 2P',C.wh);}
  else if(GS.submitted){tc(W/2,246,'SCORE SAVED! 🤙','6px Press Start 2P',C.yl);}
  // Play again
  drawBtn(W/2-82,264,164,26,'rgba(120,0,200,0.9)',C.pu,'▶ PLAY AGAIN','6px Press Start 2P',C.wh);
  // Bottom row — two equal buttons, clearly separated
  const half=(W-48)/2;
  drawBtn(20,300,half,24,'rgba(22,88,180,0.92)','rgba(80,140,255,0.8)','☕ BUY ME A COFFEE','5px Press Start 2P',C.wh);
  drawBtn(28+half,300,half,24,'rgba(170,0,45,0.92)',C.pk,'🎮 GET YOUR OWN GAME','4px Press Start 2P',C.wh);
  tc(W/2,H-8,'ASHER ARCADE © 2026 • asherarcade.com','4px Press Start 2P','rgba(255,255,255,0.28)');
}

// LEADERBOARD
const SCRIPT='https://script.google.com/macros/s/AKfycbyyUVE6Shxr1wX0eoobi6mXxQlmsydh5d1bWPJe3CUHyWyttYFCCyPQRfXKJ6x_aRxn/exec';
const KEY='mags_skate_lb_v1';
function fetchLB(){GS.lbOK=false;fetch(SCRIPT+'?key='+KEY).then(r=>r.json()).then(d=>{const a=Array.isArray(d)?d:(d?.scores||[]);GS.lb=a.sort((a,b)=>b.score-a.score).slice(0,10);GS.lbOK=true;}).catch(()=>{GS.lbOK=true;GS.lb=[];});}
function submitScore(){fetch(SCRIPT+'?key='+KEY+'&name='+encodeURIComponent(GS.name||'ANON')+'&score='+Math.floor(GS.score),{mode:'no-cors'}).catch(()=>{});GS.submitted=true;setTimeout(()=>fetchLB(),1500);}

// FLOW
function startGame(){Object.assign(GS,{state:'playing',score:0,lives:3,combo:0,mult:1,comboT:0,frame:0,name:'',submitted:false});spd=BASE_SPD;obsT=0;railT=0;spdT=0;bgOff=0;buildCharQueue();touchForward=false;activeTouches={};obstacles=[];rails=[];particles=[];popups=[];waveGuy={shown:false,triggered:false,x:W+60,visible:false,waveFrame:0,armAngle:0};
    oldLady={shown:false,triggered:false,x:W+60,visible:false,waveFrame:0};
    dog={triggered:false,x:W+60,visible:false,waveFrame:0,nextAt:DOG_SCORE,chasing:false};initP();}
function restartGame(){hideNameInput();GS.state='title';GS.lbOK=false;fetchLB();}

// MAIN LOOP
// Draw order: bg → rails → obstacles → PLAYER → poles (player goes behind pole) → particles → popups → HUD
function loop(){
  ctx.clearRect(0,0,W,H);GS.frame++;
  if(GS.state==='title'){drawTitle();}
  else if(GS.state==='playing'){
    update();GS.frame--;
    drawBg();
    drawPowerups();
    drawDog();
    drawOldLady();
    drawWaveGuy();
    drawRails();
    obstacles.forEach(o=>{ctx.save();o.draw(o);ctx.restore();});
    drawPlayer();
    drawPoles();   // poles drawn AFTER player — skater goes behind
    tickParticles();tickPopups();drawHUD();
  }
  else if(GS.state==='dead'){drawDead();}
  requestAnimationFrame(loop);
}

buildCharQueue();fetchLB();
loadImages().then(()=>requestAnimationFrame(loop));
</script>
