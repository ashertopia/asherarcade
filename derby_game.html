function loadImages() {
  return Promise.all(Object.entries(ASSETS).map(([k, src]) => {
    return new Promise(resolve => {
      const img = new Image();
      img.onload  = () => { IMG[k] = img; resolve(); };
      img.onerror = () => { console.warn('Failed:', k); resolve(); };
      img.src = src;
    });
  }));
}

// ============================================================
// HORSE GENERATION — stats are CONSISTENT
// ============================================================
function generateHorses() {
  const flavors = [
    "Surges late","Hates Mondays","Always hungry","Never quits",
    "Hates the rain","Pure athlete","Loves the crowd","Needs coffee",
    "Silent killer","Weekend warrior","Morning person","Chaos agent",
    "Underestimated","Dark horse","Front runner","Crowd favorite",
    "Feeling lucky","Running hot","Off his game","Peaked last week"
  ];
  const shuffled = [...flavors].sort(()=>Math.random()-0.5);
  horses = CONFIG.racers.map((r, i) => {
    const power = 40 + Math.random() * 60;
    const winRate = 0.3 + (power / 100) * 0.55;
    const totalRaces = 10 + Math.floor(Math.random() * 15);
    const wins   = Math.round(totalRaces * winRate);
    const losses = totalRaces - wins;
    const form = Array.from({length:5}, () => Math.random() < winRate ? 'W' : 'L');
    return {
      ...r, power, wins, losses, form,
      flavor: shuffled[i],
      lane: i,
      x: 0, baseSpeed: 0, currentSpeed: 0,
      poisoned: false, boosted: false,
      finished: false, dnf: false, finishTime: Infinity,
      wobblePhase: Math.random()*Math.PI*2,
      surgeTimer: 2 + Math.random()*3,
      surging: false, stumbling: false,
      mood: '💪 STEADY', moodColor: '#aaa', scoutTip: '',
    };
  });
  recalcOdds();
  generateScoutReport();
}

function recalcOdds() {
  const powers = horses.map(h=>h.power);
  const min = Math.min(...powers), max = Math.max(...powers);
  horses.forEach(h => {
    // norm=1 means strongest horse → lowest payout (favorite)
    // norm=0 means weakest horse → highest payout (longshot)
    const norm = (h.power - min) / (max - min + 1);
    // Favorite gets 1.2x–1.8x, longshot gets 3.0x–5.0x
    h.odds = parseFloat((1.2 + (1 - norm) * 3.8).toFixed(1));
  });
}

// Generate scout report for each horse based on this round's hidden power
function generateScoutReport() {
  const powers = horses.map(h=>h.power);
  const avg = powers.reduce((a,b)=>a+b,0)/powers.length;
  const hotTips    = ['Looking sharp in warm-ups','Trainer says feeling great','Best time in practice this week','Confident stride today','Eyes are bright, ready to run'];
  const coldTips   = ['Seemed sluggish at the gate','Trainer looking worried','Off pace in morning drills','Not himself today','Refused feed this morning'];
  const steadyTips = ['Consistent as always','Nothing unusual to report','Hard to read this one','Mid-pack energy today','Keeping cards close'];
  const wrongTips  = ["Heard a rumour, take it or leave it","My source was drunk","Could go either way honestly","I may have mixed up my notes","Don't quote me on this one"];
  horses.forEach(h => {
    const rel = h.power - avg;
    const noisy = rel + (Math.random()-0.5)*20;
    const scoutWrong = Math.random() < 0.30;
    if (scoutWrong) {
      h.mood = noisy > 8 ? '🥶 COLD' : noisy < -8 ? '🔥 HOT' : '❓ UNSURE';
      h.moodColor = noisy > 8 ? '#3498db' : noisy < -8 ? '#e74c3c' : '#888';
      h.scoutTip = wrongTips[Math.floor(Math.random()*wrongTips.length)];
    } else if (noisy > 10) {
      h.mood = '🔥 HOT';    h.moodColor = '#e74c3c';
      h.scoutTip = hotTips[Math.floor(Math.random()*hotTips.length)];
    } else if (noisy < -10) {
      h.mood = '🥶 COLD';   h.moodColor = '#3498db';
      h.scoutTip = coldTips[Math.floor(Math.random()*coldTips.length)];
    } else {
      h.mood = '💪 STEADY'; h.moodColor = '#aaa';
      h.scoutTip = steadyTips[Math.floor(Math.random()*steadyTips.length)];
    }
  });
}

// Called each round — re-rolls hidden speed/stamina so the same horse
// doesn't always win. Keeps visible record/form history intact.
function refreshRoundStats() {
  const flavors = [
    "Surges late","Hates Mondays","Always hungry","Never quits",
    "Hates the rain","Pure athlete","Loves the crowd","Needs coffee",
    "Silent killer","Weekend warrior","Morning person","Chaos agent",
    "Underestimated","Dark horse","Front runner","Crowd favorite",
    "Feeling lucky","Running hot","Off his game","Peaked last week"
  ];
  // Shuffle flavors so each horse gets a unique one
  const shuffled = [...flavors].sort(()=>Math.random()-0.5);
  horses.forEach((h, i) => {
    h.power = 30 + Math.random() * 70;
    h.flavor = shuffled[i % shuffled.length];
    h.poisoned = false; h.boosted = false;
    h.surging = false; h.stumbling = false;
  });
  recalcOdds();
  generateScoutReport();
}

// ============================================================
// RACE ENGINE — TARGET 12–15 SECONDS, DRAMATIC
// ============================================================
// Track is exactly W pixels wide (360). Horses race across screen.
// All 5 lanes visible at once. No camera scroll needed — fixed view.
// Speed is tuned so winner finishes in ~12–15s from a standing start.

const RACE_START_X = 20;   // px from left where horses begin
const FINISH_X     = 310;  // px from left — finish line
const RACE_DIST    = FINISH_X - RACE_START_X; // 290px to travel

// At target speed: 290px / 13s ≈ 22.3 px/s average
// Power range 40–100 → speed range 18–28 px/s baseline
// This gives winner ~10–16s depending on stats. Perfect.

let raceStartTime  = 0;
let raceFinished   = false;
let raceWinner     = null;
let postRaceTimer  = 0; // seconds to show winner overlay before auto-advance offer

function initRace() {
  horses.forEach(h => {
    h.x = RACE_START_X;
    h.finished = false; h.dnf = false; h.finishTime = Infinity;
    // Base speed: 18–28 px/s from power
    h.baseSpeed   = 18 + (h.power/100)*10;
    h.currentSpeed = h.baseSpeed;
    if (h.boosted)  h.currentSpeed *= 1.35;
    if (h.poisoned) h.currentSpeed *= 0.30;
    h.surgeTimer  = 1.5 + Math.random()*2.5;
    h.surging     = false;
    h.stumbling   = false;
  });
  raceResults    = [];
  raceFinished   = false;
  raceWinner     = null;
  postRaceTimer  = 0;
  raceStartTime  = performance.now();
}

function updateRace(now) {
  const dt = Math.min(0.05, (now - (updateRace._last||now)) / 1000);
  updateRace._last = now;
  const elapsed = (now - raceStartTime)/1000;

  if (raceFinished) {
    postRaceTimer += dt;
    return;
  }

  let anyStillRacing = false;

  horses.forEach(h => {
    if (h.finished || h.dnf) return;
    anyStillRacing = true;

    // Surge / stumble timer — creates position swaps
    h.surgeTimer -= dt;
    if (h.surgeTimer <= 0) {
      const roll = Math.random();
      if (roll < 0.45) {
        // Surge
        h.surging = true; h.stumbling = false;
        h.surgeTimer = 1.0 + Math.random()*1.5;
      } else if (roll < 0.75) {
        // Stumble (less likely for high-power horses)
        const stumbleChance = 1 - h.power/120;
        if (Math.random() < stumbleChance) {
          h.stumbling = true; h.surging = false;
        }
        h.surgeTimer = 0.8 + Math.random()*1.2;
      } else {
        h.surging = false; h.stumbling = false;
        h.surgeTimer = 1.0 + Math.random()*2.0;
      }
    }

    // Calculate this frame's speed
    let spd = h.baseSpeed;
    if (h.boosted)   spd *= 1.35;
    if (h.poisoned)  spd *= 0.30;
    if (h.surging)   spd *= 1.28;
    if (h.stumbling) spd *= 0.65;

    // Small per-frame noise (consistency limits variance)
    const consistency = h.power / 100; // 0.4–1.0
    const noise = 1 + (Math.random()-0.5) * (1-consistency) * 0.25;
    spd *= noise;

    h.currentSpeed = spd;
    h.x += spd * dt;

    // Poisoned horse: after 3s start drifting back
    // Poisoned: slow but NOT guaranteed DNF — drifts back but still finishes last-ish
    if (h.poisoned && elapsed > 2.5) {
      // Drift back slowly — creates visible drama but horse stays in race
      h.x -= spd * dt * 0.6;
      h.x = Math.max(RACE_START_X - 10, h.x); // don't go off screen
    }

    // Crossed finish? Use horse nose position (+38px forward from center)
    const NOSE_OFFSET = 38;
    if (h.x + NOSE_OFFSET >= FINISH_X) {
      h.x = FINISH_X - NOSE_OFFSET; // snap so nose is exactly at line
      h.finished = true;
      h.finishTime = elapsed;
      const place = raceResults.filter(r=>!r.dnf).length + 1;
      raceResults.push({ horse:h, place, dnf:false });

      // END RACE on first finisher
      if (place === 1) {
        raceFinished = true;
        raceWinner   = h;
        // Assign real places to remaining horses sorted by current x position
        const remaining = [...horses]
          .filter(hh => !hh.finished && !hh.dnf)
          .sort((a,b) => (b.x+38) - (a.x+38));
        remaining.forEach((hh, ri) => {
          raceResults.push({ horse:hh, place: ri+2, dnf:false });
        });
        // Update win/loss records + form for all horses
        horses.forEach(hh => {
          const res = raceResults.find(r => r.horse === hh);
          const isWinner = res && res.place === 1;
          if (isWinner) {
            hh.wins++; hh.form.shift(); hh.form.push('W');
          } else {
            hh.losses++; hh.form.shift(); hh.form.push('L');
          }
        });
      }
    }
  });
}

// ============================================================
// DRAWING UTILS
// ============================================================
function px(v){return Math.round(v);}
function py(v){return Math.round(v);}
function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(px(x),py(y),px(w),py(h));}
function grd(x,y,w,h,c1,c2,horiz=false){
  const g=horiz?ctx.createLinearGradient(x,y,x+w,y):ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,c1);g.addColorStop(1,c2);
  ctx.fillStyle=g;ctx.fillRect(px(x),py(y),px(w),py(h));
}
function txt(t,x,y,sz,col,align='left',font='VT323'){
  ctx.save();ctx.font=`${sz}px '${font}'`;ctx.fillStyle=col;
  ctx.textAlign=align;ctx.textBaseline='top';
  ctx.fillText(String(t),px(x),py(y));ctx.restore();
}
function ptxt(t,x,y,sz,col,align='left'){txt(t,x,y,sz,col,align,'Press Start 2P');}
function lighten(hex,a=30){
  try{let r=Math.min(255,parseInt(hex.slice(1,3),16)+a),g=Math.min(255,parseInt(hex.slice(3,5),16)+a),b=Math.min(255,parseInt(hex.slice(5,7),16)+a);return`rgb(${r},${g},${b})`;}catch(e){return hex;}
}
function darken(hex,a=30){
  try{let r=Math.max(0,parseInt(hex.slice(1,3),16)-a),g=Math.max(0,parseInt(hex.slice(3,5),16)-a),b=Math.max(0,parseInt(hex.slice(5,7),16)-a);return`rgb(${r},${g},${b})`;}catch(e){return hex;}
}
function btn(label,x,y,w,h,bg,fg,tag,sz=22){
  rect(x+2,y+2,w,h,'rgba(0,0,0,0.35)');
  grd(x,y,w,h,lighten(bg,15),bg);
  ctx.strokeStyle=lighten(bg,40);ctx.lineWidth=2;
  ctx.strokeRect(px(x)+1,py(y)+1,px(w)-2,py(h)-2);
  txt(label,x+w/2,y+h/2-sz*0.48,sz,fg,'center');
  btnRects.push({x,y,w,h,tag});
}

// ============================================================
// HORSE SPRITE
// ============================================================
function drawHorse(h, cx, cy, s=1.0) {
  const frame = Math.floor(performance.now() / 125) % 2 + 1;
  const key   = `racer_${h.id}_f${frame}`;
  const img   = IMG[key];

  // Smaller: 0.78 of previous size for more dramatic racing
  const rw = 156 * s, rh = 113 * s;
  const drawX = cx - rw * 0.52;
  const drawY = cy - rh * 0.88;

  if (img) {
    ctx.save();
    if (h.dnf) ctx.globalAlpha = 0.4;
    ctx.drawImage(img, drawX, drawY, rw, rh);
    ctx.restore();
  } else {
    rect(drawX, drawY, rw, rh, h.color);
  }

  // Status indicators — in front of horse mouth (right edge of sprite, mid-height)
  const mouthX = cx + rw * 0.48;   // right at nose/mouth of horse
  const mouthY = drawY + rh * 0.38; // mouth height (roughly 38% down the sprite)
  if (h.boosted)            txt('⚡', mouthX, mouthY, 18*s, '#FFD700');
  if (h.poisoned && !h.dnf) txt('☠',  mouthX, mouthY, 18*s, '#e74c3c');
  if (h.surging)             txt('💨', mouthX, mouthY, 18*s, '#aef');
}

// ============================================================
// LANE LAYOUT — ALL 5 VISIBLE AT ONCE
// ============================================================
const HUD_H   = 54;
const TRACK_T = HUD_H;
const TRACK_B = H - 2;
const N       = CONFIG.maxHorses;
const LANE_H  = (TRACK_B - TRACK_T) / N;

function getLaneY(i) { return TRACK_T + i*LANE_H + LANE_H*0.72; }

// ============================================================
// DRAW TRACK (fixed, no scroll)
// ============================================================
function drawTrack() {
  if (IMG.track) {
    ctx.drawImage(IMG.track, 0, 0, W, H);
  } else {
    grd(0,0,W,H,'#2d5a1b','#346b20');
  }

  // Crowd silhouette strip at very top (over track image)
  grd(0, 0, W, TRACK_T, '#1a3a6a', '#2a5a9a');
  for(let ci=0; ci<35; ci++){
    const cx2=ci*11+4, ch=6+(ci%3)*3, cc=['#1a3060','#15285a','#1e3870'][ci%3];
    rect(cx2, TRACK_T-ch, 8, ch, cc);
    ctx.beginPath();ctx.arc(cx2+4,TRACK_T-ch-3,3,0,Math.PI*2);
    ctx.fillStyle=cc;ctx.fill();
  }

  // Finish line over the background
  const fx = FINISH_X;
  for(let fi=0; fi<H; fi+=16){
    rect(fx-5, fi,   5, 8, '#fff');
    rect(fx-5, fi+8, 5, 8, '#000');
    rect(fx,   fi,   5, 8, '#000');
    rect(fx,   fi+8, 5, 8, '#fff');
  }
  grd(fx-28, TRACK_T, 56, 18, '#FFD700','#e67e22', true);
  txt('FINISH', fx-2, TRACK_T+2, 16, '#111', 'center');
}

// RACE
function drawRace() {
  drawTrack();
  drawHUD();

  // Position indicators (rank badges on left)
  const sorted = [...horses].filter(h=>!h.dnf).sort((a,b)=>b.x-a.x);

  horses.forEach((h,i)=>{
    if(h.dnf && h.x < RACE_START_X - 50) return;
    const laneY = getLaneY(i);
    drawHorse(h, h.x, laneY, 1.0);

    // Name under rear feet — grey, ground level
    const nameX = Math.max(8, Math.min(h.x - 70, W - 60));
    const nameY = laneY + 14; // below the horse at ground level
    ctx.save();
    ctx.font = "9px 'Press Start 2P'";
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillText(h.name, nameX+1, nameY+1);
    ctx.fillStyle='#aaa';
    ctx.fillText(h.name, nameX, nameY);
    ctx.restore();

    // Rank badge just above and left of the horse
    const rank = sorted.findIndex(sh=>sh===h)+1;
    if(rank>0 && !h.finished){
      const rw2=22, rh2=14;
      const rx = Math.max(4, h.x - 30);
      const ry2 = laneY - 68;
      rect(rx, ry2, rw2, rh2, rank===1?'#FFD700':'rgba(0,0,0,0.5)');
      txt(`#${rank}`, rx+2, ry2+1, 13, rank===1?'#000':'#fff');
    }
  });

  // Winner overlay
  if(raceFinished && raceWinner){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(18,H/2-65,W-36,130);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.strokeRect(18,H/2-65,W-36,130);
    ctx.restore();
    txt('🏆 WINNER!',W/2,H/2-55,30,'#FFD700','center');
    txt(raceWinner.name,W/2,H/2-22,42,raceWinner.color,'center');
    const mine=raceWinner===horses[betHorse];
    txt(mine?'THATS YOUR HORSE! 🎉':'Better luck next time...',W/2,H/2+22,19,mine?'#2ecc71':'#e74c3c','center');
    btnRects=[{x:W/2-88,y:H/2+52,w:176,h:40,tag:'results'}];
    btn('SEE RESULTS →',W/2-88,H/2+52,176,40,'#2ecc71','#fff','results',20);
  } else if(!raceFinished){
    // Skip button (always visible during race)
    btnRects=[{x:W-72,y:H-42,w:64,h:34,tag:'skip'}];
    btn('SKIP »',W-72,H-42,64,34,'#333355','#888','skip',16);
  }
}

// RESULTS
function settleResults(){
  if(resultsCashSettled) return;
  resultsCashSettled=true;
  const winner=raceResults.find(r=>!r.dnf&&r.place===1);
  const won=winner&&winner.horse===horses[betHorse];
  if(won){
    cashDelta=Math.round(betAmount*horses[betHorse].odds);
    cash+=cashDelta;
  } else {
    cashDelta=-betAmount;
    cash=Math.max(0,cash+cashDelta);
  }
}

function drawResults(){
  settleResults();
  grd(0,0,W,H,'#0a0a2a','#0d0d30');
  btnRects=[];

  grd(0,0,W,54,'#0d0d2a','#111133');
  rect(0,52,W,2,'#FFD700');
  ptxt(`ROUND ${round} RESULTS`,W/2,14,7,'#FFD700','center');

  const won=cashDelta>0;

  rect(0,56,W,2,won?'#2ecc71':'#e74c3c');
  txt(won?`YOU WON  +$${cashDelta}`:`YOU LOST  -$${betAmount}`, W/2,66,30,won?'#2ecc71':'#e74c3c','center');

  txt('FINAL ORDER:',14,116,20,'#aaa');
  const sorted=[...raceResults].sort((a,b)=>{
    if(a.dnf&&b.dnf)return 0;if(a.dnf)return 1;if(b.dnf)return -1;
    if(a.place&&b.place)return a.place-b.place;return 0;

  sorted.forEach((r,i)=>{

    const pc=r.place===1?'#FFD700':r.place===2?'#C0C0C0':r.place===3?'#CD7F32':'#888';

    if(isP){
      txt(won?`+$${cashDelta}`:`-$${betAmount}`, W-14,ry+26,22,won?'#2ecc71':'#e74c3c','right');

  } else {

// SUBMITTED screen removed — score auto-saves on game over

// ============================================================
// GAME LOOP
// ============================================================
function gameLoop(now){
  requestAnimationFrame(gameLoop);
  btnRects=[];
  switch(state){
    case ST.TITLE:    drawTitle();   break;
    case ST.BETTING:  drawBetting(); break;
    case ST.SHADY:    drawShady();   break;
    case ST.SCOUT:    drawScout();   break;
    case ST.RACING:   updateRace(now); drawRace(); break;
    case ST.RESULTS:  drawResults(); break;
    case ST.GAMEOVER: drawGameOver();break;
  }
}

// ============================================================
// INPUT
// ============================================================
let touchStartY=0, isDragging=false;

function getPos(clientX,clientY){
  const r=canvas.getBoundingClientRect();
  return{x:(clientX-r.left)*(W/r.width), y:(clientY-r.top)*(H/r.height)};
}

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const {x,y}=getPos(e.touches[0].clientX,e.touches[0].clientY);
  touchStartY=y; isDragging=false;
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const {x,y}=getPos(e.touches[0].clientX,e.touches[0].clientY);
  const dy=y-touchStartY;
  if(state===ST.BETTING && Math.abs(dy)>6){
    isDragging=true;
    const listTop=74, listH=H-listTop-162;
    if(touchStartY>listTop && touchStartY<listTop+listH){
      bettingScroll+=dy;
      const minS=-(horses.length*96-(listH));
      bettingScroll=Math.max(minS,Math.min(0,bettingScroll));
      touchStartY=y;
    }
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!isDragging){
    const {x,y}=getPos(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    handleTap(x,y);
  }
  isDragging=false;
},{passive:false});

canvas.addEventListener('click',e=>{
  const {x,y}=getPos(e.clientX,e.clientY);
  handleTap(x,y);
});

function handleTap(cx,cy){
  // Iterate in reverse so last-registered buttons have highest priority
  for(let i=btnRects.length-1; i>=0; i--){
    const b=btnRects[i];
    if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h){
      handleBtn(b.tag); return;
    }
  }
}

function handleBtn(tag){
  if(tag==='play'){ startGame(); return; }
  if(tag==='playagain'){ playerName=''; state=ST.TITLE; return; }
  if(tag==='coffee'){
    const note = encodeURIComponent('Office Derby - great game!');
    const appUrl = `venmo://paycharge?txn=pay&recipients=epecho&amount=3&note=${note}`;
    const webUrl = `https://venmo.com/epecho`;
    const start = Date.now();
    window.location.href = appUrl;
    setTimeout(()=>{ if(Date.now()-start < 1600) window.open(webUrl,'_blank'); }, 1200);
    return;
  }
  if(tag==='race'&&state===ST.BETTING){
    if(betHorse<0||betAmount<=0||betAmount>cash) return;
    initRace(); state=ST.RACING; return;
  }
  if(tag==='skip'&&state===ST.RACING){
    if(!raceFinished){
      const sorted=[...horses].filter(h=>!h.dnf).sort((a,b)=>(b.x+38)-(a.x+38));
      const leader=sorted[0];
      if(leader){
        raceFinished=true; raceWinner=leader;
        raceResults=[];
        sorted.forEach((h,i)=>raceResults.push({horse:h,place:i+1,dnf:false}));
        horses.filter(h=>h.dnf).forEach(h=>raceResults.push({horse:h,place:null,dnf:true}));
        // Update records
        horses.forEach(hh=>{
          const res=raceResults.find(r=>r.horse===hh);
          if(res&&res.place===1){hh.wins++;hh.form.shift();hh.form.push('W');}
          else{hh.losses++;hh.form.shift();hh.form.push('L');}
        });
      }
    }
    return;
  }
  if(tag==='results'&&state===ST.RACING){ state=ST.RESULTS; return; }
  if(tag==='nextround'){
    round++; betHorse=-1; betAmount=Math.min(betAmount,Math.floor(cash/50)*50||50);
    shadyAction=null; shadyStep=0;
    resultsCashSettled=false; cashDelta=0;
    refreshRoundStats(); // re-randomize hidden power each round
    state=ST.BETTING; return;
  }
  if(tag==='gameover'){ submitScore(); state=ST.GAMEOVER; return; }
  if(tag==='bet_type'){
    // Use native prompt for typing — simplest mobile solution
    const val = prompt(`Enter bet amount ($50–$${cash}):`, betAmount);
    if(val !== null){
      let n = Math.round(parseInt(val)/50)*50;
      if(!isNaN(n)) betAmount = Math.max(50, Math.min(Math.floor(cash/50)*50, n));
    }
    return;
  }
  if(tag==='bet_half'){
    betAmount = Math.max(50, Math.floor(cash/2/50)*50);
    return;
  }
  if(tag==='bet_max'){
    betAmount = Math.max(50, Math.floor(cash/50)*50);
    return;
  }
  if(tag==='shady'){
    if(shadyAction){ cash+=CONFIG.shadyCost; shadyAction=null; horses.forEach(h=>{h.boosted=false;h.poisoned=false;}); return; }
    if(cash<CONFIG.shadyCost) return;
    shadyStep=0; state=ST.SHADY; return;
  }
  if(tag==='scout'){ state=ST.SCOUT; return; }
  if(tag==='scout_back'){ state=ST.BETTING; return; }
  if(tag==='shady_boost'){ shadyType='boost'; shadyStep=1; return; }
  if(tag==='shady_poison'){ shadyType='poison'; shadyStep=1; return; }
  if(tag==='shady_cancel'){ state=ST.BETTING; return; }
  if(tag==='shady_back'){ shadyStep=0; return; }
  if(tag.startsWith('shadytarget_')){
    const idx=parseInt(tag.split('_')[1]);
    cash-=CONFIG.shadyCost; shadyAction={type:shadyType,targetIdx:idx};
    if(shadyType==='boost') horses[idx].boosted=true;
    else horses[idx].poisoned=true;
    state=ST.BETTING; return;
  }
  if(tag.startsWith('titlekey_')){
    const k=tag.slice(9);
    if(k==='⌫') playerName=playerName.slice(0,-1);
    else if(playerName.length<12) playerName+=k;
    return;
  }
  if(tag.startsWith('horse_')){ betHorse=parseInt(tag.split('_')[1]); return; }
}

// ============================================================
// FLOW
// ============================================================
function startGame(){
  resetState();
  generateHorses();
  state=ST.BETTING;
}

function fetchLeaderboard(){
  fetch(`${CONFIG.appsScriptURL}?key=${CONFIG.leaderboardKey}`)
    .then(r=>r.json())
    .then(d=>{ if(d?.scores) leaderboard=d.scores.sort((a,b)=>b.score-a.score).slice(0,10); })
    .catch(()=>{});
}

function submitScore(){
  const name=(playerName||'ANON').trim();
  fetch(`${CONFIG.appsScriptURL}?key=${CONFIG.leaderboardKey}&name=${encodeURIComponent(name)}&score=${cash}`,{mode:'no-cors'}).catch(()=>{});
  fetchLeaderboard();
}

// ============================================================
// BOOT
// ============================================================
resetState();
generateHorses();
fetchLeaderboard();
loadImages().then(() => {
  requestAnimationFrame(gameLoop);
});
