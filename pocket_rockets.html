const SHEET_URL='https://script.google.com/macros/s/AKfycbwXL5EDGT4fRgHtIbAgBkppzmViYckWJ961HW32OT1zoj6gtMxQ7FouFyc-Zb-m3QJHyw/exec';
let leaderboard=[];
async function fetchLeaderboard(){try{const r=await fetch(SHEET_URL+'?action=get');const d=await r.json();if(!Array.isArray(d))return;
  // Sheet columns: A=name, B=score ("5-2"), C=timestamp. Ignore C, sort by most player goals.
  leaderboard=d.map(row=>[String(row[0]||'').trim()||'?',String(row[1]||'').trim()])
    .filter(([n,s])=>/^\d+-\d+$/.test(s)&&n!=='?'&&!/^name$/i.test(n))
    .sort((a,b)=>{const [ap,an]=a[1].split('-').map(Number),[bp,bn]=b[1].split('-').map(Number);return bp-ap||an-bn;})
    .slice(0,10);
}catch(e){}}
async function submitScore(name,pts){try{await fetch(SHEET_URL+'?name='+encodeURIComponent(name)+'&score='+pts);await fetchLeaderboard();}catch(e){}}
fetchLeaderboard();

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
let touchLeft=false,touchRight=false,touchUp=false,touchDown=false,touchBoost=false;
let touchJoystickId=null,touchBoostId=null,joyBase=null,joyCurrent=null;
function getTouchPos(t){const r=canvas.getBoundingClientRect();return{x:(t.clientX-r.left)/scale,y:(t.clientY-r.top)/scale};}
canvas.addEventListener('touchstart',e=>{e.preventDefault();for(const t of e.changedTouches){const p=getTouchPos(t);if(state==='playing'&&p.x>W*0.72&&p.y>H*0.6){touchBoostId=t.identifier;touchBoost=true;}else if(state==='playing'&&touchJoystickId===null){touchJoystickId=t.identifier;joyBase={x:90,y:H-80};joyCurrent={...p};}}},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===touchJoystickId){joyCurrent=getTouchPos(t);const dx=joyCurrent.x-joyBase.x,dy=joyCurrent.y-joyBase.y,dead=12;touchLeft=dx<-dead;touchRight=dx>dead;touchUp=dy<-dead;touchDown=dy>dead;}}},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches){if(t.identifier===touchJoystickId){touchJoystickId=null;joyBase=null;joyCurrent=null;touchLeft=touchRight=touchUp=touchDown=false;}if(t.identifier===touchBoostId){touchBoostId=null;touchBoost=false;}}},{passive:false});

let state='title',score=[0,0],timeLeft=MATCH_DURATION,bestScore=null;
let announcer={text:'',timer:0,x:0,y:0,color:'#fff'};
let goalFlash=0,goalTeam=0,kickoffTimer=0,scoreLocked=false,redLightAngle=0;
let cars,ball;

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

function makeCar(x,y,angle,team,isPlayer){return{x,y,vx:0,vy:0,angle,team,isPlayer,boost:BOOST_MAX,boostTrail:[],_stuckTimer:0};}
function makeBall(){return{x:FIELD.x+FIELD.w/2,y:FIELD.y+FIELD.h/2,vx:0,vy:0,spin:0,_stuckTimer:0};}

function kickoff(fresh){
  if(fresh){score=[0,0];scoreLocked=false;timeLeft=MATCH_DURATION;}
  ball=makeBall();
  const ang=Math.random()*Math.PI*2;
  ball.vx=Math.cos(ang)*160;ball.vy=Math.sin(ang)*160;
  const cx=FIELD.x+FIELD.w/2,cy=FIELD.y+FIELD.h/2;
  cars=[
    makeCar(cx-55,cy+80,-Math.PI/2,0,true),
    makeCar(cx+55,cy+80,-Math.PI/2,0,false),
    makeCar(cx-55,cy-80,Math.PI/2,1,false),
    makeCar(cx+55,cy-80,Math.PI/2,1,false),
  ];
  kickoffTimer=2.0;
}

function updateCar(car,dt,isKickoff){
  if(isKickoff&&!car.isPlayer)return;
  let ax=0,ay=0;
  if(car.isPlayer){
    const boosting=(keys['Space']||keys['ShiftLeft']||touchBoost)&&car.boost>0;
    const accel=boosting?BOOST_ACCEL:NORMAL_ACCEL,maxSpd=boosting?BOOST_MAX_SPEED:MAX_SPEED;
    if(joyCurrent){
      // Touch: joystick gives absolute world-space direction — car turns to face it
      const jdx=joyCurrent.x-joyBase.x, jdy=joyCurrent.y-joyBase.y;
      const jLen=Math.sqrt(jdx*jdx+jdy*jdy);
      if(jLen>12){
        const power=Math.min(jLen/48,1);
        ax=(jdx/jLen)*accel*power*dt;
        ay=(jdy/jLen)*accel*power*dt;
        const targetAngle=Math.atan2(jdy,jdx);
        let da=targetAngle-car.angle;
        while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;
        car.angle+=clamp(da,-7*dt,7*dt);
      }
    } else {
      // Keyboard: classic turn-and-thrust
      const left=keys['ArrowLeft']||keys['KeyA'];
      const right=keys['ArrowRight']||keys['KeyD'];
      const up=keys['ArrowUp']||keys['KeyW'];
      const down=keys['ArrowDown']||keys['KeyS'];
      if(left)car.angle-=TURN_SPEED*dt;
      if(right)car.angle+=TURN_SPEED*dt;
      if(up){ax+=Math.cos(car.angle)*accel*dt;ay+=Math.sin(car.angle)*accel*dt;}
      if(down){ax-=Math.cos(car.angle)*REVERSE_ACCEL*dt;ay-=Math.sin(car.angle)*REVERSE_ACCEL*dt;}
    }
    if(boosting){car.boost=Math.max(0,car.boost-BOOST_DRAIN);car.boostTrail.unshift({x:car.x-Math.cos(car.angle)*22,y:car.y-Math.sin(car.angle)*22,life:1});}
    else{car.boost=Math.min(BOOST_MAX,car.boost+BOOST_REGEN);}
    car.vx=clamp(car.vx+ax,-maxSpd,maxSpd);car.vy=clamp(car.vy+ay,-maxSpd,maxSpd);
  } else {
    const myGoalY=car.team===0?GOAL_BOT_Y+20:GOAL_TOP_Y+20;
    const isForward=(car===cars[1]&&car.team===0)||(car===cars[2]&&car.team===1);
    let tx,ty;
    if(isForward){tx=ball.x;ty=ball.y;}else{tx=(ball.x+(FIELD.x+FIELD.w/2))/2;ty=(ball.y+myGoalY)/2;}
    const tAng=Math.atan2(ty-car.y,tx-car.x);
    let da=tAng-car.angle;while(da>Math.PI)da-=2*Math.PI;while(da<-Math.PI)da+=2*Math.PI;
    car.angle+=clamp(da,-2.8*dt,2.8*dt);
    if(Math.abs(da)<Math.PI/2){ax+=Math.cos(car.angle)*AI_ACCEL*dt;ay+=Math.sin(car.angle)*AI_ACCEL*dt;}
    car.boost=BOOST_MAX;car.vx=clamp(car.vx+ax,-AI_MAX_SPEED,AI_MAX_SPEED);car.vy=clamp(car.vy+ay,-AI_MAX_SPEED,AI_MAX_SPEED);
  }
  car.vx*=ICE_FRICTION;car.vy*=ICE_FRICTION;car.x+=car.vx*dt;car.y+=car.vy*dt;
  car.boostTrail=car.boostTrail.filter(p=>{p.life-=dt*3;return p.life>0;});
  const hw=CAR_SW/2-4,hh=CAR_SH/2-6;
  if(car.x-hw<FIELD.x){car.x=FIELD.x+hw;car.vx=Math.abs(car.vx)*0.5;}
  if(car.x+hw>FIELD.x+FIELD.w){car.x=FIELD.x+FIELD.w-hw;car.vx=-Math.abs(car.vx)*0.5;}
  if(car.y-hh<FIELD.y){car.y=FIELD.y+hh;car.vy=Math.abs(car.vy)*0.5;}
  if(car.y+hh>FIELD.y+FIELD.h){car.y=FIELD.y+FIELD.h-hh;car.vy=-Math.abs(car.vy)*0.5;}
}

function updateBall(dt){
  ball.vx*=ICE_FRICTION;ball.vy*=ICE_FRICTION;ball.spin*=0.97;
  ball.x+=ball.vx*dt;ball.y+=ball.vy*dt;
  // Side walls
  if(ball.x-BALL_R<FIELD.x){ball.x=FIELD.x+BALL_R;ball.vx=Math.abs(ball.vx)*0.91;}
  if(ball.x+BALL_R>FIELD.x+FIELD.w){ball.x=FIELD.x+FIELD.w-BALL_R;ball.vx=-Math.abs(ball.vx)*0.91;}
  // Top: check goal mouth, else bounce
  if(ball.y-BALL_R<FIELD.y){
    if(ball.x>GOAL_LEFT_X&&ball.x<GOAL_RIGHT_X){
      if(!scoreLocked&&ball.y<SCORE_TOP_Y){triggerGoal(0);return;}
      // In goal mouth but not deep enough — let it slide, clamp
      if(ball.y-BALL_R<GOAL_TOP_Y){ball.y=GOAL_TOP_Y+BALL_R;ball.vy=Math.abs(ball.vy)*0.3;}
    } else {ball.y=FIELD.y+BALL_R;ball.vy=Math.abs(ball.vy)*0.82;}
  }
  // Bottom: check goal mouth, else bounce
  if(ball.y+BALL_R>FIELD.y+FIELD.h){
    if(ball.x>GOAL_LEFT_X&&ball.x<GOAL_RIGHT_X){
      if(!scoreLocked&&ball.y>SCORE_BOT_Y){triggerGoal(1);return;}
      if(ball.y+BALL_R>GOAL_BOT_Y+GOAL_H){ball.y=GOAL_BOT_Y+GOAL_H-BALL_R;ball.vy=-Math.abs(ball.vy)*0.3;}
    } else {ball.y=FIELD.y+FIELD.h-BALL_R;ball.vy=-Math.abs(ball.vy)*0.91;}
  }
  // Simple square walls — no phantom corner geometry
  // Corner/stuck rescue — if puck is in a corner for 3s, teleport it to center
  const spd=Math.abs(ball.vx)+Math.abs(ball.vy);
  const inCorner=(ball.x<FIELD.x+70||ball.x>FIELD.x+FIELD.w-70)&&(ball.y<FIELD.y+70||ball.y>FIELD.y+FIELD.h-70);
  const isStuck=spd<15||inCorner;
  if(isStuck){
    ball._stuckTimer+=dt;
    if(ball._stuckTimer>3.0){
      // Teleport to center and kick toward a random goal
      ball.x=FIELD.x+FIELD.w/2; ball.y=FIELD.y+FIELD.h/2;
      const ang=(Math.random()*Math.PI*0.5)+(Math.random()<0.5?Math.PI*0.25:Math.PI*1.25);
      ball.vx=Math.cos(ang)*280; ball.vy=Math.sin(ang)*280;
      ball._stuckTimer=0;
    }
  } else {ball._stuckTimer=0;}
  // SAVE! removed — no announcer for near-goal
}

function carBallCollision(car,ball){
  // Transform ball into car's local space to use rotated-rect collision
  const cos=Math.cos(-car.angle),sin=Math.sin(-car.angle);
  const relX=ball.x-car.x, relY=ball.y-car.y;
  const lx=cos*relX-sin*relY, ly=sin*relX+cos*relY;
  const hw=CAR_SW/2+BALL_R, hh=CAR_SH/2+BALL_R;
  if(Math.abs(lx)>hw||Math.abs(ly)>hh) return; // no collision
  // Find closest point on box to ball center
  const cx2=Math.max(-CAR_SW/2,Math.min(CAR_SW/2,lx));
  const cy2=Math.max(-CAR_SH/2,Math.min(CAR_SH/2,ly));
  const ox=lx-cx2, oy=ly-cy2, od=Math.sqrt(ox*ox+oy*oy);
  if(od>BALL_R&&od>0.1) return; // ball centre outside box but contact sphere misses
  // Normal in local space
  let nx2,ny2;
  if(od<0.01){nx2=lx<0?-1:1;ny2=0;}else{nx2=ox/od;ny2=oy/od;}
  // Push ball out
  const push=BALL_R-od+1;
  const wx=cos*nx2+sin*ny2, wy=-sin*nx2+cos*ny2; // world-space normal
  ball.x+=wx*push; ball.y+=wy*push;
  const spd=Math.sqrt(car.vx**2+car.vy**2),impact=Math.max(90,spd*1.5);
  ball.vx=wx*impact+car.vx*0.45; ball.vy=wy*impact+car.vy*0.45;
  ball.spin=(car.vx*wy-car.vy*wx)*0.004;
  car.vx-=wx*impact*0.08; car.vy-=wy*impact*0.08;
}

function triggerGoal(team){
  scoreLocked=true;score[team]++;goalFlash=3.0;goalTeam=team;redLightAngle=0;
  setTimeout(()=>{scoreLocked=false;kickoff(false);},3000);
}

function drawBackground(dimmed){
  // dimmed=true → gameplay (IMG_RINK arena); dimmed=false → title/gameover (IMG_BG monster trucks)
  if(dimmed){
    try{ctx.drawImage(IMG_RINK,0,0,W,H);ctx.fillStyle='rgba(5,8,18,0.18)';ctx.fillRect(0,0,W,H);}
    catch(e){ctx.fillStyle='#0d1a2e';ctx.fillRect(0,0,W,H);}
  } else {
    try{ctx.drawImage(IMG_BG,0,0,W,H);}
    catch(e){ctx.fillStyle='#0d1a2e';ctx.fillRect(0,0,W,H);}
  }
}

function drawField(){
  // Background image has the ice rink — just draw the goals
  try{ctx.drawImage(IMG_BGOAL,GOAL_X,GOAL_TOP_Y,GOAL_W,GOAL_H);}catch(e){}
  try{ctx.drawImage(IMG_OGOAL,GOAL_X,GOAL_BOT_Y,GOAL_W,GOAL_H);}catch(e){}
}

function drawCar(car){
  for(const p of car.boostTrail){ctx.save();ctx.globalAlpha=p.life*0.8;ctx.fillStyle=car.team===0?'#4af':'#fa6';ctx.beginPath();ctx.arc(p.x,p.y,7*p.life,0,Math.PI*2);ctx.fill();ctx.restore();}
  ctx.save();ctx.translate(car.x,car.y);ctx.rotate(car.angle+Math.PI/2);
  ctx.save();ctx.globalAlpha=0.2;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(3,5,CAR_SW/2,CAR_SH/2*0.5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  try{ctx.drawImage(car.team===0?IMG_BLUE:IMG_ORANGE,-CAR_SW/2,-CAR_SH/2,CAR_SW,CAR_SH);}catch(e){}
  if(car.isPlayer){ctx.fillStyle='rgba(255,255,255,0.95)';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',0,-20);}
  ctx.restore();
}

function drawBall(){
  if(goalFlash>0) return; // puck disappears when goal is scored
  const{x,y}=ball,pd=BALL_R*2+4;
  ctx.save();ctx.globalAlpha=0.28;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(x+3,y+5,BALL_R+2,(BALL_R+2)*0.5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x,y);ctx.rotate(ball.spin*3);
  try{ctx.drawImage(IMG_PUCK,-pd/2,-pd/2,pd,pd);}catch(e){}
  ctx.restore();
}

function drawRedSiren(cx,cy,angle,alpha){
  // Draw spinning red siren lamp at back of net
  ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=alpha;
  // Glow halo
  const glow=ctx.createRadialGradient(0,0,2,0,0,28);
  glow.addColorStop(0,'rgba(255,40,40,0.9)');glow.addColorStop(1,'rgba(255,40,40,0)');
  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
  // Spinning beams
  for(let i=0;i<3;i++){
    const ang=angle+i*(Math.PI*2/3);
    ctx.save();ctx.rotate(ang);
    const g=ctx.createLinearGradient(0,0,70,0);
    g.addColorStop(0,'rgba(255,30,30,0.85)');g.addColorStop(1,'rgba(255,30,30,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(70,-12);ctx.lineTo(70,12);ctx.closePath();ctx.fill();
    ctx.restore();
  }
  // Centre bulb
  ctx.fillStyle='#ff2222';ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffaaaa';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawGoalFX(dt){
  if(goalFlash<=0)return;
  goalFlash-=dt;redLightAngle+=dt*7;
  const alpha=Math.min(1,goalFlash);
  // Siren AT BACK OF NET for whichever team scored
  // Team 0 (blue) scored → ball went into TOP goal → siren at top-net back
  // Team 1 (orange) scored → ball went into BOTTOM goal → siren at bot-net back
  const netMidX=GOAL_X+GOAL_W/2;
  if(goalTeam===0){
    // One siren centred at back of top net
    drawRedSiren(netMidX, GOAL_TOP_Y+12, redLightAngle, alpha);
  } else {
    // One siren centred at back of bottom net
    drawRedSiren(netMidX, GOAL_BOT_Y+GOAL_H-12, redLightAngle, alpha);
  }
  const pulse=0.92+0.08*Math.sin(Date.now()/80);
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle='#fff';
  ctx.font=`bold ${Math.round(66*pulse)}px Boogaloo`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('GOAL!',W/2,H/2-24);
  ctx.font='26px Boogaloo';ctx.fillStyle=goalTeam===0?'#5bbaff':'#ff8c3a';
  ctx.fillText(goalTeam===0?'BLUE SCORES!':'ORANGE SCORES!',W/2,H/2+22);ctx.restore();
}

  ctx.fillStyle='#fff';ctx.font='bold 10px Boogaloo';ctx.textAlign='center';ctx.fillText('YOU',p.x,p.y-30);
  // Joystick — always show base in bottom-left

  ctx.save();ctx.globalAlpha=0.22;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(jcx,jcy,jRad,0,Math.PI*2);ctx.stroke();
  ctx.globalAlpha=0.08;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(jcx,jcy,jRad,0,Math.PI*2);ctx.fill();ctx.restore();
  // Direction arrows inside joystick base
  ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#fff';ctx.font='18px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('▲',jcx,jcy-26);ctx.fillText('▼',jcx,jcy+26);ctx.fillText('◀',jcx-26,jcy);ctx.fillText('▶',jcx+26,jcy);ctx.restore();
  // Joystick thumb — use touch position if active, else center
  const thumbX=joyCurrent?joyCurrent.x:jcx, thumbY=joyCurrent?joyCurrent.y:jcy;
  const clampDist=Math.sqrt((thumbX-jcx)**2+(thumbY-jcy)**2);
  const clampedX=clampDist>jRad?jcx+(thumbX-jcx)/clampDist*jRad:thumbX;
  const clampedY=clampDist>jRad?jcy+(thumbY-jcy)/clampDist*jRad:thumbY;
  ctx.save();ctx.globalAlpha=joyCurrent?0.75:0.35;ctx.fillStyle=joyCurrent?'#4af':'#fff';
  ctx.beginPath();ctx.arc(clampedX,clampedY,20,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.5;ctx.strokeStyle='#adf';ctx.lineWidth=2;ctx.beginPath();ctx.arc(clampedX,clampedY,20,0,Math.PI*2);ctx.stroke();ctx.restore();
  // Boost button — bottom right
  const boostX=W-75,boostY=H-75;

  ctx.fillStyle=touchBoost?'#4af':'#fff';ctx.beginPath();ctx.arc(boostX,boostY,44,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=touchBoost?0.9:0.45;ctx.strokeStyle=touchBoost?'#adf':'#fff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(boostX,boostY,44,0,Math.PI*2);ctx.stroke();ctx.restore();
  ctx.fillStyle=touchBoost?'#fff':'rgba(255,255,255,0.6)';ctx.font='bold 14px Boogaloo';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BOOST',boostX,boostY+2);ctx.textBaseline='alphabetic';
}

function startGame(){canvas.removeEventListener('click',canvas._titleClick);canvas.removeEventListener('touchend',canvas._titleClick);kickoff(true);state='playing';}

function drawGameOver(){
  drawBackground(true);
  const blueWon=score[0]>score[1],tied=score[0]===score[1];
  ctx.fillStyle='rgba(0,0,0,0.72)';roundRect(ctx,20,58,W-40,162,16);ctx.fill();
  ctx.fillStyle=blueWon?'#5bbaff':(tied?'#fff':'#ff8c3a');ctx.font='bold 56px Boogaloo';ctx.textAlign='center';
  ctx.fillText(tied?"IT'S A TIE!":(blueWon?'BLUE WINS!':'ORANGE WINS!'),W/2,122);
  ctx.fillStyle='#fff';ctx.font='30px Boogaloo';ctx.fillText('Final: '+score[0]+' - '+score[1],W/2,170);
  if(!bestScore||(score[0]+score[1])>(bestScore[0]+bestScore[1]))bestScore=[...score];
  ctx.fillStyle='#ffd700';ctx.font='14px Boogaloo';ctx.fillText('Best: '+bestScore[0]+' - '+bestScore[1],W/2,198);
  // Score input + submit block
  ctx.fillStyle='rgba(0,0,0,0.68)';roundRect(ctx,32,228,W-64,130,12);ctx.fill();
  ctx.strokeStyle='rgba(100,180,255,0.22)';ctx.lineWidth=1;ctx.stroke();
  const subY=322;
  if(canvas._scoreSubmitted){
    // Show confirmation — hide input, grey out button
    if(canvas._nameInputEl){canvas._nameInputEl.style.display='none';}
    ctx.fillStyle='#4cff91';ctx.font='bold 16px Boogaloo';ctx.textAlign='center';ctx.fillText('✓ Score posted! Thanks '+canvas._submittedName+'!',W/2,268);
    ctx.fillStyle='#555';roundRect(ctx,W/2-95,subY,190,42,10);ctx.fill();
    ctx.fillStyle='#999';ctx.font='bold 20px Boogaloo';ctx.fillText('SUBMITTED ✓',W/2,subY+28);
  } else {
    ctx.fillStyle='#aaddff';ctx.font='15px Boogaloo';ctx.textAlign='center';ctx.fillText('Post your score!',W/2,252);
    if(!canvas._nameInputEl){const inp=document.createElement('input');inp.type='text';inp.placeholder='Your name...';inp.maxLength=16;inp.style.cssText='position:fixed;font-family:Boogaloo,sans-serif;font-size:18px;padding:8px 14px;border-radius:8px;border:2px solid #5bbaff;background:#0d1a2e;color:#fff;width:200px;text-align:center;outline:none;z-index:100;';document.body.appendChild(inp);canvas._nameInputEl=inp;}
    const rect=canvas.getBoundingClientRect(),inp=canvas._nameInputEl;
    inp.style.left=(rect.left+rect.width/2-100)+'px';inp.style.top=(rect.top+(270/H)*rect.height-20)+'px';inp.style.display='block';
    ctx.fillStyle='#1e88e5';roundRect(ctx,W/2-95,subY,190,42,10);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 20px Boogaloo';ctx.fillText('SUBMIT SCORE',W/2,subY+28);
  }
  // Leaderboard
  if(leaderboard.length>0){ctx.fillStyle='rgba(0,0,0,0.55)';roundRect(ctx,32,378,W-64,96,10);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 13px Boogaloo';ctx.textAlign='center';ctx.fillText('🏆 TOP SCORES',W/2,396);leaderboard.slice(0,5).forEach((row,i)=>{ctx.font='12px Boogaloo';ctx.fillStyle=i===0?'#ffd700':'#ccc';ctx.fillText((i+1)+'. '+(row[0]||'?')+'  '+(row[1]||0),W/2,412+i*13);});}
  // ── Three buttons at bottom ──
  // PLAY AGAIN
  const paY=H-150;ctx.fillStyle='#1a4a1a';roundRect(ctx,W/2-105,paY,210,46,12);ctx.fill();
  ctx.fillStyle='#7fff7f';ctx.font='bold 26px Boogaloo';ctx.textAlign='center';ctx.fillText('PLAY AGAIN',W/2,paY+31);
  // Side-by-side: Buy Me a Coffee | Get Your Custom Game
  const btnY=H-92, btnW=194, btnH=40, gap=6;
  const btn1x=W/2-btnW-gap/2, btn2x=W/2+gap/2;
  ctx.fillStyle='#c9a227';roundRect(ctx,btn1x,btnY,btnW,btnH,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 13px Boogaloo';ctx.textAlign='center';
  ctx.fillText('☕ Buy Me a Coffee',btn1x+btnW/2,btnY+26);
  ctx.fillStyle='#1e5fa8';roundRect(ctx,btn2x,btnY,btnW,btnH,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillText('🎮 Get Your Custom Game',btn2x+btnW/2,btnY+26);
  ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font='10px Boogaloo';ctx.fillText('© 2026 asherarcade.com',W/2,H-4);
  // Re-register click handler every frame (gameover state)
  canvas._gameoverClick=(e)=>{
    const p=getTouchPos(e.changedTouches?e.changedTouches[0]:e);
    if(p.y>subY&&p.y<subY+42&&p.x>W/2-95&&p.x<W/2+95&&!canvas._scoreSubmitted){
      const name=(canvas._nameInputEl?.value||'Anonymous').trim()||'Anonymous';
      canvas._scoreSubmitted=true;canvas._submittedName=name;
      if(canvas._nameInputEl)canvas._nameInputEl.style.display='none';
      submitScore(name,score[0]+'-'+score[1]);
    }
    if(p.y>paY&&p.y<paY+46&&p.x>W/2-105&&p.x<W/2+105){
      if(canvas._nameInputEl){canvas._nameInputEl.remove();canvas._nameInputEl=null;}
      canvas._scoreSubmitted=false;canvas._submittedName=null;
      canvas.removeEventListener('click',canvas._gameoverClick);
      canvas.removeEventListener('touchend',canvas._gameoverClick);
      state='title';kickoff(true);
    }
    if(p.y>btnY&&p.y<btnY+btnH&&p.x>btn1x&&p.x<btn1x+btnW){window.open('https://venmo.com/epecho','_blank');}
    if(p.y>btnY&&p.y<btnY+btnH&&p.x>btn2x&&p.x<btn2x+btnW){window.open('https://asherarcade.com','_blank');}
  };
}

function update(dt){
  if(state!=='playing')return;
  if(kickoffTimer>0)kickoffTimer-=dt;
  const isKickoff=kickoffTimer>0;
  cars.forEach(c=>updateCar(c,dt,isKickoff));
  if(!isKickoff){
    updateBall(dt);cars.forEach(c=>carBallCollision(c,ball));
    for(let i=0;i<cars.length;i++)for(let j=i+1;j<cars.length;j++){
      const a=cars[i],b=cars[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<38&&d>0.1){
        const nx=dx/d,ny=dy/d,ov=(38-d)/2;
        a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov;
        const dv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
        if(dv<0){
          // Boosted car hits other car harder
          const aBoosting=a.isPlayer&&(keys['Space']||keys['ShiftLeft']||touchBoost);
          const bBoosting=b.isPlayer&&(keys['Space']||keys['ShiftLeft']||touchBoost);
          const mult=(aBoosting||bBoosting)?1.4:0.4;
          if((aBoosting||bBoosting)&&Math.abs(dv)>40){
            // SMASH! announcement at impact point
            announcer.text='SMASH!';announcer.timer=1.1;
            announcer.x=(a.x+b.x)/2;announcer.y=(a.y+b.y)/2-30;announcer.color='#ffcc00';
          }
          a.vx+=dv*nx*mult;a.vy+=dv*ny*mult;b.vx-=dv*nx*mult;b.vy-=dv*ny*mult;
        }
      }
    }
  }
  timeLeft-=dt;
  if(timeLeft<=0&&state==='playing'){
    timeLeft=0;
    if(canvas._nameInputEl)canvas._nameInputEl.style.display='none';
    state='gameover';
    // Listeners added after first draw renders the click handler
    setTimeout(()=>{
      canvas.addEventListener('click',e=>{if(canvas._gameoverClick)canvas._gameoverClick(e);});
      canvas.addEventListener('touchend',e=>{if(canvas._gameoverClick)canvas._gameoverClick(e);});
    },100);
  }
}

function drawAnnouncer(dt){
  if(announcer.timer<=0)return;
  announcer.timer-=dt;
  // Subtle: max alpha 0.55, small font, fades quickly
  const a=Math.min(0.55,announcer.timer*1.2);
  ctx.save();
  ctx.globalAlpha=a;
  ctx.font='bold 16px Boogaloo';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillText(announcer.text,announcer.x+1,announcer.y+1);
  ctx.fillStyle=announcer.color;ctx.fillText(announcer.text,announcer.x,announcer.y);
  ctx.restore();
}
function draw(dt){
  if(state==='title'){drawTitle();return;}
  if(state==='gameover'){drawGameOver();return;}
  drawBackground(true);drawField();cars.forEach(drawCar);drawBall();drawHUD();drawGoalFX(dt);drawAnnouncer(dt);drawKickoff();
}

kickoff(true);
canvas.addEventListener('click',e=>{if(canvas._titleClick)canvas._titleClick(e);});
canvas.addEventListener('touchend',e=>{if(canvas._titleClick)canvas._titleClick(e);});
let _last=0;
requestAnimationFrame(function loop(ts){const dt=Math.min((ts-_last)/1000,0.05);_last=ts;update(dt);draw(dt);requestAnimationFrame(loop);});
</script>
