<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bonk-A-Dragun | Asher Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d0520;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Fredoka One', cursive;
  }
  #gameContainer {
    position: relative;
    width: 360px;
    height: 640px;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 360px;
    height: 640px;
    image-rendering: pixelated;
    touch-action: none;
    cursor: none;
  }
  #nameOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(13,5,32,0.92);
    z-index: 10;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 12px;
  }
  #nameOverlay.active { display: flex; }
  #nameOverlay h2 {
    font-family: 'Fredoka One', cursive;
    color: #F5C518;
    font-size: 20px;
    text-shadow: 0 0 12px #F5C518;
  }
  #nameInput {
    background: #1a0a3e;
    border: 3px solid #F5C518;
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    padding: 10px 16px;
    width: 220px;
    text-align: center;
    outline: none;
    border-radius: 10px;
  }
  #nameInput::placeholder { color: rgba(255,255,255,0.3); }
  #nameSubmit {
    background: #F5C518;
    border: none;
    color: #1a0a2e;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    padding: 10px 32px;
    cursor: pointer;
    border-radius: 10px;
    font-weight: bold;
  }
  #nameSkip {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.5);
    font-family: 'Fredoka One', cursive;
    font-size: 12px;
    padding: 6px 20px;
    cursor: pointer;
    border-radius: 8px;
  }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="360" height="640"></canvas>
  <div id="nameOverlay">
    <h2>ENTER YOUR NAME</h2>
    <input type="text" id="nameInput" maxlength="12" placeholder="Your name">
    <button id="nameSubmit">SUBMIT SCORE</button>
    <button id="nameSkip">SKIP</button>
  </div>
</div>

// A. CONSTANTS & CONFIG
// ============================================================

const BG = '#0d0520';

const GRID_PAD_TOP = HUD_H + 8;
const GRID_PAD_BOT = 30;
const CELL_W = (W - GRID_PAD_X * 2) / COLS;
const CELL_H = (H - GRID_PAD_TOP - GRID_PAD_BOT) / ROWS;

const CHAR_NAMES = ['pavel', 'arabella', 'beth', 'emmaline'];

// ============================================================
// B. CANVAS SETUP & SCALING
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('gameContainer');

function resize() {
  const sw = window.innerWidth, sh = window.innerHeight;
  const scale = Math.min(sw / W, sh / H);
  const cw = Math.floor(W * scale), ch = Math.floor(H * scale);
  container.style.width = cw + 'px';
  container.style.height = ch + 'px';
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
resize();
window.addEventListener('resize', resize);

const charCanvases = {}; // holds HTMLImageElement per name
let _imgsLoaded = 0;
let _onImgsReady = null;

function initCharacters(onDone) {
  _onImgsReady = onDone;
  for (const name of CHAR_NAMES) {
    const img = new Image();
    img.onload = () => {
      charCanvases[name] = img;
      _imgsLoaded++;
      if (_imgsLoaded === CHAR_NAMES.length && _onImgsReady) _onImgsReady();
    };
    img.onerror = () => {
      _imgsLoaded++;
      if (_imgsLoaded === CHAR_NAMES.length && _onImgsReady) _onImgsReady();
    };
    img.src = 'data:image/png;base64,' + CHAR_DATA_B64[name];
  }
}

// ============================================================
// D. AUDIO SYSTEM
// ============================================================
let AC = null;
function ensureAudio() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
}

function beep(f, d, v, t) {
  if (!AC) return;
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = t || 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(v || 0.3, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + d);
    o.start(); o.stop(AC.currentTime + d);
  } catch (e) {}
}

function sfxBonk() { beep(200, 0.05, 0.5, 'sawtooth'); setTimeout(() => beep(120, 0.12, 0.35, 'sawtooth'), 40); }
function sfxMiss() { beep(150, 0.2, 0.3, 'sine'); }
function sfxEnd() { [400, 300, 200, 140].forEach((f, i) => setTimeout(() => beep(f, 0.18, 0.3, 'sawtooth'), i * 130)); }
function sfxStart() { [300, 420, 540, 680].forEach((f, i) => setTimeout(() => beep(f, 0.1, 0.2, 'sine'), i * 80)); }

// ============================================================
// E. DRAWING HELPERS
// ============================================================
function roundRect(x, y, w, h, r, fill, stroke, lw) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw || 2; ctx.stroke(); }
}

function drawButton(cx, cy, w, h, text, fill, stroke, textColor, fontSize) {
  const x = cx - w / 2, y = cy - h / 2;
  roundRect(x, y, w, h, h / 2, fill, stroke, 3);
  ctx.fillStyle = textColor || '#1a0a2e';
  ctx.font = 'bold ' + (fontSize || 20) + 'px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, cy + 1);
  ctx.textBaseline = 'alphabetic';
  return { x, y, w, h };
}

function pointInRect(px, py, r) {
  return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
}

function drawHeart(x, y, size, filled) {
  ctx.save();
  ctx.translate(x, y);
  const s = size / 10;
  ctx.beginPath();
  ctx.moveTo(0, s * 3);
  ctx.bezierCurveTo(-s * 5, -s * 3, -s * 10, s * 2, 0, s * 10);
  ctx.bezierCurveTo(s * 10, s * 2, s * 5, -s * 3, 0, s * 3);
  ctx.closePath();
  ctx.fillStyle = filled ? '#FF4466' : 'rgba(255,68,102,0.2)';
  ctx.fill();
  if (filled) { ctx.strokeStyle = '#CC2244'; ctx.lineWidth = 1; ctx.stroke(); }
  ctx.restore();
}

// ── HOLE DRAWING: inset-into-board cavities ─────────────────────────────────
//
//  Design rule: holes must read as openings CARVED INTO the cabinet panel,
//  not as floating rings or pipe-tops.
//
//  Technique — 5 concentric ellipses, each slightly smaller + darker:
//    [A] Board surface surround   — cabinet panel color, fills area around hole
//    [B] Outer bevel shadow       — the edge where the surface starts to dip in
//    [C] Bevel highlight (top arc) — light catches the upper inset rim
//    [D] Inner bevel / shadow     — second step deeper
//    [E] Cavity                   — recessed dark interior
//    [F] Near-wall crescent       — visible front inside wall (depth cue)
//
//  drawMoundFront redraws layers B-E (bottom-half only) OVER the character so
//  the head looks like it rises from inside the socket, not behind a ring.
//
//  baseY = pipeTopY = the Y-centre of the cavity opening.

function drawMoundBack(cx, baseY) {

  // ── A. BOARD SURFACE SURROUND ─────────────────────────────────────────────
  // Fill the region around the hole with cabinet-panel material.
  // This is the same purple family as the BG so it blends naturally,
  // but slightly lighter near the bottom (near side faces the player).
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 2, 52, 20, 0, 0, Math.PI * 2);
  const brd = ctx.createLinearGradient(cx, baseY - 18, cx, baseY + 22);
  brd.addColorStop(0,   '#0D0428');  // far side  (top, darker)
  brd.addColorStop(0.5, '#160840');  // mid panel
  brd.addColorStop(1,   '#1E0C52');  // near side (bottom, slightly lighter)
  ctx.fillStyle = brd;
  ctx.fill();
  // Crisp top-arc panel highlight — pixel-art light catch on the surface
  ctx.beginPath();
  ctx.ellipse(cx - 3, baseY - 1, 49, 17, -0.04, Math.PI, Math.PI * 2.04);
  ctx.strokeStyle = 'rgba(80, 40, 160, 0.45)';
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.restore();

  // ── B. OUTER BEVEL SHADOW ─────────────────────────────────────────────────
  // The surface dips inward here — this is the shadow edge of the inset.
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 1, 44, 15, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#08021E';
  ctx.fill();
  ctx.restore();

  // ── C. BEVEL HIGHLIGHT — top arc ─────────────────────────────────────────
  // Light catches the upper inset edge (the far-side rim, mostly visible).
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx - 2, baseY, 41, 13, -0.05, Math.PI, Math.PI * 2.05);
  ctx.strokeStyle = 'rgba(110, 60, 200, 0.65)';
  ctx.lineWidth = 3.5;
  ctx.stroke();
  // Brighter specular pixel cluster at top-left
  ctx.beginPath();
  ctx.ellipse(cx - 14, baseY - 10, 11, 2.5, -0.22, Math.PI * 1.1, Math.PI * 1.9);
  ctx.strokeStyle = 'rgba(160, 100, 255, 0.50)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // ── D. INNER BEVEL / SECOND SHADOW ───────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY, 38, 12, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#040010';
  ctx.fill();
  ctx.restore();

  // ── E. CAVITY INTERIOR ───────────────────────────────────────────────────
  // The recessed socket. Slightly lighter at the very back (far wall hint),
  // darkest at the sides. Gives depth without looking like a cylinder.
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY - 1, 33, 9, 0, 0, Math.PI * 2);
  const cav = ctx.createRadialGradient(cx, baseY - 6, 1, cx, baseY, 33);
  cav.addColorStop(0,    '#2C1468');  // back wall (far, slightly purple-lighter)
  cav.addColorStop(0.28, '#160832');
  cav.addColorStop(0.62, '#080218');
  cav.addColorStop(1,    '#020006');
  ctx.fillStyle = cav;
  ctx.fill();
  ctx.restore();

  // ── F. NEAR-WALL CRESCENT ─────────────────────────────────────────────────
  // The front inside edge of the cavity — visible from the player's POV.
  // A dark half-arc at the bottom of the cavity that reads as "there is depth here."
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 4, 25, 3.5, 0, 0.14, Math.PI - 0.14);
  ctx.strokeStyle = 'rgba(10, 2, 30, 0.88)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
}

function drawMoundFront(cx, baseY) {
  // Redraws layers B–E (bottom halves only) OVER the character.
  // These are board-material layers — NOT a floating ring.
  // The character appears to rise from inside the socket.

  // ── B front: outer bevel shadow, bottom half ──────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY + 1, 44, 15, 0, 0, Math.PI);
  ctx.lineTo(cx - 44, baseY + 1);
  ctx.closePath();
  ctx.fillStyle = '#08021E';
  ctx.fill();
  ctx.restore();

  // ── D front: inner bevel, bottom half ─────────────────────────────────────
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY, 38, 12, 0, 0, Math.PI);
  ctx.lineTo(cx - 38, baseY);
  ctx.closePath();
  ctx.fillStyle = '#040010';
  ctx.fill();
  ctx.restore();

  // ── E front: cavity bottom-arc — crisp dark lip at hole edge ─────────────
  // This pixel-art hard edge is what makes the socket read as a real opening.
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, baseY - 1, 33, 9, 0, 0.06, Math.PI - 0.06);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.97)';
  ctx.lineWidth = 4;
  ctx.stroke();
  ctx.restore();
}




function drawMallet(x, y, swing) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(swing > 0 ? -0.9 - swing * 0.06 : -0.45);

  // Handle — wooden carnival style
  ctx.fillStyle = '#A07020';
  ctx.fillRect(-4, 0, 8, 40);
  ctx.fillStyle = '#B88030';
  ctx.fillRect(-3, 0, 6, 40);
  // Handle grip stripes
  ctx.fillStyle = '#CC2200';
  ctx.fillRect(-4, 30, 8, 4);
  ctx.fillRect(-4, 22, 8, 4);

  // Head — big red carnival mallet
  const hw = 32, hh = 22;
  roundRect(-hw / 2, -hh - 2, hw, hh, 4, '#CC2200', '#881100', 2);
  // Highlight
  ctx.fillStyle = '#EE4422';
  roundRect(-hw / 2 + 3, -hh, hw - 6, hh / 2 - 2, 2, '#EE4422');
  // Gold band
  ctx.fillStyle = GOLD;
  ctx.fillRect(-hw / 2 - 1, -4, hw + 2, 4);

  ctx.restore();
}

function drawStars(f) {
  for (let i = 0; i < 20; i++) {
    const sx = (i * 67 + 13) % W;
    const sy = (i * 89 + 7) % (H - 40) + 20;
    ctx.globalAlpha = 0.08 + 0.08 * Math.sin(f * 0.03 + i * 1.7);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, 1, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Carnival background for the game board
function drawCarnivalBG(f) {
  // Radiating stripes from center
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, HUD_H, W, H - HUD_H - 20);
  ctx.clip();
  const cx = W / 2, cy = HUD_H + (H - HUD_H) / 2;
  const numStripes = 18;
  const stripeAngle = (Math.PI * 2) / numStripes;
  const radius = 500;
  for (let i = 0; i < numStripes; i++) {
    const a1 = i * stripeAngle - Math.PI / 2;
    const a2 = a1 + stripeAngle;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, a1, a2);
    ctx.closePath();
    ctx.fillStyle = i % 2 === 0 ? '#1A0838' : '#140630';
    ctx.fill();
  }
  ctx.restore();

  // Wooden booth frame sides — wider for more carnival presence
  const frameW = 22;
  const frameGrad1 = ctx.createLinearGradient(0, 0, frameW, 0);
  frameGrad1.addColorStop(0,   '#6B4418');
  frameGrad1.addColorStop(0.4, '#A87830');
  frameGrad1.addColorStop(0.7, '#C09040');
  frameGrad1.addColorStop(1,   '#7A4E20');
  ctx.fillStyle = frameGrad1;
  ctx.fillRect(0, HUD_H, frameW, H - HUD_H - 20);

  const frameGrad2 = ctx.createLinearGradient(W - frameW, 0, W, 0);
  frameGrad2.addColorStop(0,   '#7A4E20');
  frameGrad2.addColorStop(0.3, '#C09040');
  frameGrad2.addColorStop(0.6, '#A87830');
  frameGrad2.addColorStop(1,   '#6B4418');
  ctx.fillStyle = frameGrad2;
  ctx.fillRect(W - frameW, HUD_H, frameW, H - HUD_H - 20);

  // Wood grain on frames
  ctx.strokeStyle = 'rgba(40,18,5,0.3)';
  ctx.lineWidth = 0.8;
  for (let y = HUD_H + 8; y < H - 24; y += 16) {
    ctx.beginPath(); ctx.moveTo(2, y); ctx.lineTo(frameW - 2, y + 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - frameW + 2, y); ctx.lineTo(W - 2, y + 5); ctx.stroke();
  }
  // Frame highlight edge
  ctx.fillStyle = 'rgba(200,160,80,0.25)';
  ctx.fillRect(frameW - 2, HUD_H, 2, H - HUD_H - 20);
  ctx.fillRect(W - frameW, HUD_H, 2, H - HUD_H - 20);

  // Pennant banner strip just below HUD
  const bannerY = HUD_H;
  const pennantW = 22, pennantH = 14;
  const pennantColors = ['#CC2200','#F5C518','#1144CC','#CC2200','#F5C518','#1144CC','#CC2200','#F5C518','#1144CC','#CC2200','#F5C518','#1144CC','#CC2200','#F5C518','#1144CC','#CC2200'];
  const numPennants = Math.ceil((W - frameW * 2) / pennantW) + 1;
  for (let i = 0; i < numPennants; i++) {
    const px = frameW + i * pennantW;
    ctx.beginPath();
    ctx.moveTo(px, bannerY);
    ctx.lineTo(px + pennantW, bannerY);
    ctx.lineTo(px + pennantW / 2, bannerY + pennantH);
    ctx.closePath();
    ctx.fillStyle = pennantColors[i % pennantColors.length];
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  // Pennant string
  ctx.strokeStyle = 'rgba(220,180,80,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(frameW, bannerY + 1);
  ctx.lineTo(W - frameW, bannerY + 1);
  ctx.stroke();

  // Carnival lights along top — bigger bulbs
  const lightY = HUD_H + pennantH + 8;
  const lightColors = ['#FF4444', '#FFDD00', '#44FF88', '#4499FF', '#FF44FF', '#FF8844'];
  const numLights = 14;
  for (let i = 0; i < numLights; i++) {
    const lx = frameW + 6 + i * ((W - frameW * 2 - 12) / (numLights - 1));
    const col = lightColors[i % lightColors.length];
    const bright = 0.55 + 0.45 * Math.sin(f * 0.07 + i * 1.15);
    // Wide glow halo
    ctx.save();
    ctx.globalAlpha = bright * 0.35;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(lx, lightY, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = bright * 0.18;
    ctx.beginPath();
    ctx.arc(lx, lightY, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    // Bulb body
    ctx.save();
    ctx.globalAlpha = 0.55 + bright * 0.45;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(lx, lightY, 6, 0, Math.PI * 2);
    ctx.fill();
    // Bright specular highlight
    ctx.fillStyle = '#FFFFFF';
    ctx.globalAlpha = bright * 0.75;
    ctx.beginPath();
    ctx.arc(lx - 1.5, lightY - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // Wire connecting top lights
  ctx.strokeStyle = 'rgba(120,90,50,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(frameW, lightY);
  ctx.lineTo(W - frameW, lightY);
  ctx.stroke();

  // Bottom carnival lights — matching size
  const botLightY = H - 24;
  for (let i = 0; i < numLights; i++) {
    const lx = frameW + 6 + i * ((W - frameW * 2 - 12) / (numLights - 1));
    const col = lightColors[(i + 3) % lightColors.length];
    const bright = 0.55 + 0.45 * Math.sin(f * 0.07 + i * 1.15 + 2.1);
    ctx.save();
    ctx.globalAlpha = bright * 0.35;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(lx, botLightY, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = bright * 0.18;
    ctx.beginPath();
    ctx.arc(lx, botLightY, 20, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    ctx.save();
    ctx.globalAlpha = 0.55 + bright * 0.45;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(lx, botLightY, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFFFFF';
    ctx.globalAlpha = bright * 0.75;
    ctx.beginPath();
    ctx.arc(lx - 1.5, botLightY - 2, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle = 'rgba(120,90,50,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(frameW, botLightY);
  ctx.lineTo(W - frameW, botLightY);
  ctx.stroke();
}

function drawLeaderboard(x, y, w, h, entries, maxShow) {

// ============================================================
// F. PARTICLE SYSTEM
// ============================================================
let particles = [];
let popups = [];

function spawnParticles(x, y, count, color, opts) {
  opts = opts || {};
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const speed = (opts.speed || 120) + Math.random() * (opts.speedVar || 80);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (opts.upBias || 0),
      life: 1,
      decay: (opts.decay || 1.5) + Math.random() * 0.5,
      size: (opts.size || 3) + Math.random() * 2,
      color,
      gravity: opts.gravity || 200,
    });
  }
}

function spawnConfetti(count) {
  const colors = [GOLD, '#FF4466', '#44DDFF', '#66FF66', '#FF66FF', '#FF8844'];
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: -10 - Math.random() * 40,
      vx: (Math.random() - 0.5) * 100,
      vy: 80 + Math.random() * 150,
      life: 1,
      decay: 0.3 + Math.random() * 0.2,
      size: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      gravity: 60,
      confetti: true,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 8,
    });
  }
}

function spawnPopup(x, y, text, color, size) {
  popups.push({ x, y, vy: -80, life: 1, decay: 1.2, text, color: color || GOLD, size: size || 18 });
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += p.gravity * dt;
    p.life -= p.decay * dt;
    if (p.confetti) p.rot += p.rotV * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y += p.vy * dt;
    p.vy *= 0.95;
    p.life -= p.decay * dt;
    if (p.life <= 0) popups.splice(i, 1);
  }
}

function drawParticlesAndPopups() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    if (p.confetti) {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  for (const p of popups) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = 'bold ' + p.size + 'px Fredoka One, cursive';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

let state = 'loading';
let score = 0, bestScore = 0, timeLeft = GAME_TIME;

let shakeAmount = 0;
let leaderboard = [];
let submitDone = false;
let titleBob = 0;

const holes = [];
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const cx = GRID_PAD_X + CELL_W * c + CELL_W / 2;
    const pipeTopY = GRID_PAD_TOP + CELL_H * r + CELL_H * 0.72;
    holes.push({ cx, pipeTopY, row: r, col: c });
  }
}

// H. INPUT HANDLING
// ============================================================
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  let cX, cY;
  if (e.touches && e.touches.length > 0) {
    cX = e.touches[0].clientX; cY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    cX = e.changedTouches[0].clientX; cY = e.changedTouches[0].clientY;
  } else {
    cX = e.clientX; cY = e.clientY;
  }
  return { x: (cX - rect.left) * sx, y: (cY - rect.top) * sy };
}

let playBtnRect = null;
let coffeeBtnRect = null;
let gameBtnRect = null;
let againBtnRect = null;

canvas.addEventListener('mousemove', e => {
  const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const p = getCanvasPos(e); mouseX = p.x; mouseY = p.y;
}, { passive: false });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  const p = getCanvasPos(e);
  mouseX = p.x; mouseY = p.y;
  handleTap(p.x, p.y);
}, { passive: false });

canvas.addEventListener('click', e => {
  ensureAudio();
  const p = getCanvasPos(e);
  handleTap(p.x, p.y);
});

function handleTap(x, y) {
  malletSwing = 10;

  if (state === 'title') {
    if (playBtnRect && pointInRect(x, y, playBtnRect)) startGame();
    return;
  }

  if (state === 'gameover') {
    if (coffeeBtnRect && pointInRect(x, y, coffeeBtnRect)) {
      const note = encodeURIComponent('Bonk-A-Dragun - great game!');
      const appUrl = 'venmo://paycharge?txn=pay&recipients=epecho&amount=3&note=' + note;
      const webUrl = 'https://venmo.com/epecho?txn=pay&amount=3&note=Asher+Arcade';
      const start = Date.now();
      window.location.href = appUrl;
      setTimeout(() => { if (Date.now() - start < 1600) window.open(webUrl, '_blank'); }, 1200);
      return;
    }
    if (gameBtnRect && pointInRect(x, y, gameBtnRect)) {
      window.open('https://asherarcade.com', '_blank');
      return;
    }
    if (againBtnRect && pointInRect(x, y, againBtnRect)) {
      state = 'title'; fetchLB();
      return;
    }
    return;
  }

  if (state !== 'playing') return;

  // Hit detection — check each mole
  for (let i = moles.length - 1; i >= 0; i--) {
    const m = moles[i];
    if (m.hit || m.state === 'falling' || m.rise < 8) continue;
    const h = holes[m.hole];
    const charTop = h.pipeTopY - m.rise;
    const charLeft = h.cx - CHAR_DRAW / 2 - 8;
    const charRight = h.cx + CHAR_DRAW / 2 + 8;
    const charBottom = h.pipeTopY + 10;
    if (x >= charLeft && x <= charRight && y >= charTop && y <= charBottom) {
      m.hit = true;
      m.state = 'falling';
      score += 10;
      sfxBonk();
      spawnParticles(h.cx, h.pipeTopY - m.rise / 2, 12, GOLD, { speed: 80, upBias: 60, decay: 2 });
      spawnPopup(h.cx, h.pipeTopY - m.rise - 10, '+10', GOLD, 20);
      spawnPopup(h.cx, h.pipeTopY - m.rise + 10, 'BONK!', '#FF6644', 14);
      shakeAmount = 4;
      break;
    }
  }
}

// ============================================================
// J. GAME LOGIC
// ============================================================
function startGame() {
  score = 0; timeLeft = GAME_TIME;
  moles = []; particles = []; popups = [];
  spawnTimer = 0; frame = 0; shakeAmount = 0;
  state = 'playing';
  sfxStart();
}

function gameOver() {
  sfxEnd();
  if (score > bestScore) bestScore = score;
  state = 'gameover';
  submitDone = false;
  spawnConfetti(50);
  setTimeout(() => {
    nameOverlay.classList.add('active');
    nameInput.focus();
  }, 900);
}

function spawnInterval() {
  if (score < 20) return 2.0;
  if (score < 50) return 1.4;
  if (score < 100) return 1.1;
  return Math.max(0.4, 1.1 - (score - 100) * 0.007);
}
function maxMoles() {
  if (score < 20) return 1;
  if (score < 60) return 2;
  if (score < 120) return 3;
  return 4;
}
function upTime() {
  if (score < 20) return 2.7;
  if (score < 50) return 2.0;
  if (score < 100) return 1.5;
  return Math.max(0.7, 1.5 - (score - 100) * 0.008);
}
function riseSpeed() {
  return Math.min(320, 160 + Math.floor(score / 20) * 20);
}

function spawnMole() {
  const busy = new Set(moles.map(m => m.hole));
  const free = holes.map((_, i) => i).filter(i => !busy.has(i));
  if (!free.length) return;
  const hole = free[Math.floor(Math.random() * free.length)];
  const char = CHAR_NAMES[Math.floor(Math.random() * CHAR_NAMES.length)];
  moles.push({ hole, char, state: 'rising', rise: 0, timer: upTime(), hit: false });
}

function update(dt) {
  if (state !== 'playing') return;
  frame++;
  spawnTimer += dt;
  if (spawnTimer >= spawnInterval()) {
    if (moles.filter(m => !m.hit && m.state !== 'falling').length < maxMoles()) spawnMole();
    spawnTimer = 0;
  }

  const rs = riseSpeed();
  for (const m of moles) {
    if (m.state === 'rising') {
      m.rise = Math.min(MAX_RISE, m.rise + rs * dt);
      if (m.rise >= MAX_RISE) m.state = 'up';
    } else if (m.state === 'up' && !m.hit) {
      m.timer -= dt;
      if (m.timer <= 0) {
        m.state = 'falling';
        sfxMiss();
      }
    } else if (m.state === 'falling') {
      m.rise = Math.max(0, m.rise - (rs + 80) * dt);
    }
  }
  moles = moles.filter(m => !(m.state === 'falling' && m.rise <= 0));

  // Timer countdown
  timeLeft -= dt;
  if (timeLeft <= 0) { timeLeft = 0; gameOver(); return; }

  if (malletSwing > 0) malletSwing = Math.max(0, malletSwing - 40 * dt);
  if (shakeAmount > 0) shakeAmount = Math.max(0, shakeAmount - 15 * dt);
}

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('ASHER ARCADE \u00A9 2026 \u2022 asherarcade.com', W / 2, 628);
}

function drawGame(dt) {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);
  drawCarnivalBG(frame);

  ctx.save();
  if (shakeAmount > 0) {
    ctx.translate((Math.random() - 0.5) * shakeAmount * 2, (Math.random() - 0.5) * shakeAmount * 2);
  }

  // HUD
  roundRect(0, 0, W, HUD_H, 0, 'rgba(20,5,45,0.95)');
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 12px Fredoka One, cursive';
  ctx.textAlign = 'left';
  ctx.fillText('BONK-A-', 10, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Fredoka One, cursive';
  ctx.fillText('DRAGUN', 10, 40);

  ctx.fillStyle = GOLD;
  ctx.font = 'bold 30px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText(score, W / 2, 38);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '9px Fredoka One, cursive';
  ctx.fillText('SCORE', W / 2, 52);

  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.font = '9px Fredoka One, cursive';
    ctx.textAlign = 'left';
    ctx.fillText('BEST ' + bestScore, 10, 55);
  }

  // Timer bar (right side of HUD)
  const timerFrac = Math.max(0, timeLeft / GAME_TIME);
  const barW = 80, barH = 14;
  const barX = W - 10 - barW, barY = 14;
  ctx.save();
  // Background track
  roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 4, 'rgba(0,0,0,0.4)');
  // Fill color: gold → orange → red
  let timerColor;
  if (timerFrac > 0.5) timerColor = GOLD;
  else if (timerFrac > 0.25) timerColor = '#FF8800';
  else timerColor = RED;
  ctx.fillStyle = timerColor;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * timerFrac, barH, 3);
  ctx.fill();
  // Countdown number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(timeLeft) + 's', barX + barW / 2, barY + barH - 1);
  ctx.restore();

  ctx.fillStyle = GOLD;
  ctx.fillRect(0, HUD_H - 2, W, 2);

  // Grid — draw row by row
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const idx = row * COLS + col;
      const h = holes[idx];
      const m = moles.find(mo => mo.hole === idx);

      // Mound back (drawn before character)
      drawMoundBack(h.cx, h.pipeTopY);

      // Character
      if (m && m.rise > 2) {
        ctx.save();
        ctx.beginPath();
        // Clip character so it never extends below the rim centre line
        ctx.rect(h.cx - CHAR_DRAW / 2 - 4, h.pipeTopY - MAX_RISE - 10, CHAR_DRAW + 8, MAX_RISE + HOLE_RY + 4);
        ctx.clip();

        const charY = h.pipeTopY - m.rise;
        const oc = charCanvases[m.char];
        if (oc) {
          ctx.imageSmoothingEnabled = true;
          let sx = 1, sy = 1;
          if (m.hit) { sx = 1.3; sy = 0.7; }
          ctx.translate(h.cx, charY + CHAR_DRAW / 2);
          ctx.scale(sx, sy);
          ctx.drawImage(oc, -CHAR_DRAW / 2, -CHAR_DRAW / 2, CHAR_DRAW, CHAR_DRAW);
        }
        ctx.restore();
      }

      // Mound front crescent (drawn after character)
      drawMoundFront(h.cx, h.pipeTopY);
    }
  }

  // Particles and popups
  drawParticlesAndPopups();

  // Mallet
  if (mouseX > -100) drawMallet(mouseX, mouseY, malletSwing);

  ctx.restore(); // end shake

  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '9px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('asherarcade.com', W / 2, H - 10);
}

function drawGameOver(dt) {
  titleBob += dt * 2;

  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, BG); g.addColorStop(1, PURPLE);
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  drawStars(Math.floor(titleBob * 20));

  drawParticlesAndPopups();

  // GAME OVER
  ctx.save();
  ctx.shadowColor = RED; ctx.shadowBlur = 16;
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 42px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER!', W / 2, 62);
  ctx.shadowBlur = 0;
  ctx.restore();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px Fredoka One, cursive';
  ctx.fillText('Score: ' + score, W / 2, 100);
  if (score > 0 && score >= bestScore) {
    ctx.fillStyle = GOLD;
    ctx.font = 'bold 14px Fredoka One, cursive';
    ctx.fillText('NEW BEST!', W / 2, 122);
  }

  // Leaderboard
  const lbCount = leaderboard.length ? Math.min(leaderboard.length, 5) : 0;
  const lbH = lbCount ? lbCount * 24 + 30 : 60;
  drawLeaderboard(20, 138, W - 40, lbH, leaderboard, 5);

  const btnStart = 138 + lbH + 20;

  // Buy Me a Coffee
  coffeeBtnRect = { x: 40, y: btnStart, w: W - 80, h: 40 };
  roundRect(coffeeBtnRect.x, coffeeBtnRect.y, coffeeBtnRect.w, coffeeBtnRect.h, 20, '#FFDD00', '#d4a800', 2);
  ctx.fillStyle = '#1a0a2e';
  ctx.font = 'bold 16px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Buy Me a Coffee', W / 2, btnStart + 20);
  ctx.textBaseline = 'alphabetic';

  // Get Your Own Game
  const gameY = btnStart + 54;
  gameBtnRect = { x: 20, y: gameY, w: W - 40, h: 50 };
  roundRect(gameBtnRect.x, gameBtnRect.y, gameBtnRect.w, gameBtnRect.h, 10, 'rgba(245,197,24,0.08)', GOLD, 2);
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 12px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('Want your own custom game?', W / 2, gameY + 20);
  ctx.fillStyle = '#fff';
  ctx.font = '12px Fredoka One, cursive';
  ctx.fillText('asherarcade.com', W / 2, gameY + 38);

  // Play Again
  const againY = gameY + 72;
  againBtnRect = drawButton(W / 2, againY, 240, 44, 'PLAY AGAIN', GOLD, RED, '#1a0a2e', 20);

  // Footer
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '9px Fredoka One, cursive';
  ctx.textAlign = 'center';
  ctx.fillText('ASHER ARCADE \u00A9 2026 \u2022 asherarcade.com', W / 2, H - 12);
}

// ============================================================
// L. MAIN LOOP
// ============================================================
let lastTime = 0;

function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  update(dt);
  updateParticles(dt);

  if (state === 'loading') {
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = GOLD;
    ctx.font = 'bold 24px Fredoka One, cursive';
    ctx.textAlign = 'center';
    ctx.fillText('Loading...', W / 2, H / 2);
  } else if (state === 'title') {
    drawTitle(dt);
  } else if (state === 'playing') {
    drawGame(dt);
  } else if (state === 'gameover') {
    drawGameOver(dt);
  }

  requestAnimationFrame(loop);
}

// ============================================================
// M. INIT
// ============================================================
fetchLB();
let _fontsReady = false, _imgsReady2 = false;
function _checkReady() {
  if (_fontsReady && _imgsReady2) { state = 'title'; requestAnimationFrame(loop); }
}
initCharacters(() => { _imgsReady2 = true; _checkReady(); });
document.fonts.load('bold 20px "Fredoka One"').then(() => {
  _fontsReady = true; _checkReady();
}).catch(() => {
  _fontsReady = true; _checkReady();
});
// Fallback: start after 4s regardless
setTimeout(() => { _fontsReady = true; _imgsReady2 = true; _checkReady(); }, 4000);
</script>
