<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>A Very Special Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100dvh;
      background:linear-gradient(160deg,#fff5f9 0%,#fde8f0 55%,#fdf3e0 100%);
      font-family:'Lato',sans-serif;
      display:flex;flex-direction:column;align-items:center;
      overflow-x:hidden;
    }
    header{width:100%;text-align:center;padding:14px 16px 4px;}
    .hearts{font-size:17px;letter-spacing:8px;margin-bottom:3px;}
    header h1{
      font-family:'Playfair Display',serif;
      font-size:clamp(14px,4.2vw,24px);
      color:#c0476a;line-height:1.25;
    }
    header h2{
      font-family:'Playfair Display',serif;
      font-size:clamp(14px,4.2vw,24px);
      color:#c0476a;line-height:1.25;
      font-weight:400;font-style:italic;
      margin-top:1px;
    }
    .divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,#e8a0b8,transparent);margin:7px auto;}

    /* ── outer shell holds board + arrows ── */
    #outer{
      position:relative;
      flex:0 0 auto;
      margin:0 auto;
    }

    /* Arrow labels around the board */
    .exit-arrow{
      position:absolute;
      font-size:clamp(10px,1.8vw,13px);
      color:#d080a0;
      pointer-events:none;
      z-index:30;
      transition:opacity 0.3s;
      line-height:1;
    }

    /* Board wrapper - clips pieces at edges */
    #wrap{
      position:absolute;
      border-radius:10px;
      overflow:hidden;
      border:2px solid rgba(232,160,184,0.4);
      box-shadow:0 3px 18px rgba(192,71,106,0.13);
    }

    /* QR always behind everything */
    #qr-layer{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;z-index:0;
    }
    #qr-img{
      width:70%;height:70%;
      object-fit:contain;border-radius:8px;
      filter:blur(12px);
      transition:filter 1.2s ease;
    }

    /* Grid lines */
    #grid-canvas{position:absolute;inset:0;pointer-events:none;z-index:1;}

    /* Pieces layer */
    #board{position:absolute;inset:0;z-index:2;overflow:visible;}

    .piece{
      position:absolute;
      background-repeat:no-repeat;
      background-position:center center;
      background-size:contain;
      background-color:rgba(255,247,251,0.9);
      border-radius:10px;
      border:1.5px solid rgba(232,160,184,0.3);
      box-shadow:0 2px 8px rgba(192,71,106,0.18),0 1px 3px rgba(0,0,0,0.07);
      touch-action:none;cursor:grab;user-select:none;
    }
    .piece.dragging{
      cursor:grabbing;
      box-shadow:0 8px 22px rgba(192,71,106,0.32),0 2px 8px rgba(0,0,0,0.1);
      z-index:200!important;
      background-color:rgba(255,250,253,0.96);
    }
    .piece.at-exit{
      border-color:rgba(192,71,106,0.7)!important;
      box-shadow:0 0 0 2px rgba(192,71,106,0.5),0 6px 18px rgba(192,71,106,0.3)!important;
    }

    #hint{
      font-size:clamp(10px,2.6vw,12px);color:#b06080;
      text-align:center;padding:4px 10px;min-height:22px;
    }
    #hint.celebrate{
      font-weight:700;color:#c0476a;
      animation:pulse 0.9s ease infinite alternate;
    }
    @keyframes pulse{from{opacity:0.65}to{opacity:1}}

    .btn-row{
      display:flex;gap:8px;justify-content:center;
      padding:3px 10px 8px;flex-wrap:wrap;
    }
    .btn{
      font-family:'Lato',sans-serif;font-size:clamp(10px,2.5vw,12px);
      padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
      text-decoration:none;display:inline-block;transition:opacity 0.15s;
      white-space:nowrap;
    }
    .btn:hover{opacity:0.82;}
    .btn-arcade{background:#c0476a;color:#fff;}
    .btn-coffee{background:#fde8f0;color:#c0476a;border:1px solid #e8a0b8;}

    footer{padding:6px 10px 10px;font-size:10px;color:#c0a0a8;text-align:center;}
    footer a{color:#c0476a;text-decoration:none;font-family:'Playfair Display',serif;font-size:11px;}
  </style>
</head>

const DEFS = [{"id": "car", "row": 2, "col": 0, "len": 3, "dir": "h", "img": "car_h", "ex": "right", "et": 2}, {"id": "couple_v", "row": 0, "col": 0, "len": 2, "dir": "v", "img": "couple_v", "ex": "up", "et": 0}, {"id": "flowers_h", "row": 1, "col": 3, "len": 2, "dir": "h", "img": "flowers_h", "ex": "left", "et": 1}, {"id": "toast_v", "row": 2, "col": 4, "len": 2, "dir": "v", "img": "toast_v", "ex": "up", "et": 4}, {"id": "cake_v", "row": 2, "col": 3, "len": 3, "dir": "v", "img": "cake_v", "ex": "down", "et": 3}, {"id": "rings_v", "row": 0, "col": 5, "len": 2, "dir": "v", "img": "rings_v", "ex": "up", "et": 5}, {"id": "cake_h", "row": 0, "col": 2, "len": 2, "dir": "h", "img": "cake_h", "ex": "right", "et": 0}, {"id": "rings_h", "row": 3, "col": 1, "len": 2, "dir": "h", "img": "rings_h", "ex": "right", "et": 3}, {"id": "flowers_v", "row": 3, "col": 5, "len": 3, "dir": "v", "img": "flowers_v", "ex": "down", "et": 5}, {"id": "car_rear", "row": 4, "col": 4, "len": 2, "dir": "v", "img": "car_rear", "ex": "down", "et": 4}, {"id": "toast_h", "row": 5, "col": 0, "len": 3, "dir": "h", "img": "toast_h", "ex": "left", "et": 5}, {"id": "couple_h", "row": 4, "col": 1, "len": 2, "dir": "h", "img": "couple_h", "ex": "left", "et": 4}];
const GRID = 6;
const ARROW_PAD = 18; // px around board for arrows

const outer     = document.getElementById('outer');
const arrowsCon = document.getElementById('arrows-container');
const wrap      = document.getElementById('wrap');
const board     = document.getElementById('board');
const qrImg     = document.getElementById('qr-img');
const hint      = document.getElementById('hint');
const gridCvs   = document.getElementById('grid-canvas');

let TILE = 0;
const pieces = DEFS.map(d => ({...d, removed:false, el:null}));

function computeSize() {
  const headerH = document.querySelector('header').offsetHeight;
  const bottomH = 24 + 46 + 26 + 18; // hint + buttons + footer + margin
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const avail = Math.min(vw - ARROW_PAD*2 - 16, vh - headerH - bottomH - ARROW_PAD*2);
  TILE = Math.max(40, Math.floor(avail / GRID));
  const px = TILE * GRID;
  const outerPx = px + ARROW_PAD * 2;
  outer.style.width  = outerPx + 'px';
  outer.style.height = outerPx + 'px';
  wrap.style.width   = px + 'px';
  wrap.style.height  = px + 'px';
  wrap.style.left    = ARROW_PAD + 'px';
  wrap.style.top     = ARROW_PAD + 'px';
  gridCvs.width  = px;
  gridCvs.height = px;
  drawGrid(px);
  renderArrows(px);
}

function drawGrid(px) {
  const ctx = gridCvs.getContext('2d');
  ctx.clearRect(0,0,px,px);
  ctx.strokeStyle = 'rgba(192,100,140,0.09)';
  ctx.lineWidth = 1;
  for(let i=1;i<GRID;i++) {
    ctx.beginPath();ctx.moveTo(i*TILE,0);ctx.lineTo(i*TILE,px);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*TILE);ctx.lineTo(px,i*TILE);ctx.stroke();
  }
}

function renderArrows(px) {
  arrowsCon.innerHTML = '';
  // Show arrow only if piece using that exit is still on board
  const activeExits = new Set(pieces.filter(p=>!p.removed).map(p=>p.ex+'-'+p.et));

  function arrow(sym, styleObj) {
    if(!styleObj.active) return;
    const d = document.createElement('div');
    d.className = 'exit-arrow';
    d.textContent = sym;
    Object.assign(d.style, {
      position:'absolute',
      left: styleObj.x !== undefined ? styleObj.x+'px' : '',
      right: styleObj.right !== undefined ? styleObj.right+'px' : '',
      top:  styleObj.y !== undefined ? styleObj.y+'px' : '',
      bottom: styleObj.bottom !== undefined ? styleObj.bottom+'px' : '',
    });
    arrowsCon.appendChild(d);
  }

  const AP = ARROW_PAD;
  // RIGHT exits (rows 0, 2, 3)
  [0,2,3].forEach(row => {
    arrow('▶', { active: activeExits.has('right-'+row), right:0, y: AP+row*TILE+TILE/2-8 });
  });
  // LEFT exits (rows 1, 4, 5)
  [1,4,5].forEach(row => {
    arrow('◀', { active: activeExits.has('left-'+row), x:0, y: AP+row*TILE+TILE/2-8 });
  });
  // UP exits (cols 0, 4, 5)
  [0,4,5].forEach(col => {
    arrow('▲', { active: activeExits.has('up-'+col), x: AP+col*TILE+TILE/2-8, y:0 });
  });
  // DOWN exits (cols 3, 4, 5)
  [3,4,5].forEach(col => {
    arrow('▼', { active: activeExits.has('down-'+col), x: AP+col*TILE+TILE/2-8, bottom:0 });
  });
}

function buildPieces() {
  board.innerHTML = '';
  pieces.forEach(p => {
    const div = document.createElement('div');
    div.className = 'piece';
    div.dataset.id = p.id;
    div.style.backgroundImage = `url(${IMGS[p.img]})`;
    div.style.zIndex = 10;
    board.appendChild(div);
    p.el = div;
    div.addEventListener('pointerdown', onDown);
  });
}

function place() {
  pieces.forEach(p => {
    if(p.removed){p.el.style.display='none';return;}
    const w = p.dir==='h' ? p.len*TILE : TILE;
    const h = p.dir==='v' ? p.len*TILE : TILE;
    p.el.style.display = 'block';
    p.el.style.width   = w+'px';
    p.el.style.height  = h+'px';
    p.el.style.left    = p.col*TILE+'px';
    p.el.style.top     = p.row*TILE+'px';
  });
}

function occupancy(excId) {
  const g = Array.from({length:GRID},()=>Array(GRID).fill(null));
  pieces.forEach(p => {
    if(p.removed||p.id===excId) return;
    if(p.dir==='h') for(let c=p.col;c<p.col+p.len;c++) {if(c>=0&&c<GRID)g[p.row][c]=p.id;}
    else            for(let r=p.row;r<p.row+p.len;r++) {if(r>=0&&r<GRID)g[r][p.col]=p.id;}
  });
  return g;
}

// Returns [min, max] positions (col for h, row for v)
// Exit extends range to -len or GRID only for the designated exit direction/track
function getRange(p, occ) {
  if(p.dir==='h') {
    let min=0, max=GRID-p.len;
    for(let c=p.col-1;c>=0;c--)   {if(occ[p.row][c]){min=c+1;break;}}
    for(let c=p.col+p.len;c<GRID;c++) {if(occ[p.row][c]){max=c-p.len;break;}}
    if(p.ex==='left'  && p.et===p.row) min=-p.len;
    if(p.ex==='right' && p.et===p.row) max=GRID;
    return [min, max];
  } else {
    let min=0, max=GRID-p.len;
    for(let r=p.row-1;r>=0;r--)   {if(occ[r][p.col]){min=r+1;break;}}
    for(let r=p.row+p.len;r<GRID;r++) {if(occ[r][p.col]){max=r-p.len;break;}}
    if(p.ex==='up'   && p.et===p.col) min=-p.len;
    if(p.ex==='down' && p.et===p.col) max=GRID;
    return [min, max];
  }
}

let drag = null;
const getXY = e => e.touches ? [e.touches[0].clientX,e.touches[0].clientY] : [e.clientX,e.clientY];

function onDown(e) {
  const p = pieces.find(x=>x.id===e.currentTarget.dataset.id);
  if(!p||p.removed) return;
  e.preventDefault();
  const [sx,sy] = getXY(e);
  drag = {p, occ:occupancy(p.id), sx, sy, sr:p.row, sc:p.col};
  p.el.classList.add('dragging');
  p.el.style.zIndex = 200;
}

function onMove(e) {
  if(!drag) return;
  e.preventDefault();
  const [cx,cy] = getXY(e);
  const {p,occ,sx,sy,sr,sc} = drag;
  const [min,max] = getRange(p,occ);
  if(p.dir==='h') {
    const newCol = Math.max(min, Math.min(max, sc+Math.round((cx-sx)/TILE)));
    if(newCol!==p.col){p.col=newCol;place();}
    const atExit = (p.ex==='left'&&newCol<=0)||(p.ex==='right'&&newCol>=GRID-p.len);
    p.el.classList.toggle('at-exit', atExit);
  } else {
    const newRow = Math.max(min, Math.min(max, sr+Math.round((cy-sy)/TILE)));
    if(newRow!==p.row){p.row=newRow;place();}
    const atExit = (p.ex==='up'&&newRow<=0)||(p.ex==='down'&&newRow>=GRID-p.len);
    p.el.classList.toggle('at-exit', atExit);
  }
}

function onUp() {
  if(!drag) return;
  const {p} = drag;
  p.el.classList.remove('dragging','at-exit');
  p.el.style.zIndex = 10;
  drag = null;
  if(p.dir==='h') { if(p.col+p.len<=0||p.col>=GRID) p.removed=true; }
  else            { if(p.row+p.len<=0||p.row>=GRID) p.removed=true; }
  place();
  renderArrows(TILE*GRID);
  updateQR();
}

function updateQR() {
  const total = pieces.length;
  const gone  = pieces.filter(p=>p.removed).length;
  const pct   = gone/total;
  qrImg.style.filter = gone===total ? 'blur(0px)' : 'blur(12px)';
  if(gone===0)          hint.textContent = "Each piece has its own exit — find the arrows! ▲▼◀▶";
  else if(pct < 0.35)   hint.textContent = "Nice move! Keep going... 👀";
  else if(pct < 0.65)   hint.textContent = "Making progress! 💍 You can see something forming...";
  else if(gone < total) hint.textContent = "Almost there — just a few more pieces! 🥂";
  else { hint.textContent = "🎉 You did it! Scan the QR code for the surprise!"; hint.classList.add('celebrate'); }
}

document.addEventListener('DOMContentLoaded', () => {
  computeSize();
  buildPieces();
  place();
  window.addEventListener('pointermove', onMove, {passive:false});
  window.addEventListener('pointerup', onUp);
  window.addEventListener('pointercancel', onUp);
  window.addEventListener('resize', () => { computeSize(); place(); renderArrows(TILE*GRID); });
});
</script>
</body>
</html>
