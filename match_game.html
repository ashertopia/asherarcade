<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Photo Booth Memory Match – Asher Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0010;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Share Tech Mono', monospace;
  }
  #gameContainer {
    position: relative;
    width: 360px;
    height: 640px;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 360px;
    height: 640px;
    image-rendering: pixelated;
  }
  /* Input overlay for name entry */
  #nameOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 10;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 16px;
  }
  #nameOverlay.active { display: flex; }
  #nameOverlay h2 {
    font-family: 'Orbitron', monospace;
    color: #ff00ff;
    font-size: 18px;
    text-shadow: 0 0 12px #ff00ff;
    letter-spacing: 2px;
    text-align: center;
  }
  #nameInput {
    background: #0a0010;
    border: 2px solid #00ffff;
    color: #00ffff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    padding: 10px 16px;
    width: 240px;
    text-align: center;
    outline: none;
    box-shadow: 0 0 12px #00ffff;
    letter-spacing: 2px;
  }
  #nameInput::placeholder { color: #006666; }
  #submitName {
    background: linear-gradient(135deg, #ff00ff, #ff6600);
    border: none;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    padding: 10px 28px;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 0 20px #ff00ff88;
  }
  #submitName:hover { box-shadow: 0 0 30px #ff00ffcc; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="360" height="640"></canvas>
  <div id="nameOverlay">
    <h2>ENTER YOUR NAME<br>FOR THE LEADERBOARD</h2>
    <input id="nameInput" type="text" maxlength="14" placeholder="YOUR NAME" autocomplete="off" />
    <button id="submitName">SUBMIT SCORE</button>
  </div>
</div>

    photoImgs[p] = [];
    for (let side = 0; side < 2; side++) {
      const img = new Image();
      img.onload = () => { photosLoaded++; if (photosLoaded === totalPhotos) callback(); };
      img.onerror = () => { photosLoaded++; if (photosLoaded === totalPhotos) callback(); };
      img.src = 'data:image/jpeg;base64,' + PHOTO_DATA[p][side];
      photoImgs[p][side] = img;
    }
  }
}

const PAIR_COLORS = ["#cc88ff", "#4488ff", "#ffaa44", "#44ff88", "#ff4488", "#44ffff"];

// ── PHOTO PLACEHOLDERS (replaced) ──
// These are the 6 photo "slots". Each gets a color + label.
// To swap in real photos, replace drawPhotoPlaceholder() calls
// with drawImage() using base64 images.
// Pre-render photo canvases
const photoCanvases = [];
function buildPhotoCanvases() {
  for (let p = 0; p < PAIRS; p++) {
    // Each pair has two cards: side 0 and side 1
    for (let side = 0; side < 2; side++) {
      const oc = document.createElement('canvas');
      oc.width = CARD_W - 6;
      oc.height = CARD_H - 6;
      const oc2 = oc.getContext('2d');
      const img = photoImgs[p][side];
      // Draw photo scaled to fill card face
      oc2.drawImage(img, 0, 0, oc.width, oc.height);
      // Film-strip sprocket holes
      oc2.fillStyle = 'rgba(0,0,0,0.55)';
      oc2.fillRect(0, 0, oc.width, 10);
      oc2.fillRect(0, oc.height - 10, oc.width, 10);
      oc2.fillStyle = 'rgba(255,255,255,0.5)';
      const sw = 8, sh = 5, sg = 14;
      for (let sx = 4; sx < oc.width - 4; sx += sg) {
        oc2.fillRect(sx, 2, sw, sh);
        oc2.fillRect(sx, oc.height - sh - 2, sw, sh);
      }
      photoCanvases.push(oc);
    }
  }
}

// ── CARD DATA ─────────────────────────────────────────────────
let cards = [];
function buildCards() {
  cards = [];
  // Create pairs: each pair index p produces two distinct card ids: p*2 and p*2+1
  let ids = [];
  for (let p = 0; p < PAIRS; p++) ids.push(p * 2, p * 2 + 1);
  // Fisher-Yates shuffle
  for (let i = ids.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [ids[i], ids[j]] = [ids[j], ids[i]];
  }
  for (let i = 0; i < TOTAL_CARDS; i++) {
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    cards.push({
      id: i,
      photoIndex: ids[i],          // 0-11, canvas index
      pairIndex: Math.floor(ids[i] / 2), // 0-5, for match checking
      x: GRID_X + col * (CARD_W + GAP_X),
      y: GRID_Y + row * (CARD_H + GAP_Y),
      w: CARD_W,
      h: CARD_H,
      flipped: false,
      matched: false,
      flipT: 0,
      flipDir: 0,
      glowT: 0,
      shakeT: 0,
    });
  }
}

// ── GAME LOGIC ────────────────────────────────────────────────
let flippedCards = [];    // indices of currently face-up unmatched cards
let canFlip = true;
let flipLockTimer = 0;
let matchCount = 0;
let flipCount = 0;
let startTime = 0;
let elapsed = 0;

// Particles
let particles = [];

function startGame() {
  buildCards();
  flippedCards = [];
  canFlip = true;
  flipLockTimer = 0;
  matchCount = 0;
  flipCount = 0;
  startTime = Date.now();
  elapsed = 0;
  particles = [];
  gameState = STATE.PLAYING;
}

function cardAt(tx, ty) {
  for (let i = 0; i < cards.length; i++) {
    const c = cards[i];
    if (!c.matched && tx >= c.x && tx <= c.x + c.w && ty >= c.y && ty <= c.y + c.h) return i;
  }
  return -1;
}

function onTap(tx, ty) {
  if (gameState === STATE.TITLE) {
    // Check "LET'S PLAY" button area
    if (tx >= 80 && tx <= 280 && ty >= 542 && ty <= 582) {
      startGame();
    }
    return;
  }
  if (gameState === STATE.WIN) {
    // Check "PLAY AGAIN" button
    if (tx >= 80 && tx <= 280 && ty >= 570 && ty <= 610) {
      gameState = STATE.TITLE;
    }
    return;
  }
  if (gameState !== STATE.PLAYING) return;
  if (!canFlip) return;

  const idx = cardAt(tx, ty);
  if (idx === -1) return;
  const card = cards[idx];
  if (card.flipped || card.matched) return;
  if (flippedCards.includes(idx)) return;

  // Flip it
  card.flipped = true;
  card.flipDir = 1;
  flipCount++;
  flippedCards.push(idx);

  if (flippedCards.length === 2) {
    const a = cards[flippedCards[0]];
    const b = cards[flippedCards[1]];
    if (a.pairIndex === b.pairIndex) {
      // Match!
      matchCount++;
      setTimeout(() => {
        a.matched = true; b.matched = true;
        a.glowT = 1; b.glowT = 1;
        spawnMatchParticles(a); spawnMatchParticles(b);
        flippedCards = [];
        if (matchCount === PAIRS) triggerWin();
      }, 400);
    } else {
      // Mismatch
      canFlip = false;
      flipLockTimer = 900;
      setTimeout(() => {
        a.flipped = false; a.flipDir = -1;
        b.flipped = false; b.flipDir = -1;
        a.shakeT = 1; b.shakeT = 1;
        flippedCards = [];
        canFlip = true;
      }, 900);
    }
  }
}

function triggerWin() {
  elapsed = (Date.now() - startTime) / 1000;
  // Score: base 10000, minus time penalty, minus flip penalty
  const timePenalty = Math.floor(elapsed * 20);
  const flipPenalty = Math.max(0, flipCount - PAIRS) * 50;
  finalScore = Math.max(100, 10000 - timePenalty - flipPenalty);
  if (finalScore > bestScore) bestScore = finalScore;
  gameState = STATE.WIN;
  // Spawn win burst
  spawnWinParticles();
}

// ── PARTICLES ─────────────────────────────────────────────────
function spawnMatchParticles(card) {
  const cx = card.x + card.w / 2;
  const cy = card.y + card.h / 2;
  const col = PAIR_COLORS[card.pairIndex] || "#ff00ff";
  for (let i = 0; i < 16; i++) {
    const angle = (Math.PI * 2 * i) / 16;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * (1.5 + Math.random() * 2),
      vy: Math.sin(angle) * (1.5 + Math.random() * 2),
      life: 1, decay: 0.025 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      color: col,
      type: 'spark'
    });
  }
}
function spawnWinParticles() {
  for (let i = 0; i < 60; i++) {
    const colors = [NEON.pink, NEON.cyan, NEON.yellow, NEON.orange, NEON.green];
    particles.push({
      x: Math.random() * W,
      y: -10,
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 4,
      life: 1, decay: 0.012,
      r: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      type: 'confetti',
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.type === 'confetti') p.rot += p.rotV;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ── ANIMATION ─────────────────────────────────────────────────
let lastTime = 0;
const FLIP_SPEED = 0.12; // per frame fraction

function updateCards(dt) {
  for (const c of cards) {
    // Flip animation
    if (c.flipDir === 1 && c.flipT < 1) {
      c.flipT = Math.min(1, c.flipT + FLIP_SPEED);
    } else if (c.flipDir === -1 && c.flipT > 0) {
      c.flipT = Math.max(0, c.flipT - FLIP_SPEED);
    }
    // Glow decay
    if (c.glowT > 0) c.glowT = Math.max(0, c.glowT - 0.02);
    // Shake decay
    if (c.shakeT > 0) c.shakeT = Math.max(0, c.shakeT - 0.04);
  }
}

// ── DRAW HELPERS ──────────────────────────────────────────────
function neonText(text, x, y, color, size, align = 'center', blur = 12) {
  ctx.save();
  ctx.font = `900 ${size}px 'Orbitron', monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = blur;
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.shadowBlur = 0;
  ctx.restore();
}
function monoText(text, x, y, color, size, align = 'center') {
  ctx.save();
  ctx.font = `${size}px 'Share Tech Mono', monospace`;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
  ctx.restore();
}

function drawScanlines() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  ctx.restore();
}

function drawGrid() {
  // Outrun-style grid lines on title screen
  ctx.save();
  ctx.strokeStyle = 'rgba(255,0,255,0.25)';
  ctx.lineWidth = 0.5;
  const horizon = H * 0.52;
  // Vertical lines converging to center
  for (let i = 0; i <= 12; i++) {
    const fx = (i / 12) * W;
    ctx.beginPath();
    ctx.moveTo(fx, horizon);
    ctx.lineTo(W / 2 + (fx - W / 2) * 0.08, H + 10);
    ctx.stroke();
  }
  // Horizontal lines
  for (let j = 0; j < 8; j++) {
    const fy = horizon + (j / 8) * (H - horizon + 20);
    ctx.globalAlpha = 0.15 + j * 0.05;
    ctx.beginPath();
    ctx.moveTo(0, fy);
    ctx.lineTo(W, fy);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCardBack(x, y, w, h) {
  // Card body
  const grad = ctx.createLinearGradient(x, y, x + w, y + h);
  grad.addColorStop(0, '#1a0030');
  grad.addColorStop(1, '#0d001f');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);

  // Chrome border
  ctx.strokeStyle = NEON.cyan;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = NEON.cyan;
  ctx.shadowBlur = 8;
  ctx.strokeRect(x + 0.75, y + 0.75, w - 1.5, h - 1.5);
  ctx.shadowBlur = 0;

  // Inner border accent
  ctx.strokeStyle = 'rgba(255,0,255,0.35)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x + 4, y + 4, w - 8, h - 8);

  // Monogram / initials
  ctx.save();
  ctx.font = `900 20px 'Orbitron', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = NEON.pink;
  ctx.shadowBlur = 14;
  ctx.fillStyle = NEON.pink;
  ctx.fillText(COUPLE_INITIALS, x + w / 2, y + h / 2 - 6);
  ctx.shadowBlur = 0;
  ctx.font = `9px 'Share Tech Mono', monospace`;
  ctx.fillStyle = 'rgba(255,0,255,0.5)';
  ctx.fillText('MEMORY MATCH', x + w / 2, y + h / 2 + 12);
  ctx.restore();

  // Corner diamonds
  const dm = 4;
  ctx.fillStyle = NEON.cyan;
  [[x + 8, y + 8], [x + w - 8, y + 8], [x + 8, y + h - 8], [x + w - 8, y + h - 8]].forEach(([cx2, cy2]) => {
    ctx.beginPath();
    ctx.moveTo(cx2, cy2 - dm); ctx.lineTo(cx2 + dm, cy2);
    ctx.lineTo(cx2, cy2 + dm); ctx.lineTo(cx2 - dm, cy2);
    ctx.closePath(); ctx.fill();
  });
}

function drawCardFace(card) {
  const x = card.x, y = card.y, w = card.w, h = card.h;
  // Draw from pre-rendered offscreen canvas
  const pc = photoCanvases[card.photoIndex];
  const margin = 3;
  // Background
  ctx.fillStyle = '#0d001f';
  ctx.fillRect(x, y, w, h);
  // Draw photo placeholder
  ctx.drawImage(pc, x + margin, y + margin, w - margin * 2, h - margin * 2);
  // Neon border matching photo color
  const col = PAIR_COLORS[card.pairIndex] || "#ff00ff";
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = col;
  ctx.shadowBlur = 10;
  ctx.strokeRect(x + 0.75, y + 0.75, w - 1.5, h - 1.5);
  ctx.shadowBlur = 0;
}

function drawCard(card) {
  if (card.matched) {
    // Draw face + glow
    const glow = card.glowT;
    if (glow > 0) {
      ctx.save();
      ctx.shadowColor = PAIR_COLORS[card.pairIndex] || "#ff00ff";
      ctx.shadowBlur = 20 * glow;
    }
    drawCardFace(card);
    if (glow > 0) ctx.restore();

    // Match star overlay
    if (glow > 0.3) {
      ctx.save();
      ctx.globalAlpha = glow * 0.6;
      ctx.fillStyle = '#ffffff';
      const cx2 = card.x + card.w / 2, cy2 = card.y + card.h / 2;
      ctx.font = '22px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✦', cx2, cy2);
      ctx.globalAlpha = 1;
      ctx.restore();
    }
    return;
  }

  // Shake offset for mismatch
  let shakeX = 0;
  if (card.shakeT > 0) {
    shakeX = Math.sin(card.shakeT * Math.PI * 10) * 4 * card.shakeT;
  }

  // Flip animation using scaleX
  const t = card.flipT; // 0=back, 1=face
  const halfPt = 0.5;
  let scaleX;
  if (t < halfPt) {
    scaleX = 1 - t / halfPt; // 1 → 0
  } else {
    scaleX = (t - halfPt) / halfPt; // 0 → 1
  }

  ctx.save();
  const cx2 = card.x + card.w / 2 + shakeX;
  const cy2 = card.y + card.h / 2;
  ctx.translate(cx2, cy2);
  ctx.scale(scaleX, 1);
  ctx.translate(-card.w / 2, -card.h / 2);

  if (t < halfPt) {
    drawCardBack(0, 0, card.w, card.h);
  } else {
    // Temporary reposition for drawCardFace
    const savedX = card.x, savedY = card.y;
    card.x = 0; card.y = 0;
    drawCardFace(card);
    card.x = savedX; card.y = savedY;
  }
  ctx.restore();
}

// ── LEADERBOARD ───────────────────────────────────────────────
function fetchLeaderboard() {
  leaderboardStatus = 'loading';
  fetch(APPS_SCRIPT_URL)
    .then(r => r.json())
    .then(data => {
      if (Array.isArray(data)) {
        leaderboard = data;
      } else if (Array.isArray(data.scores)) {
        leaderboard = data.scores;
      } else {
        leaderboard = [];
      }
      leaderboardStatus = 'loaded';
    })
    .catch(() => { leaderboardStatus = 'error'; leaderboard = []; });
}

function submitScore(name, score) {
  const url = `${APPS_SCRIPT_URL}?name=${encodeURIComponent(name)}&score=${encodeURIComponent(score)}`;
  fetch(url).then(() => fetchLeaderboard()).catch(() => {});
}

function drawLeaderboardBox(y, maxRows = 15) {

  ctx.fillStyle = NEON.green;
  ctx.shadowColor = NEON.green;
  ctx.shadowBlur = 6;
  ctx.fillRect(pbX, pbY, pbW * pct, pbH);
  ctx.shadowBlur = 0;

  // Draw cards
  for (const card of cards) drawCard(card);

  // Particles
  drawParticles();
  drawScanlines();
  drawFooter();
}

function drawWin() {

  if (!scoreSubmitted) {

  // ── BUY ME A COFFEE button ──────────────────────────────────
  const coffeeY = 438;
  const cbw = W - 40, cbh = 38, cbx = 20, cby = coffeeY - cbh / 2;
  const coffeeGrad = ctx.createLinearGradient(cbx, cby, cbx + cbw, cby + cbh);
  coffeeGrad.addColorStop(0, '#1a6fa8');
  coffeeGrad.addColorStop(1, '#0d4f7a');
  ctx.fillStyle = coffeeGrad;
  ctx.fillRect(cbx, cby, cbw, cbh);
  ctx.strokeStyle = '#3D95CE';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#3D95CE';
  ctx.shadowBlur = 10;
  ctx.strokeRect(cbx, cby, cbw, cbh);
  ctx.shadowBlur = 0;
  ctx.font = `900 13px 'Orbitron', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('☕  BUY ME A COFFEE', W / 2, coffeeY);

  // ── GET YOUR OWN GAME button ────────────────────────────────
  const gameY = 486;
  const gbw = W - 40, gbh = 38, gbx = 20, gby = gameY - gbh / 2;
  const gameGrad = ctx.createLinearGradient(gbx, gby, gbx + gbw, gby + gbh);
  gameGrad.addColorStop(0, '#3d0060');
  gameGrad.addColorStop(1, '#1a0030');
  ctx.fillStyle = gameGrad;
  ctx.fillRect(gbx, gby, gbw, gbh);
  ctx.strokeStyle = NEON.pink;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = NEON.pink;
  ctx.shadowBlur = 10;
  ctx.strokeRect(gbx, gby, gbw, gbh);
  ctx.shadowBlur = 0;
  ctx.font = `900 11px 'Orbitron', monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText('🎮  GET YOUR OWN GAME', W / 2, gameY - 6);
  ctx.font = `9px 'Share Tech Mono', monospace`;
  ctx.fillStyle = NEON.pink;
  ctx.fillText('asherarcade.com', W / 2, gameY + 9);

  // ── PLAY AGAIN button ───────────────────────────────────────
  drawNeonButton('PLAY AGAIN', W / 2, 542, NEON.cyan);

  drawScanlines();
  drawFooter();
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    if (p.type === 'confetti') {
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────
function loop(ts) {
  const dt = ts - lastTime;
  lastTime = ts;

  updateCards(dt);
  updateParticles(dt);

  if (gameState === STATE.TITLE) drawTitle();
  else if (gameState === STATE.PLAYING) drawPlaying();
  else if (gameState === STATE.WIN) drawWin();

  requestAnimationFrame(loop);
}

// ── INPUT ─────────────────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  let cx, cy;
  if (e.touches) {
    cx = (e.touches[0].clientX - rect.left) * scaleX;
    cy = (e.touches[0].clientY - rect.top) * scaleY;
  } else {
    cx = (e.clientX - rect.left) * scaleX;
    cy = (e.clientY - rect.top) * scaleY;
  }
  return { x: cx, y: cy };
}

canvas.addEventListener('click', (e) => {
  const { x, y } = getCanvasPos(e);
  if (gameState === STATE.WIN) {
    // Submit score

      window.location.href = appUrl;

  }
  onTap(x, y);
});
