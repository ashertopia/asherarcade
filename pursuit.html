<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pursuit Camp 2026 — Leader Schedule</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Pursuit">
<link rel="apple-touch-icon" href="./pursuit-icon-180.png">
<link rel="icon" type="image/png" href="./pursuit-icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script defer src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2a323d;
  --txt:#e6edf3; --dim:#8b949e; --pink:#eef2f8; --green:#7cc63a;
  --blue:#58a6ff; --amber:#e3b341; --now:#ffffff;
}
html,body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
body{padding-bottom:62px;}
a{color:var(--green);}
.wrap{max-width:820px;margin:0 auto;padding:14px;}
header.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0d1117 70%,rgba(13,17,23,.85));border-bottom:1px solid var(--line);}
.top .wrap{padding:12px 14px 10px;}
.brand{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.brand .logo{height:46px;width:auto;filter:drop-shadow(0 2px 7px rgba(0,0,0,.55));}
.brandtxt{display:flex;flex-direction:column;gap:4px;}
.brand h1{font-size:19px;color:var(--pink);letter-spacing:.3px;line-height:1.02;}
.brand h1 .yr{font-size:14px;color:var(--dim);font-weight:700;letter-spacing:.5px;}
.brand .badge{font-size:11px;background:#21262d;color:var(--dim);border:1px solid var(--line);padding:2px 8px;border-radius:20px;}
.clock{margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px;color:var(--dim);}
.clock .live{display:inline-flex;align-items:center;gap:5px;color:var(--now);font-weight:600;}
.brandtxt{min-width:0;}
.dtcluster{margin-left:auto;display:flex;align-items:center;gap:8px;flex:0 0 auto;}
.dtbox{display:flex;flex-direction:column;align-items:flex-end;line-height:1.15;}
.dtbox .dtday{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.dtbox .dttime{font-size:15px;font-weight:700;color:var(--txt);font-variant-numeric:tabular-nums;}
.rfsh{background:var(--panel2);border:1px solid var(--line);color:var(--dim);font-size:14px;font-weight:600;padding:5px 9px;border-radius:16px;cursor:pointer;flex:0 0 auto;}
.rfsh:active{transform:scale(.96);}
.meRow{margin-top:9px;}
.meRow .mebar{margin-bottom:0;padding:7px 10px;}
.meRow .merow2{display:flex;align-items:center;gap:8px;}
.meRow .merow2 input.search{flex:1;}
.btn.tiny{font-size:12px;padding:5px 10px;flex:0 0 auto;}
.updatebar{position:fixed;left:0;right:0;bottom:52px;z-index:41;background:#123018;border-top:1px solid #245c34;border-bottom:1px solid #245c34;padding:10px 14px;display:none;align-items:center;gap:10px;box-shadow:0 -6px 20px rgba(0,0,0,.4);}
.updatebar.show{display:flex;}
.updatebar .t{flex:1;font-size:13px;color:#b6f0c4;font-weight:600;}
.tabbadge{display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;font-size:10px;font-weight:800;color:#101418;background:var(--now);border-radius:9px;padding:0 4px;margin-left:5px;vertical-align:middle;}
.mention{color:#f7c948;font-weight:700;}
.msg.mentionsme{border-color:#f7c948;box-shadow:0 0 0 1px rgba(247,201,72,.35);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--now);box-shadow:0 0 0 0 rgba(255,255,255,.6);animation:pulse 2s infinite;}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.5);}70%{box-shadow:0 0 0 8px rgba(255,255,255,0);}100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}}
.days{display:flex;gap:6px;overflow-x:auto;margin-top:10px;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.day{flex:0 0 auto;font-size:13px;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--dim);cursor:pointer;white-space:nowrap;}
.day.active{background:var(--pink);color:#101418;border-color:var(--pink);font-weight:700;}
.day.today{border-color:var(--now);}
.timerow{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12px;color:var(--dim);}
.timerow input[type=range]{flex:1;accent-color:var(--pink);}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:6px 11px;border-radius:8px;font-size:12px;cursor:pointer;}
.btn:active{transform:scale(.97);}
.btn.pink{background:var(--pink);color:#101418;border-color:var(--pink);font-weight:600;}
.tabs{display:flex;gap:6px;margin-top:12px;}
.tab{flex:1;text-align:center;padding:9px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;}
.tab.active{background:var(--panel2);color:var(--txt);border-color:var(--pink);}
.seg{display:flex;gap:6px;margin:4px 0 10px;}
.seg .s{flex:1;text-align:center;padding:8px;border-radius:8px;border:1px solid var(--line);background:var(--panel);color:var(--dim);font-size:13px;font-weight:600;cursor:pointer;}
.seg .s.active{background:var(--blue);color:#101418;border-color:var(--blue);}
.sectionlabel{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:18px 2px 8px;}
.nowcard{background:linear-gradient(135deg,#1a2230,#161b22);border:1px solid var(--now);border-radius:14px;padding:16px;box-shadow:0 0 0 1px rgba(255,255,255,.04);}
.nowcard .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--now);font-weight:700;}
.nowcard .title{font-size:22px;font-weight:700;margin-top:4px;}
.nowcard .meta{color:var(--dim);font-size:14px;margin-top:6px;display:flex;gap:14px;flex-wrap:wrap;}
.nowcard .next{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:13px;color:var(--dim);}
.nowcard .next b{color:var(--txt);}
.timeline{margin-top:6px;}
.tl{display:flex;gap:12px;padding:11px 12px;border-radius:11px;border:1px solid transparent;background:var(--panel);margin-bottom:7px;}
.tl.cur{border-color:var(--now);background:linear-gradient(135deg,#1a2230,#161b22);}
.tl.past{opacity:.5;}
.tl .t{flex:0 0 74px;font-size:12px;color:var(--dim);font-variant-numeric:tabular-nums;line-height:1.35;}
.tl .b{flex:1;}
.tl .b .nm{font-size:15px;font-weight:600;}
.tl .b .lc{font-size:13px;color:var(--dim);margin-top:2px;}
.tl.duty{background:linear-gradient(135deg,#1a2113,#161b22);border-color:var(--green);}
.tl.duty .nm{color:var(--green);}
.tl.duty .tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.6px;background:var(--green);color:#101418;padding:1px 7px;border-radius:20px;margin-left:7px;vertical-align:middle;font-weight:700;}
.lc a{color:var(--blue);text-decoration:none;}
.select{width:100%;padding:12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:15px;}
.member{display:flex;align-items:center;gap:12px;padding:12px;border-radius:11px;background:var(--panel);border:1px solid var(--line);margin-bottom:8px;cursor:pointer;}
.member:active{background:var(--panel2);}
.avatar{flex:0 0 40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#101418;}
.member .info{flex:1;min-width:0;}
.member .info .n{font-size:15px;font-weight:600;}
.member .info .r{font-size:12px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.member .wherenow{flex:0 0 auto;text-align:right;max-width:46%;}
.member .wherenow .w{font-size:13px;font-weight:600;}
.member .wherenow .w.duty{color:var(--green);}
.member .wherenow .sub{font-size:11px;color:var(--dim);margin-top:1px;}
.chip{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#21262d;border:1px solid var(--line);color:var(--dim);margin:2px 4px 2px 0;}
.empty{color:var(--dim);font-size:14px;text-align:center;padding:28px 10px;line-height:1.5;}
.banner{background:#2b2410;border:1px solid #5c4a12;color:#e3b341;font-size:12px;padding:9px 12px;border-radius:10px;margin-top:12px;line-height:1.5;}
.search{width:100%;padding:11px 12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:15px;margin-bottom:10px;}
.maptools{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.maptools .btn{flex:1;min-width:130px;text-align:center;}
.linkgrid{display:flex;flex-direction:column;gap:8px;}
.linkrow{display:flex;align-items:center;gap:12px;padding:12px;border-radius:11px;background:var(--panel);border:1px solid var(--line);text-decoration:none;color:var(--txt);}
.linkrow .ic{font-size:20px;flex:0 0 24px;text-align:center;}
.linkrow .lx{flex:1;min-width:0;}
.linkrow .lx .a{display:block;font-size:15px;font-weight:600;}
.linkrow .lx .b{display:block;font-size:12px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.linkrow.lead{align-items:flex-start;}
.linkrow.lead .lx .b{white-space:normal;overflow:visible;line-height:1.4;margin-top:3px;}
.linkrow .go{color:var(--dim);font-size:18px;}
/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.modal.open{display:flex;}
.sheet{background:var(--bg);width:100%;max-width:820px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;border-top:1px solid var(--line);animation:up .22s ease;}
@keyframes up{from{transform:translateY(30px);opacity:.4;}to{transform:translateY(0);opacity:1;}}
.sheet .shead{position:sticky;top:0;background:var(--bg);padding:16px 16px 12px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;}
.sheet .shead .x{margin-left:auto;font-size:22px;color:var(--dim);background:none;border:none;cursor:pointer;padding:0 4px;}
.sheet .sbody{padding:14px 16px 30px;}
.bottombar{position:fixed;left:0;right:0;bottom:0;z-index:35;background:#0f141b;border-top:1px solid var(--line);}
.bottombar .inner{max-width:820px;margin:0 auto;display:flex;gap:6px;padding:8px 10px;}
.bottombar .bb{flex:1;text-align:center;padding:9px 3px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.bottombar .bb:active{transform:scale(.98);}
.bottombar .bb.active{background:var(--panel2);border-color:var(--pink);color:var(--txt);}
.chatlist{height:58vh;min-height:260px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:6px 2px;-webkit-overflow-scrolling:touch;}
.msg{max-width:82%;align-self:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px 11px;}
.msg.mine{align-self:flex-end;background:#20303f;border-color:#2f4658;}
.msg .mname{font-size:11px;color:var(--dim);margin-bottom:2px;font-weight:600;}
.msg .mtext{font-size:14.5px;line-height:1.35;word-wrap:break-word;}
.composer{position:fixed;left:0;right:0;bottom:62px;z-index:36;display:flex;gap:8px;padding:8px 14px;background:var(--bg);border-top:1px solid var(--line);max-width:820px;margin:0 auto;box-sizing:border-box;}
.composer input{flex:1;padding:12px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:15px;}
.composer button{flex:0 0 auto;padding:0 16px;border-radius:10px;background:var(--pink);color:#101418;border:none;font-weight:700;font-size:14px;cursor:pointer;}
.chatname{display:flex;gap:8px;margin-bottom:10px;}
.notifbar{display:flex;align-items:center;gap:10px;justify-content:space-between;background:var(--panel);border:1px solid var(--line);border-left:3px solid #f4d000;border-radius:11px;padding:9px 12px;margin-bottom:10px;font-size:12.5px;color:var(--txt);}
.notifbar button{flex:0 0 auto;background:#f4d000;color:#101418;border:none;font-weight:800;font-size:12px;padding:6px 13px;border-radius:16px;cursor:pointer;}
.chanbar{display:flex;gap:7px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:2px 0 8px;margin-bottom:2px;}
.chanbar .chan{flex:0 0 auto;position:relative;border:2px solid var(--line);background:transparent;font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:16px;cursor:pointer;white-space:nowrap;opacity:.55;transition:opacity .12s;}
.chanbar .chan.on{opacity:1;box-shadow:0 0 0 2px rgba(255,255,255,.20);}
.chanbar .chan .cbadge{display:inline-block;min-width:15px;height:15px;line-height:15px;text-align:center;font-size:9px;font-weight:800;color:#101418;background:var(--now);border-radius:8px;padding:0 4px;margin-left:5px;vertical-align:middle;}
.lockbtn{font-size:11px;font-weight:600;color:var(--dim);background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:3px 9px;margin-left:8px;cursor:pointer;vertical-align:middle;}
.teamchip{display:inline-block;font-size:11px;font-weight:700;border:1px solid;border-radius:11px;padding:1px 7px;margin-left:6px;vertical-align:middle;background:rgba(255,255,255,.04);white-space:nowrap;}
.pic{vertical-align:middle;margin-left:5px;}
.badges{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:4px;}
.badges .teamchip,.badges .pastortag,.badges .pic{margin-left:0;}
.shifttag{display:inline-block;font-size:10px;font-weight:800;background:#f4d000;color:#101418;padding:1px 8px;border-radius:20px;margin-left:7px;vertical-align:middle;letter-spacing:.3px;}
.shifttag.both{background:transparent;color:#f4d000;border:1px solid #f4d000;}
.guidelink{display:inline-block;margin-top:8px;font-size:12px;font-weight:700;color:#f4d000;background:rgba(244,208,0,.12);border:1px solid rgba(244,208,0,.45);border-radius:14px;padding:4px 11px;cursor:pointer;}
.guidelink.empty{color:var(--dim);background:transparent;border:1px dashed var(--line);font-weight:600;}
.qlist{margin:8px 4px 4px;padding-left:22px;}
.qlist li{margin:9px 0;font-size:14.5px;line-height:1.45;}
.poolline{font-size:12px;color:var(--txt);margin-top:6px;padding-top:6px;border-top:1px dashed var(--line);line-height:1.6;}
.poolline .pgi{font-weight:700;padding:1px 7px;border-radius:20px;font-size:11px;}
.poolline .pgi.girls{background:rgba(255,93,143,.16);color:#ff8fb0;border:1px solid rgba(255,93,143,.5);}
.poolline .pgi.boys{background:rgba(88,166,255,.16);color:#8cc3ff;border:1px solid rgba(88,166,255,.5);}
.chatname input{flex:1;padding:11px;border-radius:10px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:15px;}
.chatname button{flex:0 0 auto;padding:0 14px;border-radius:10px;background:var(--pink);color:#101418;border:none;font-weight:700;cursor:pointer;}
.teamcard{background:var(--panel);border:1px solid var(--line);border-left-width:5px;border-radius:11px;padding:11px 13px;margin-bottom:8px;}
.teamcard .th{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.teamcard .tdot{width:14px;height:14px;border-radius:50%;border:1px solid #0006;flex:0 0 auto;}
.teamcard .tn{font-size:16px;font-weight:700;}
.teamcard .ta{font-size:13px;color:var(--dim);}
.teamcard .tlds{font-size:13px;margin-top:5px;color:var(--txt);}
.teamcard .tlds b{color:var(--dim);font-weight:600;}
.installbar{position:fixed;left:0;right:0;bottom:52px;z-index:40;background:#161b22;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 14px;display:none;align-items:center;gap:10px;box-shadow:0 -6px 20px rgba(0,0,0,.4);}
.installbar.show{display:flex;}
.installbar img{height:30px;}
.installbar .t{flex:1;font-size:12.5px;line-height:1.35;color:var(--txt);}
.installbar .t b{color:var(--pink);}
.installbar button{flex:0 0 auto;}
.installbar .close{background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:0 2px;}
.foot{text-align:center;color:var(--dim);font-size:11px;padding:22px 0 6px;line-height:1.6;}
.foot a{cursor:pointer;}
#mapdiv{height:66vh;min-height:340px;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:#0b0e13;position:relative;z-index:0;isolation:isolate;}
.leaflet-container{background:#0b0e13;font-family:inherit;}
.pinlbl{background:rgba(13,17,23,.82);color:#fff;border:1px solid #2a323d;font-size:11px;font-weight:600;padding:1px 6px;border-radius:6px;box-shadow:none;}
.pinlbl.leaflet-tooltip-top:before{border-top-color:rgba(13,17,23,.82);}
.leaflet-popup-content{font-size:13px;}
.leaflet-popup-content a{color:#1a66ff;font-weight:600;}
.mebar{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:6px;}
.mebar.col{flex-direction:column;align-items:stretch;gap:8px;}
.mebar .who{flex:1;font-size:14px;font-weight:600;}
.mebar .melabel{font-size:13px;color:var(--dim);}
.mebar input.search{margin-bottom:0;}
.pastortag{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;padding:1px 6px;border-radius:20px;margin-left:7px;vertical-align:middle;font-weight:800;color:#101418;}
.adminrow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.adminrow .nm{flex:1;font-size:14px;}
label.fld{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px;}
input.txt,select.txt,textarea.txt{width:100%;padding:10px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--txt);font-size:14px;}
textarea.txt{min-height:110px;font-family:monospace;font-size:12px;}
</style>
</head>
<body>
<header class="top">

function T(hhmm){const[a,b]=hhmm.split(":").map(Number);return a*60+b;}
function fmt(min){let h=Math.floor(min/60),m=min%60;const ap=h<12?"a":"p";let hh=h%12;if(hh===0)hh=12;return hh+(m?":"+String(m).padStart(2,"0"):"")+ap;}
function fmtRange(s,e){return fmt(T(s))+"–"+fmt(T(e));}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ---- collect everyone ---- */
function allPeople(){
  const set=new Set(); const add=x=>{if(x&&x.trim())set.add(x.trim());};
  Object.values(HOSPITALITY).forEach(d=>Object.values(d).forEach(a=>a.forEach(add))); add(HOSP_EXTRA);
  Object.values(ADMIN_TABLE).forEach(rows=>rows.forEach(r=>r[3].forEach(add)));
  Object.values(FREE_TIME).forEach(z=>Object.values(z).forEach(p=>p.forEach(add)));
  Object.values(CABIN_SWEEPS).forEach(a=>a.forEach(add));
  Object.values(SNACK_AFTERNOON).forEach(a=>a.forEach(add));
  Object.values(SNACK_EVENING).forEach(o=>{o.inside.forEach(add);o.outside.forEach(add);});
  Object.values(POOL).forEach(p=>{add(p.girls[2]);add(p.boys[2]);});
  Object.values(KNOWN_CHURCH).forEach(a=>a.forEach(add));
  CHAT_ADMINS.forEach(add);   // pastors + camp admin are always pickable (so they can join their leadership chat)
  Object.keys(store.churchOf).forEach(add); Object.keys(store.customDuties).forEach(add);
  return [...set].sort((a,b)=>a.localeCompare(b));
}
/* ---- duties for a person on a day ---- */
function dutiesFor(name,day){
  const out=[];
  const hd=HOSPITALITY[day];
  if(hd) for(const shift of ["PREP","REFILL","RESET"]){ if((hd[shift]||[]).includes(name)){
    const job="Hospitality — "+shift.charAt(0)+shift.slice(1).toLowerCase();  // Prep / Refill / Reset
    out.push({s:"08:00",e:"08:45",what:job,where:"Hospitality Room · Tabernacle",tag:"Hospitality"});
    if(day!=="Saturday") out.push({s:"17:45",e:"18:30",what:job,where:"Hospitality Room · Tabernacle",tag:"Hospitality"});
  }}
  (ADMIN_TABLE[day]||[]).forEach(r=>{if(r[3].includes(name))out.push({s:r[0],e:r[1],what:r[2],where:"Admin / Welcome Table",tag:"Admin"});});
  const z=FREE_TIME[day]; if(z)Object.entries(z).forEach(([zone,p])=>{if(p.includes(name))out.push({s:"15:15",e:"16:45",what:"Free Time — "+zone,where:zone,tag:"Free Time"});});
  if((CABIN_SWEEPS[day]||[]).includes(name)) out.push({s:"15:15",e:"16:45",what:"Cabin Sweeps",where:"Cabins",tag:"Cabin Sweep"});
  if((SNACK_AFTERNOON[day]||[]).includes(name)) out.push({s:"15:00",e:"16:30",what:"Afternoon Snack Shack",where:"Snack Shack",tag:"Snack Shack"});
  const ev=SNACK_EVENING[day];
  if(ev){if(ev.inside.includes(name))out.push({s:"21:00",e:"22:00",what:"Evening Snack Shack",where:"Snack Shack",tag:"Snack Shack"});
         if(ev.outside.includes(name))out.push({s:"21:00",e:"22:00",what:"Evening Snack Shack (Outside)",where:"Snack Shack · outside",tag:"Snack Shack"});}
  const p=POOL[day];
  if(p){if(p.girls[2]===name)out.push({s:p.girls[0],e:p.girls[1],what:"Pool — Girls ("+p.grade+")",where:"Pool",tag:"Pool"});
        if(p.boys[2]===name)out.push({s:p.boys[0],e:p.boys[1],what:"Pool — Boys ("+p.grade+")",where:"Pool",tag:"Pool"});}
  (store.customDuties[name]||[]).forEach(d=>{if(d.day===day)out.push({s:d.s,e:d.e,what:d.what,where:d.where||"",tag:d.tag||"Custom"});});
  return out.sort((a,b)=>T(a.s)-T(b.s));
}
function rolesOf(name){const t=new Set();CAMP.days.forEach(d=>dutiesFor(name,d).forEach(x=>t.add(x.tag)));return [...t];}
function hasArea(name,tag){return CAMP.days.some(d=>dutiesFor(name,d).some(x=>x.tag===tag));}
function churchOf(name){return store.churchOf[name]||"";}
function membersOf(church){return allPeople().filter(n=>churchOf(n)===church);}

function mapsGoogle(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}
function mapsApple(q){return "https://maps.apple.com/?q="+encodeURIComponent(q);}
function dirGoogle(lat,lng){return "https://www.google.com/maps/dir/?api=1&destination="+lat+","+lng;}
function dirApple(lat,lng){return "https://maps.apple.com/?daddr="+lat+","+lng;}
function coordFor(loc){
  if(COORDS[loc])return COORDS[loc];
  const c=store.coords[loc]; if(c){const p=String(c).split(",").map(x=>parseFloat(x.trim())); if(p.length===2&&!p.some(isNaN))return p;}
  return null;
}
function allCoords(){const o={}; Object.assign(o,COORDS);
  Object.entries(store.coords).forEach(([k,v])=>{const p=coordFor(k); if(p)o[k]=p;}); return o;}
function icsStamp(dayISO,hhmm){return dayISO.replace(/-/g,"")+"T"+hhmm.replace(":","")+"00";}
function icsEsc(s){return String(s).replace(/([,;\\])/g,"\\$1").replace(/\n/g,"\\n");}
function buildICS(calName,events){
  let out="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Pursuit Camp 2026//EN\r\nCALSCALE:GREGORIAN\r\nX-WR-CALNAME:"+icsEsc(calName)+"\r\n";
  events.forEach((ev,i)=>{
    const dayISO=CAMP.dates[ev.day]; if(!dayISO)return;
    out+="BEGIN:VEVENT\r\nUID:pursuit-"+ev.day+"-"+i+"-"+ev.s.replace(":","")+"@pursuitcamp\r\n";
    out+="DTSTART:"+icsStamp(dayISO,ev.s)+"\r\nDTEND:"+icsStamp(dayISO,ev.e)+"\r\n";
    out+="SUMMARY:"+icsEsc(ev.title)+"\r\n";
    if(ev.loc)out+="LOCATION:"+icsEsc(ev.loc)+"\r\n";
    out+="END:VEVENT\r\n";
  });
  return out+"END:VCALENDAR\r\n";
}
function download(name,text,mime){
  const blob=new Blob([text],{type:mime});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}
function addCampCalendar(){
  const events=[];
  CAMP.days.forEach(d=>BASE[d].forEach(b=>{if(T(b.e)>T(b.s))events.push({day:d,s:b.s,e:b.e,title:b.t,loc:b.l});}));
  download("Pursuit_Camp_2026_schedule.ics",buildICS("Pursuit Camp 2026",events),"text/calendar");
}
function addPersonCalendar(name){
  const events=[];
  CAMP.days.forEach(d=>dutiesFor(name,d).forEach(x=>{if(T(x.e)>T(x.s))events.push({day:d,s:x.s,e:x.e,title:x.what,loc:x.where});}));
  if(!events.length){alert(name+" has no special shifts to add — the camp schedule calendar covers them.");return;}
  download("Pursuit_"+name.replace(/[^\w]+/g,"_")+"_shifts.ics",buildICS(name+" — Pursuit shifts",events),"text/calendar");
}

function locLink(l){ if(!l) return ""; return esc(l); }
// Meal blocks show shift times: a selected person sees only their shift; otherwise both.
function mealLine(block,who){
  if(!block.meal) return null;
  const mt=MEAL_TIMES[block.meal], sh=who?shiftOf(who):0;
  if(sh===1||sh===2) return "Your "+block.meal+": "+fmtRange(mt[sh][0],mt[sh][1]);
  return "Shift 1 "+fmtRange(mt[1][0],mt[1][1])+" · Shift 2 "+fmtRange(mt[2][0],mt[2][1]);
}
function blockLoc(b,who){ const m=mealLine(b,who); if(m)return m; return b.l?locLink(b.l):""; }

function updateDtBox(){
  const box=document.getElementById("dtBox"); if(!box)return;
  const d=new Date(), wd=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
  let h=d.getHours(),m=d.getMinutes(); const ap=h<12?"a":"p"; h=h%12||12;
  box.innerHTML='<span class="dtday">'+wd+" "+(d.getMonth()+1)+"/"+d.getDate()+'</span><span class="dttime">'+h+":"+String(m).padStart(2,"0")+ap+'</span>';
}
function sizeChat(){
  const list=document.getElementById("chatlist"); if(!list)return;
  const comp=document.querySelector(".composer");
  const bar=document.querySelector(".bottombar");
  const barH=bar?bar.offsetHeight:62;
  let compH=0;
  if(comp){ comp.style.bottom=barH+"px"; compH=comp.offsetHeight; }   // pin composer right above the bottom menu
  const top=list.getBoundingClientRect().top;
  const vh=window.innerHeight;
  list.style.height=Math.max(140, vh-top-barH-compH-8)+"px";          // list fills the gap down to the composer
  list.scrollTop=list.scrollHeight;
}

/* ---- Small-group / cabin-time discussion guides (static, offline).
   Fill GUIDES[day].smallGroup / .cabin = {theme, scripture, questions:[...]} when content arrives.
   Empty for now → links show grayed and open a "coming soon" sheet (proof of concept). ---- */
const GUIDES = { Monday:{}, Tuesday:{}, Wednesday:{}, Thursday:{}, Friday:{}, Saturday:{} };
function hasGuide(day,slot){ const g=(GUIDES[day]||{})[slot]; return !!(g && g.questions && g.questions.length); }
function guideLinkHTML(day,slot,label){
  const active=hasGuide(day,slot);
  return '<div class="guidelink'+(active?'':' empty')+'" data-gday="'+esc(day)+'" data-gslot="'+esc(slot)+'" data-glabel="'+esc(label)+'">💬 '+esc(label)+(active?'':' · coming soon')+'</div>';
}
function openGuide(day,slot,label){
  const g=(GUIDES[day]||{})[slot]; let b='';
  if(g && g.questions && g.questions.length){
    if(g.theme) b+='<div class="sectionlabel">'+esc(g.theme)+'</div>';
    if(g.scripture) b+='<div class="banner">📖 '+esc(g.scripture)+'</div>';
    b+='<ol class="qlist">'+g.questions.map(q=>'<li>'+esc(q)+'</li>').join('')+'</ol>';
  } else {
    b+='<div class="empty">No discussion questions have been added for this time yet.<br><br>Once the team provides them, they’ll appear right here — no signal needed.</div>';
  }
  openSheet(day+' · '+label, b);
}
function renderMeSchedule(name){
  const day=state.day, duties=dutiesFor(name,day);
  const merged=[...BASE[day].map(b=>({s:b.s,e:b.e,t:b.t,l:b.l,meal:b.meal,duty:false})),
                ...duties.map(d=>({s:d.s,e:d.e,t:d.what,l:d.where,duty:true,tag:d.tag}))].sort((a,b)=>T(a.s)-T(b.s)||(a.duty?-1:1));
  const nowDuty=duties.find(d=>state.time>=T(d.s)&&state.time<T(d.e));
  const curBase=currentBlock(BASE[day]);
  let h='<div class="sectionlabel">Happening now · '+day+'</div>';
  if(nowDuty) h+=nowCard(merged,nowDuty.what,esc(nowDuty.where),nowDuty.s,nowDuty.e,true);
  else if(curBase) h+=nowCard(merged,curBase.t,blockLoc(curBase,name),curBase.s,curBase.e,false);
  else{const nxt=merged.find(x=>T(x.s)>state.time);
    h+='<div class="nowcard"><div class="lbl">'+(nxt?'Nothing right now':'Day complete')+'</div>'+(nxt?'<div class="title">'+esc(nxt.t)+'</div><div class="meta">Starts '+fmt(T(nxt.s))+(nxt.l?' · '+esc(nxt.l):'')+'</div>':'<div class="meta">See you tomorrow!</div>')+'</div>';}
  h+='<div class="sectionlabel">Your day'+(duties.length?' — '+duties.length+' assignment'+(duties.length>1?'s':''):' — follows the camp schedule')+'</div><div class="timeline">';
  merged.forEach(b=>{
    let s=b.s,e=b.e,shiftTag='';
    if(b.meal){                                             // meals: show THIS person's shift time + a yellow Shift badge
      const sh=shiftOf(name), mt=(sh&&MEAL_TIMES[b.meal])?MEAL_TIMES[b.meal][sh]:null;
      if(mt){ s=mt[0]; e=mt[1]; shiftTag=' <span class="shifttag">Shift '+sh+'</span>'; }
      else shiftTag=' <span class="shifttag both">Both shifts</span>';
    }
    const isc=state.time>=T(s)&&state.time<T(e), past=state.time>=T(e), L=blockLoc(b,name);
    h+='<div class="tl'+(b.duty?' duty':'')+(isc?' cur':'')+(past&&!isc?' past':'')+'"><div class="t">'+fmtRange(s,e)+'</div>'+

function locateMe(){
  if(!leafletMap)return;

    const ll=[p.coords.latitude,p.coords.longitude], acc=p.coords.accuracy||20;
    if(userMarker)userMarker.setLatLng(ll); else userMarker=L.circleMarker(ll,{radius:9,color:"#fff",weight:3,fillColor:"#58a6ff",fillOpacity:1}).addTo(leafletMap).bindTooltip("You",{permanent:true,direction:"bottom",className:"pinlbl",offset:[0,6]});

    if(first){leafletMap.setView(ll,18);first=false;note.textContent="You’re the blue dot — it updates as you move.";}
  },err=>{note.textContent="Couldn’t get location: "+err.message+" (check location permissions).";},{enableHighAccuracy:true,maximumAge:5000,timeout:15000});
}

/* ---- Chat notifications (free, app-open): buzz + system banner + soft ping ---- */
let _actx=null;
function chatPing(){
  try{
    _actx=_actx||new (window.AudioContext||window.webkitAudioContext)();
    if(_actx.state==="suspended") _actx.resume();
    const o=_actx.createOscillator(), g=_actx.createGain(), t=_actx.currentTime;
    o.type="sine"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1174,t+0.11);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.22,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    o.connect(g); g.connect(_actx.destination); o.start(t); o.stop(t+0.34);
  }catch(e){}
}
function notifyMsg(m, chanLabel){
  try{ if(navigator.vibrate) navigator.vibrate([90,50,90]); }catch(e){}
  chatPing();
  try{
    if("Notification" in window && Notification.permission==="granted"){
      const title=(m.name||"New message")+(chanLabel?" · "+chanLabel:"");
      const opts={body:(m.text||"").slice(0,140),tag:"pursuit-chat",renotify:true,icon:"./pursuit-icon-192.png",badge:"./pursuit-icon-192.png"};
      if(navigator.serviceWorker&&navigator.serviceWorker.ready)
        navigator.serviceWorker.ready.then(r=>r.showNotification(title,opts)).catch(()=>{try{new Notification(title,opts);}catch(e){}});
      else { try{new Notification(title,opts);}catch(e){} }
    }
  }catch(e){}
}
function askNotify(){
  if(!("Notification" in window)) return;
  try{ _actx=_actx||new (window.AudioContext||window.webkitAudioContext)(); if(_actx.state==="suspended")_actx.resume(); }catch(e){}  // unlock sound on this tap
  Notification.requestPermission().then(()=>{ if(state.tab==="chat") renderChat(); });
}
/* Attach a listener to every channel this person can see. Safe to call again when identity changes. */
function subscribeChannels(){
  if(!chatDb) return;
  myChannels().forEach(c=>{
    if(c.id==="admin" && !store.adminOK) return;   // don't load Admin messages until the passcode is verified
    if(chatSubbed[c.id]) return;
    chatSubbed[c.id]=true; chatData[c.id]=chatData[c.id]||[]; chatUnread[c.id]=chatUnread[c.id]||0;
    const ref=chatDb.ref("chat/"+c.id).limitToLast(300);
    ref.on("child_added",s=>{
      const m=s.val()||{}; (chatData[c.id]=chatData[c.id]||[]).push(m);
      const viewingThis = state.tab==="chat" && state.chatChan===c.id && !document.hidden;
      if(viewingThis) appendChatMsg(m);
      else if(chatLoaded[c.id] && m.name!==store.me){
        chatUnread[c.id]=(chatUnread[c.id]||0)+1; updateChatBadge();
        notifyMsg(m, c.label);   // buzz + banner + ping (only for messages you didn't send)
      }
    });
    ref.once("value",()=>{ chatLoaded[c.id]=true; });
  });
}
function totalUnread(){ return myChannels().reduce((s,c)=>s+(chatUnread[c.id]||0),0); }
function updateChatBadge(){
  const t=document.querySelector('.tab[data-tab="chat"]'); if(!t)return;
  const n=totalUnread();
  t.innerHTML="Chat"+(n>0?' <span class="tabbadge">'+n+'</span>':"");
}
function mentionsMe(text){
  if(!store.me||!text) return false;
  const f=store.me.split(" ")[0].toLowerCase();
  return text.toLowerCase().indexOf("@"+f)!==-1;
}
function fmtClock(ts){ if(!ts)return""; const d=new Date(ts); let h=d.getHours(),m=d.getMinutes(); const ap=h<12?"a":"p"; h=h%12||12; return h+":"+String(m).padStart(2,"0")+ap; }
function chatMsgHTML(m){
  const mine=m.name&&m.name===store.me, t=fmtClock(m.ts);
  const text=esc(m.text||"").replace(/@([A-Za-z][\w'’.\-]*)/g,'<span class="mention">@$1</span>');
  const cls="msg"+(mine?" mine":"")+((!mine&&mentionsMe(m.text))?" mentionsme":"");
  return '<div class="'+cls+'"><div class="mname">'+esc(m.name||"?")+(t?" · "+t:"")+'</div><div class="mtext">'+text+'</div></div>';
}
function appendChatMsg(m){
  const list=document.getElementById("chatlist"); if(!list)return;
  list.insertAdjacentHTML("beforeend",chatMsgHTML(m));
  list.scrollTop=list.scrollHeight;
}
function sendChat(){
  const inp=document.getElementById("chatInput"); if(!inp)return;
  const txt=inp.value.trim(); if(!txt||!chatDb)return;
  if(!store.me){alert("Pick your name first so people know who’s talking.");return;}
  const chan=myChannels().some(c=>c.id===state.chatChan)?state.chatChan:"all";
  chatDb.ref("chat/"+chan).push({name:store.me,text:txt.slice(0,1000),ts:firebase.database.ServerValue.TIMESTAMP});
  inp.value="";
}
function joinChatName(){
  const v=(document.getElementById("chatNameInput").value||"").trim();
  if(allPeople().includes(v)){store.me=v;saveStore();subscribeChannels();render();}
  else alert("Please pick your name from the list.");
}
/* Verify the Admin passcode against Firebase (the code lives only in the database, never in this app).
   A successful write to /gatecheck means Firebase accepted the code; a permission error means it was wrong. */
function unlockAdmin(code,onOK,onFail){
  if(!chatDb){ onFail("You need internet to unlock Admin the first time."); return; }
  chatDb.ref("gatecheck").push({c:code,ts:firebase.database.ServerValue.TIMESTAMP})
    .then(()=>{
      store.adminOK=true; saveStore();
      chatDb.ref("adminlog").push({name:store.me||"?",ts:firebase.database.ServerValue.TIMESTAMP,gate:code}).catch(()=>{});
      subscribeChannels(); onOK();
    })
    .catch(()=>onFail("That passcode didn’t work."));
}
function lockAdmin(){ store.adminOK=false; saveStore(); renderChat(); }
function renderChat(){
  if(!window.firebase || !chatDb){
    let h='<div class="sectionlabel">Camp Chat</div>';
    h+='<div class="empty">💬 Chat needs an internet connection.<br>'+(window.firebase?'Connecting…':'Reconnect to load chat.')+'<br><br>Or use the GroupMe:</div>';
    h+='<div class="linkgrid"><a class="linkrow" href="'+LINKS.infoHub+'" target="_blank" rel="noopener"><span class="lx"><span class="a">Open the leaders’ GroupMe</span><span class="b">via the Info Hub</span></span><span class="go">›</span></a></div>';
    main.innerHTML=h; return;
  }
  subscribeChannels();
  const chans=myChannels();
  if(!chans.some(c=>c.id===state.chatChan)) state.chatChan="all";
  const cur=chans.find(c=>c.id===state.chatChan)||chans[0];
  chatUnread[cur.id]=0; updateChatBadge();
  let h='';
  if(chans.length>1){
    h+='<div class="chanbar">'+chans.map(c=>{
      const sel=c.id===cur.id;
      const style=c.fill? 'background:'+c.color+';border-color:'+c.color+';color:'+textOn(c.color)+';'
                        : 'background:transparent;border-color:'+c.color+';color:'+c.color+';';
      return '<button class="chan'+(sel?' on':'')+'" data-chan="'+c.id+'" style="'+style+'">'+esc(c.label)+
        ((!sel&&chatUnread[c.id])?'<span class="cbadge">'+chatUnread[c.id]+'</span>':'')+'</button>';
    }).join('')+'</div>';
  }
  // Admin room is locked behind the shared passcode until verified on this device.
  if(cur.id==="admin" && !store.adminOK){
    h+='<div class="sectionlabel">'+esc(cur.label)+'</div>';
    h+='<div class="banner">🔒 This room is for pastors + camp admin. Enter the Admin passcode to unlock it on this device.</div>';
    h+='<div class="chatname"><input id="adminCode" type="password" placeholder="Admin passcode…" autocomplete="off"><button id="adminUnlock">Unlock</button></div>';
    h+='<div id="adminErr" style="color:#ff6b6b;font-size:12.5px;margin:8px 2px 0;"></div>';
    main.innerHTML=h;
    main.querySelectorAll(".chan").forEach(b=>b.onclick=()=>{state.chatChan=b.dataset.chan;renderChat();});
    const ub=document.getElementById("adminUnlock");
    const go=()=>{ const code=(document.getElementById("adminCode").value||"").trim(); if(!code)return;
      ub.disabled=true; ub.textContent="Checking…";
      unlockAdmin(code, ()=>renderChat(), (msg)=>{ ub.disabled=false; ub.textContent="Unlock"; const e=document.getElementById("adminErr"); if(e)e.textContent=msg; }); };
    if(ub){ ub.onclick=go; document.getElementById("adminCode").addEventListener("keydown",e=>{if(e.key==="Enter")go();}); }
    return;
  }
  h+='<div class="sectionlabel">'+esc(cur.label)+(cur.id==="admin"?' <button class="lockbtn" id="adminLock">🔒 Lock</button>':'')+'</div>';
  h+='<div style="font-size:11px;color:var(--dim);margin:-4px 2px 8px;">Tip: type <b>@FirstName</b> to tag someone.</div>';
  if(store.me && ("Notification" in window) && Notification.permission==="default")
    h+='<div class="notifbar"><span>🔔 Get a buzz &amp; alert when new messages come in?</span><button id="notifBtn">Turn on</button></div>';
  if(!store.me){
    h+='<div class="banner">Pick your name to join the chat:</div>';
    h+='<div class="chatname"><input id="chatNameInput" list="chatPeople" placeholder="Type your name…" autocomplete="off"><button onclick="joinChatName()">Join</button></div>';
    h+='<datalist id="chatPeople">'+allPeople().map(n=>'<option value="'+esc(n)+'">').join('')+'</datalist>';
  }
  h+='<div id="chatlist" class="chatlist"></div>';
  if(store.me) h+='<div class="composer"><input id="chatInput" placeholder="Message '+esc(cur.label)+' as '+esc(store.me.split(" ")[0])+'…" maxlength="1000"><button id="chatSend">Send</button></div>';
  main.innerHTML=h;
  main.querySelectorAll(".chan").forEach(b=>b.onclick=()=>{state.chatChan=b.dataset.chan;renderChat();});
  const list=document.getElementById("chatlist");
  list.innerHTML=(chatData[cur.id]||[]).map(chatMsgHTML).join("")||'<div class="empty">No messages yet — say hi!</div>';
  list.scrollTop=list.scrollHeight;
  const send=document.getElementById("chatSend");
  if(send){send.onclick=sendChat;
    document.getElementById("chatInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});}
  const lk=document.getElementById("adminLock"); if(lk) lk.onclick=lockAdmin;
  const nb=document.getElementById("notifBtn"); if(nb) nb.onclick=askNotify;
  sizeChat();
}

/* ---- person sheet ---- */
function openPerson(name){
  const sheet=document.getElementById("sheet"), col=CHURCH_COLOR[churchOf(name)]||"#8b949e";
  const tm=teamOf(name);
  const subline=(churchOf(name)?chSpan(churchOf(name)):'No church set')+(tm?' · Team'+teamChipHTML(name)+' <span style="color:var(--dim)">('+esc(tm.animal)+')</span>':'');
  let h='<div class="shead"><div class="avatar" style="background:'+col+'">'+initials(name)+'</div>'+
        '<div><div style="font-size:17px;font-weight:700;">'+esc(name)+(PERSON_ICON[name]||"")+'</div>'+
        '<div style="font-size:12px;color:var(--dim);">'+subline+'</div></div>'+
        '<button class="x" onclick="closeModal()">×</button></div><div class="sbody">';
  h+='<div class="days" style="margin-bottom:12px;">';
  CAMP.days.forEach(d=>h+='<div class="day'+(d===state.day?' active':'')+'" data-d="'+d+'">'+d.slice(0,3)+'</div>');
  h+='</div>'+personDay(name,state.day)+
     '<div class="maptools"><button class="btn pink" onclick="addPersonCalendar(\''+esc(name).replace(/'/g,"\\'")+'\')">Add '+esc(name.split(" ")[0])+'’s shifts to Calendar</button>'+
     '<a class="btn" href="'+mapsGoogle(CAMP.address)+'" target="_blank" rel="noopener">Open camp map</a></div></div>';
  sheet.innerHTML=h;
  sheet.querySelectorAll(".day").forEach(el=>el.onclick=()=>{
    state.day=el.dataset.d;
    sheet.querySelectorAll(".day").forEach(x=>x.classList.toggle("active",x.dataset.d===state.day));
    document.getElementById("personDayWrap").outerHTML=personDay(name,state.day);
    renderClock();renderDayBar();
  });
  document.getElementById("modal").classList.add("open");
}
function personDay(name,day){
  const duties=dutiesFor(name,day);
  const base=BASE[day].map(b=>({s:b.s,e:b.e,t:b.t,l:b.l,meal:b.meal,duty:false}));
  const di=duties.map(d=>({s:d.s,e:d.e,t:d.what,l:d.where,duty:true,tag:d.tag}));
  const items=[...base,...di].sort((a,b)=>T(a.s)-T(b.s)||(a.duty?-1:1));
  let h='<div id="personDayWrap"><div class="sectionlabel">'+day+' — '+(duties.length?duties.length+' assignment'+(duties.length>1?'s':''):'no special duties')+'</div><div class="timeline">';
  items.forEach(b=>{const isc=(day===state.day)&&state.time>=T(b.s)&&state.time<T(b.e), L=blockLoc(b,name);
    h+='<div class="tl'+(b.duty?' duty':'')+(isc?' cur':'')+'"><div class="t">'+fmtRange(b.s,b.e)+'</div>'+
       '<div class="b"><div class="nm">'+esc(b.t)+(b.duty?'<span class="tag">'+esc(b.tag)+'</span>':'')+'</div>'+
       (L?'<div class="lc">'+L+'</div>':'')+'</div></div>';});
  h+='</div>';
  if(!duties.length) h+='<div class="banner">'+esc(name)+' has no role duties on '+day+' — follows the normal camp schedule above.</div>';
  h+='</div>'; return h;
}
function closeModal(){document.getElementById("modal").classList.remove("open");render();}

/* ---- admin sheet ---- */
function openAdmin(){
  if(!ADMIN_TOOLS.includes(store.me) || !store.adminOK) return;   // gated: 3 admins + verified passcode
  const sheet=document.getElementById("sheet");
  let h='<div class="shead"><div style="font-size:17px;font-weight:700;">Leader / Admin tools</div><button class="x" onclick="closeModal()">×</button></div><div class="sbody">';
  h+='<div class="banner">Assign leaders to churches, and add GPS pins so more spots show on the Map. Changes save on this device. Use <b>Export</b> to send back to Asher so everyone gets them.</div>';
  h+='<div class="seg"><div class="s active" data-a="people">People → Church</div><div class="s" data-a="pins">Map pins</div><div class="s" data-a="data">Export</div></div>';
  h+='<div id="aPane"></div></div>';
  sheet.innerHTML=h;
  sheet.querySelectorAll(".seg .s").forEach(s=>s.onclick=()=>{sheet.querySelectorAll(".seg .s").forEach(x=>x.classList.remove("active"));s.classList.add("active");adminPane(s.dataset.a);});
  adminPane("people");
  document.getElementById("modal").classList.add("open");
}
function adminPane(which){
  const pane=document.getElementById("aPane");
  if(which==="people"){
    pane.innerHTML='<input class="search" id="aSearch" placeholder="Search a name…"><div id="aList"></div>';
    document.getElementById("aSearch").oninput=renderAdminList; renderAdminList();
  }else if(which==="pins"){
    let h='<div class="banner">In Google Maps, long-press (phone) or right-click (computer) a spot → tap the "lat, lng" numbers to copy → paste below. Already-loaded spots are shown greyed as examples.</div>';
    h+='<div style="font-size:12px;color:var(--dim);margin:0 2px 8px;">Loaded: '+Object.keys(COORDS).map(esc).join(", ")+'</div>';
    h+='<div id="pinList"></div><label class="fld">Add a pin</label>'+
       '<input class="txt" id="pinName" placeholder="Location name (e.g. Pool)"><input class="txt" id="pinCoord" placeholder="36.0079, -87.5163" style="margin-top:6px;">'+
       '<button class="btn pink" style="margin-top:8px;" onclick="addPin()">Add pin</button>';
    pane.innerHTML=h; renderPinList();
  }else{
    pane.innerHTML='<label class="fld">Export (copy &amp; send to Asher)</label><textarea class="txt" id="aExport" readonly></textarea>'+
      '<div style="display:flex;gap:8px;margin-top:8px;"><button class="btn pink" onclick="copyExport()">Copy</button><button class="btn" onclick="importPrompt()">Import…</button></div>';
    document.getElementById("aExport").value=JSON.stringify({churchOf:store.churchOf,customDuties:store.customDuties,coords:store.coords},null,2);
  }
}
function renderAdminList(){
  const q=(document.getElementById("aSearch").value||"").toLowerCase(), list=document.getElementById("aList");
  const people=allPeople().filter(n=>n.toLowerCase().includes(q)).slice(0,300); let h="";
  people.forEach(n=>{h+='<div class="adminrow"><div class="nm">'+esc(n)+'</div><select class="txt" style="flex:0 0 52%;" data-p="'+esc(n)+'"><option value="">— unassigned —</option>'+
    CHURCHES.map(c=>'<option value="'+esc(c)+'"'+(churchOf(n)===c?' selected':'')+'>'+esc(c)+'</option>').join('')+'</select></div>';});
  list.innerHTML=h||'<div class="empty">No match.</div>';
  list.querySelectorAll("select").forEach(s=>s.onchange=()=>{if(s.value)store.churchOf[s.dataset.p]=s.value;else delete store.churchOf[s.dataset.p];saveStore();});
}
function renderPinList(){
  const el=document.getElementById("pinList"); if(!el)return;
  const custom=Object.keys(store.coords).filter(k=>coordFor(k)); let h="";
  custom.forEach(k=>{h+='<div class="adminrow"><div class="nm">'+esc(k)+' <span style="color:var(--dim);font-size:12px;">'+esc(store.coords[k])+'</span></div><button class="btn" data-rm="'+esc(k)+'">Remove</button></div>';});
  el.innerHTML=h; el.querySelectorAll("button[data-rm]").forEach(b=>b.onclick=()=>{delete store.coords[b.dataset.rm];saveStore();renderPinList();});
}
function addPin(){
  const n=(document.getElementById("pinName").value||"").trim(), c=(document.getElementById("pinCoord").value||"").trim();
  if(!n||!/^-?\d+(\.\d+)?\s*,\s*-?\d+(\.\d+)?$/.test(c)){alert("Enter a name and coordinates like 36.0079, -87.5163");return;}
  store.coords[n]=c; saveStore();
  document.getElementById("pinName").value="";document.getElementById("pinCoord").value=""; renderPinList();
}
function copyExport(){const t=document.getElementById("aExport");t.select();document.execCommand("copy");const b=event.target;b.textContent="Copied ✓";setTimeout(()=>b.textContent="Copy",1200);}
function importPrompt(){const s=prompt("Paste exported JSON:");if(!s)return;
  try{const o=JSON.parse(s);if(o.churchOf)store.churchOf=o.churchOf;if(o.customDuties)store.customDuties=o.customDuties;if(o.coords)store.coords=o.coords;saveStore();openAdmin();}
  catch(e){alert("That didn't look like valid data.");}}

/* ============================================================
   wire up
   ============================================================ */
function render(){
  if(!["camp","find","teams","chat","map"].includes(state.tab)) state.tab="camp";
  renderClock();renderDayBar();updateDtBox();renderMeRow();
  document.getElementById("schedControls").style.display = state.tab==="camp" ? "" : "none";
  const al=document.getElementById("adminLink"); if(al) al.style.display = ADMIN_TOOLS.includes(store.me) ? "" : "none";
  if(state.tab!=="map")destroyMap();
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===state.tab));
  document.querySelectorAll(".bottombar .bb").forEach(b=>b.classList.toggle("active",b.dataset.bb==="map"&&state.tab==="map"));
  if(state.tab==="camp")renderCamp();
  else if(state.tab==="find")renderFind();
  else if(state.tab==="teams")renderTeams();
  else if(state.tab==="map")renderMap();
  else renderChat();
  document.getElementById("timeSlider").value=state.time;
  saveUI();
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{state.tab=t.dataset.tab;render();});
document.getElementById("timeSlider").oninput=e=>{state.time=+e.target.value;state.follow=false;render();};
document.getElementById("nowBtn").onclick=()=>{state.time=nowMinutes();state.follow=true;const tn=todayName();if(tn)state.day=tn;render();};
document.querySelectorAll(".bottombar .bb").forEach(b=>b.onclick=()=>{
  const k=b.dataset.bb;
  if(k==="map"){state.tab="map";render();}
  else if(k==="contacts")openContacts();
  else if(k==="links")openLinks();
  else if(k==="help")helpAction();
  else if(k==="refresh")location.reload();
});
document.getElementById("adminLink").onclick=()=>{
  if(!ADMIN_TOOLS.includes(store.me)){ alert("Leader tools are for camp admin only. Pick your name first if you're Grant, Macey, or Scott."); return; }
  if(store.adminOK){ openAdmin(); return; }                       // already unlocked on this device — no re-typing
  const code=(prompt("Enter the Admin passcode to open Leader tools:")||"").trim();
  if(!code) return;
  unlockAdmin(code, ()=>openAdmin(), (msg)=>alert(msg));           // same passcode as Admin chat; unlock sticks everywhere
};
document.getElementById("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});
/* ---- PWA: offline service worker + install hint ---- */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
window.addEventListener('load',()=>initChat());
/* ---- Manual refresh lives in the bottom bar (data-bb="refresh"); auto "update available" check below ---- */
let selfSnap=null, lastUpdCheck=0;
async function fetchSelf(){ const r=await fetch('./pursuit.html?ts='+Date.now(),{cache:'no-store'}); return await r.text(); }
async function checkForUpdate(){
  const now=Date.now(); if(now-lastUpdCheck<45000) return; lastUpdCheck=now;
  try{ const t=await fetchSelf();
    if(selfSnap===null) selfSnap=t;
    else if(t!==selfSnap) document.getElementById("updateBar").classList.add("show");
  }catch(e){}
}
window.addEventListener('load',()=>{ fetchSelf().then(t=>selfSnap=t).catch(()=>{}); });
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) checkForUpdate(); });
setInterval(()=>{ if(!document.hidden) checkForUpdate(); }, 300000);
function isStandalone(){return window.matchMedia('(display-mode: standalone)').matches || navigator.standalone===true;}
function installSteps(){
  const ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const sheet=document.getElementById("sheet");
  const iosHtml='<b>iPhone / iPad (use Safari):</b><br>1. Tap the <b>Share</b> button (□ with ↑)<br>2. Scroll down → <b>Add to Home Screen</b><br>3. Tap <b>Add</b>, then open it from the FULL icon';
  const andHtml='<b>Android (use Chrome):</b><br>1. Tap the <b>⋮</b> menu (top-right)<br>2. Tap <b>Add to Home screen</b> / <b>Install app</b><br>3. Tap <b>Install</b>, then open it from the FULL icon';
  sheet.innerHTML='<div class="shead"><div style="font-size:17px;font-weight:700;">📲 Install on your phone</div><button class="x" onclick="closeModal()">×</button></div>'+
    '<div class="sbody"><div class="banner">Installing saves the app to your phone so it <b>opens with no signal</b> at camp. Do this once on wifi/data first.</div>'+
    '<div style="background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px;font-size:14px;line-height:1.7;margin-bottom:10px;">'+(ios?iosHtml:andHtml)+'</div>'+
    '<div style="background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px;font-size:14px;line-height:1.7;color:var(--dim);">'+(ios?andHtml:iosHtml)+'</div>'+
    '<div class="banner">The schedule, people, cabins and map pins all work offline. Only new satellite map areas need signal.</div></div>';
  document.getElementById("modal").classList.add("open");
}
function maybeShowInstall(){
  const bar=document.getElementById("installBar");
  if(isStandalone()||localStorage.getItem("pursuitInstallDismissed")){bar.classList.remove("show");return;}
  bar.classList.add("show");
}
document.getElementById("installHow").onclick=installSteps;
document.getElementById("installClose").onclick=()=>{localStorage.setItem("pursuitInstallDismissed","1");document.getElementById("installBar").classList.remove("show");};
maybeShowInstall();

// Live tick: only advance during camp, only full-rerender the schedule tab
// (avoids rebuilding the map/people views — and the flicker — when you return).
setInterval(()=>{
  updateDtBox();
  if(document.hidden||!state.follow||!todayName())return;
  state.time=nowMinutes();
  if(state.tab==="camp")render(); else renderClock();
},30000);
setInterval(updateDtBox,20000);
window.addEventListener("resize",()=>{ if(state.tab==="chat") sizeChat(); });
if(window.visualViewport) window.visualViewport.addEventListener("resize",()=>{ if(state.tab==="chat") sizeChat(); });
render();
</script>
