<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>A Very Special Announcement</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      min-height:100dvh;
      /* Pink left → blue right gradient */
      background: linear-gradient(135deg, #ffe0ef 0%, #fef0f8 30%, #f0f4ff 60%, #ddeeff 100%);
      font-family:'Nunito',sans-serif;
      display:flex;flex-direction:column;align-items:center;
      overflow-x:hidden;
    }

    header{width:100%;text-align:center;padding:14px 16px 4px;}
    .emojis{font-size:20px;letter-spacing:6px;margin-bottom:3px;}
    header h1{
      font-family:'Fredoka One',cursive;
      font-size:clamp(15px,4.5vw,26px);
      /* Pink-to-blue gradient text */
      background:linear-gradient(90deg,#e05585 0%,#c06bb0 50%,#5b8fd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      line-height:1.2;
    }
    header h2{
      font-family:'Fredoka One',cursive;
      font-size:clamp(14px,4vw,22px);
      background:linear-gradient(90deg,#e05585 0%,#c06bb0 50%,#5b8fd4 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      font-weight:400;
      margin-top:1px;
    }
    .divider{
      width:80px;height:3px;
      background:linear-gradient(90deg,#f4a0c0,#a0b8f0);
      border-radius:2px;
      margin:7px auto;
    }

    #outer{position:relative;flex:0 0 auto;margin:0 auto;}

    .exit-arrow{
      position:absolute;font-size:clamp(11px,2vw,14px);
      pointer-events:none;z-index:30;line-height:1;
      /* alternate pink/blue by direction */
    }
    .exit-arrow.pink{color:#e088b0;}
    .exit-arrow.blue{color:#7aaae0;}

    #wrap{
      position:absolute;border-radius:12px;overflow:hidden;
      border:2.5px solid rgba(180,180,220,0.35);
      box-shadow:0 3px 20px rgba(100,80,180,0.12);
      /* Diagonal pink-to-blue tint overlay via pseudo */
    }
    /* Left half of board: pinkish card bg; right half: blueish */
    /* We'll handle this via JS per-piece coloring */

    #qr-layer{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      pointer-events:none;z-index:0;
    }
    #qr-img{
      width:70%;height:70%;object-fit:contain;border-radius:8px;
      filter:blur(12px);transition:filter 1.2s ease;
    }

    #grid-canvas{position:absolute;inset:0;pointer-events:none;z-index:1;}
    #board{position:absolute;inset:0;z-index:2;overflow:visible;}

    .piece{
      position:absolute;
      background-repeat:no-repeat;background-position:center center;
      background-size:contain;
      border-radius:11px;
      border:1.5px solid rgba(200,180,220,0.4);
      box-shadow:0 2px 8px rgba(120,80,160,0.15),0 1px 3px rgba(0,0,0,0.07);
      touch-action:none;cursor:grab;user-select:none;
    }
    /* Pink pieces (left cols 0-2) */
    .piece.pink-card{background-color:rgba(255,235,248,0.88);}
    /* Blue pieces (right cols 3-5) */
    .piece.blue-card{background-color:rgba(230,240,255,0.88);}
    .piece.mixed-card{background-color:rgba(242,237,255,0.88);}

    .piece.dragging{
      cursor:grabbing;
      box-shadow:0 8px 22px rgba(120,80,160,0.28),0 2px 8px rgba(0,0,0,0.1);
      z-index:200!important;
    }
    .piece.at-exit{
      border-color:rgba(180,100,200,0.8)!important;
      box-shadow:0 0 0 2px rgba(180,100,200,0.4),0 6px 18px rgba(120,80,160,0.3)!important;
    }

    #hint{
      font-size:clamp(10px,2.6vw,12px);color:#9060a0;
      text-align:center;padding:4px 10px;min-height:22px;
    }
    #hint.celebrate{
      font-weight:700;color:#c040a0;
      animation:pulse 0.9s ease infinite alternate;
    }
    @keyframes pulse{from{opacity:0.65}to{opacity:1}}

    .btn-row{
      display:flex;gap:8px;justify-content:center;
      padding:3px 10px 8px;flex-wrap:wrap;
    }
    .btn{
      font-family:'Nunito',sans-serif;font-size:clamp(10px,2.5vw,12px);font-weight:700;
      padding:6px 14px;border-radius:20px;border:none;cursor:pointer;
      text-decoration:none;display:inline-block;transition:opacity 0.15s;
      white-space:nowrap;
    }
    .btn:hover{opacity:0.82;}
    .btn-arcade{background:linear-gradient(90deg,#e05585,#7088e0);color:#fff;}
    .btn-coffee{background:#f0ebff;color:#8050b0;border:1px solid #c0a0e0;}

    footer{padding:6px 10px 10px;font-size:10px;color:#a090b8;text-align:center;}
    footer a{color:#8060b0;text-decoration:none;font-family:'Fredoka One',cursive;font-size:11px;}
  </style>
</head>

const DEFS = [{"id": "carriage", "row": 2, "col": 0, "len": 3, "dir": "h", "img": "carriage", "ex": "right", "et": 2}, {"id": "bottle_v", "row": 0, "col": 5, "len": 2, "dir": "v", "img": "bottle_v", "ex": "up", "et": 5}, {"id": "shoes", "row": 0, "col": 3, "len": 2, "dir": "h", "img": "shoes", "ex": "right", "et": 0}, {"id": "pacy_v", "row": 0, "col": 0, "len": 2, "dir": "v", "img": "pacy_v", "ex": "up", "et": 0}, {"id": "duck", "row": 1, "col": 3, "len": 2, "dir": "h", "img": "duck", "ex": "left", "et": 1}, {"id": "onesy", "row": 2, "col": 3, "len": 3, "dir": "v", "img": "onesy", "ex": "up", "et": 3}, {"id": "rattle_v", "row": 2, "col": 4, "len": 3, "dir": "v", "img": "rattle_v", "ex": "down", "et": 4}, {"id": "bottle_h", "row": 0, "col": 1, "len": 2, "dir": "h", "img": "bottle_h", "ex": "left", "et": 0}, {"id": "pacy_h", "row": 3, "col": 1, "len": 2, "dir": "h", "img": "pacy_h", "ex": "right", "et": 3}, {"id": "teddy", "row": 3, "col": 0, "len": 3, "dir": "v", "img": "teddy", "ex": "down", "et": 0}, {"id": "rattle_h", "row": 5, "col": 1, "len": 3, "dir": "h", "img": "rattle_h", "ex": "left", "et": 5}];
const GRID = 6;
const APAD = 18;

const outer     = document.getElementById('outer');
const arrowsCon = document.getElementById('arrows-container');
const wrap      = document.getElementById('wrap');
const board     = document.getElementById('board');
const qrImg     = document.getElementById('qr-img');
const hint      = document.getElementById('hint');
const gridCvs   = document.getElementById('grid-canvas');

let TILE = 0;
const pieces = DEFS.map(d => ({...d, removed:false, el:null}));

// Piece color: col 0-2 = pink, col 3-5 = blue, spans both = mixed
function pieceColorClass(p) {
  const maxCol = p.dir==='h' ? p.col+p.len-1 : p.col;
  const minCol = p.col;
  if(maxCol <= 2) return 'pink-card';
  if(minCol >= 3) return 'blue-card';
  return 'mixed-card';
}

function computeSize() {
  const headerH = document.querySelector('header').offsetHeight;
  const bottomH = 24+46+26+16;
  const avail = Math.min(window.innerWidth-APAD*2-12, window.innerHeight-headerH-bottomH-APAD*2);
  TILE = Math.max(40, Math.floor(avail/GRID));
  const px = TILE*GRID;
  const outerPx = px+APAD*2;
  outer.style.width  = outerPx+'px';
  outer.style.height = outerPx+'px';
  wrap.style.width   = px+'px';
  wrap.style.height  = px+'px';
  wrap.style.left    = APAD+'px';
  wrap.style.top     = APAD+'px';
  gridCvs.width = px; gridCvs.height = px;
  drawGrid(px);
  renderArrows(px);
}

function drawGrid(px) {
  const ctx = gridCvs.getContext('2d');
  ctx.clearRect(0,0,px,px);
  // Draw a subtle pink-to-blue diagonal background split
  const half = px/2;
  // Pink left zone
  const lgP = ctx.createLinearGradient(0,0,px*0.55,px);
  lgP.addColorStop(0,'rgba(255,210,235,0.25)');
  lgP.addColorStop(1,'rgba(255,210,235,0)');
  ctx.fillStyle=lgP; ctx.fillRect(0,0,px,px);
  // Blue right zone
  const lgB = ctx.createLinearGradient(px*0.45,0,px,px);
  lgB.addColorStop(0,'rgba(210,225,255,0)');
  lgB.addColorStop(1,'rgba(210,225,255,0.25)');
  ctx.fillStyle=lgB; ctx.fillRect(0,0,px,px);
  // Grid lines
  ctx.strokeStyle='rgba(160,140,200,0.1)';
  ctx.lineWidth=1;
  for(let i=1;i<GRID;i++){
    ctx.beginPath();ctx.moveTo(i*TILE,0);ctx.lineTo(i*TILE,px);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*TILE);ctx.lineTo(px,i*TILE);ctx.stroke();
  }
}

function renderArrows(px) {
  arrowsCon.innerHTML='';
  const active = new Set(pieces.filter(p=>!p.removed).map(p=>p.ex+'-'+p.et));
  function arrow(sym, cls, x, y, anchor){
    if(!active.has(anchor)) return;
    const d=document.createElement('div');
    d.className='exit-arrow '+cls;
    d.textContent=sym;
    d.style.position='absolute';
    if(x!==null)d.style.left=x+'px';
    if(y!==null)d.style.top=y+'px';
    if(x===null)d.style.right='0px';
    if(y===null)d.style.bottom='0px';
    arrowsCon.appendChild(d);
  }
  const AP=APAD;
  [0,2,3].forEach(r=>
    arrow('▶','blue',null,AP+r*TILE+TILE/2-8,'right-'+r));
  [0,1,5].forEach(r=>
    arrow('◀','pink',0,AP+r*TILE+TILE/2-8,'left-'+r));
  [0,3,5].forEach(c=>
    arrow('▲',c<3?'pink':'blue',AP+c*TILE+TILE/2-8,0,'up-'+c));
  [0,4].forEach(c=>
    arrow('▼',c<3?'pink':'blue',AP+c*TILE+TILE/2-8,null,'down-'+c));
}

function buildPieces(){
  board.innerHTML='';
  pieces.forEach(p=>{
    const div=document.createElement('div');
    div.className='piece '+pieceColorClass(p);
    div.dataset.id=p.id;
    div.style.backgroundImage=`url(${IMGS[p.img]})`;
    div.style.zIndex=10;
    board.appendChild(div);
    p.el=div;
    div.addEventListener('pointerdown',onDown);
  });
}

function place(){
  pieces.forEach(p=>{
    if(p.removed){p.el.style.display='none';return;}
    const w=p.dir==='h'?p.len*TILE:TILE;
    const h=p.dir==='v'?p.len*TILE:TILE;
    p.el.style.display='block';
    p.el.style.width=w+'px'; p.el.style.height=h+'px';
    p.el.style.left=p.col*TILE+'px'; p.el.style.top=p.row*TILE+'px';
  });
}

function occupancy(excId){
  const g=Array.from({length:GRID},()=>Array(GRID).fill(null));
  pieces.forEach(p=>{
    if(p.removed||p.id===excId)return;
    if(p.dir==='h')for(let c=p.col;c<p.col+p.len;c++){if(c>=0&&c<GRID)g[p.row][c]=p.id;}
    else for(let r=p.row;r<p.row+p.len;r++){if(r>=0&&r<GRID)g[r][p.col]=p.id;}
  });
  return g;
}

function getRange(p,occ){
  if(p.dir==='h'){
    let min=0,max=GRID-p.len;
    for(let c=p.col-1;c>=0;c--){if(occ[p.row][c]){min=c+1;break;}}
    for(let c=p.col+p.len;c<GRID;c++){if(occ[p.row][c]){max=c-p.len;break;}}
    if(p.ex==='left' &&p.et===p.row)min=-p.len;
    if(p.ex==='right'&&p.et===p.row)max=GRID;
    return[min,max];
  }else{
    let min=0,max=GRID-p.len;
    for(let r=p.row-1;r>=0;r--){if(occ[r][p.col]){min=r+1;break;}}
    for(let r=p.row+p.len;r<GRID;r++){if(occ[r][p.col]){max=r-p.len;break;}}
    if(p.ex==='up'  &&p.et===p.col)min=-p.len;
    if(p.ex==='down'&&p.et===p.col)max=GRID;
    return[min,max];
  }
}

let drag=null;
const getXY=e=>e.touches?[e.touches[0].clientX,e.touches[0].clientY]:[e.clientX,e.clientY];

function onDown(e){
  const p=pieces.find(x=>x.id===e.currentTarget.dataset.id);
  if(!p||p.removed)return;
  e.preventDefault();
  const[sx,sy]=getXY(e);
  drag={p,occ:occupancy(p.id),sx,sy,sr:p.row,sc:p.col};
  p.el.classList.add('dragging');
  p.el.style.zIndex=200;
}

function onMove(e){
  if(!drag)return;
  e.preventDefault();
  const[cx,cy]=getXY(e);
  const{p,occ,sx,sy,sr,sc}=drag;
  const[min,max]=getRange(p,occ);
  if(p.dir==='h'){
    const nc=Math.max(min,Math.min(max,sc+Math.round((cx-sx)/TILE)));
    if(nc!==p.col){p.col=nc;place();}
    p.el.classList.toggle('at-exit',(p.ex==='left'&&nc<=0)||(p.ex==='right'&&nc>=GRID-p.len));
  }else{
    const nr=Math.max(min,Math.min(max,sr+Math.round((cy-sy)/TILE)));
    if(nr!==p.row){p.row=nr;place();}
    p.el.classList.toggle('at-exit',(p.ex==='up'&&nr<=0)||(p.ex==='down'&&nr>=GRID-p.len));
  }
}

function onUp(){
  if(!drag)return;
  const{p}=drag;
  p.el.classList.remove('dragging','at-exit');
  p.el.style.zIndex=10;
  drag=null;
  if(p.dir==='h'){if(p.col+p.len<=0||p.col>=GRID)p.removed=true;}
  else{if(p.row+p.len<=0||p.row>=GRID)p.removed=true;}
  place();
  renderArrows(TILE*GRID);
  updateQR();
}

function updateQR(){
  const total=pieces.length,gone=pieces.filter(p=>p.removed).length,pct=gone/total;
  qrImg.style.filter=gone===total?'blur(0px)':'blur(12px)';
  if(gone===0)          hint.textContent="Slide each piece to its ▲▼◀▶ exit — pieces only leave their own way! 🍼";
  else if(pct<0.35)     hint.textContent="Nice! Something is hiding under there... 🧸";
  else if(pct<0.65)     hint.textContent="Halfway there! 👶 Keep going...";
  else if(gone<total)   hint.textContent="Almost! Just a few more pieces 🦆";
  else{hint.textContent="🎉 You found it! Scan the QR code for the surprise!";hint.classList.add('celebrate');}
}

document.addEventListener('DOMContentLoaded',()=>{
  computeSize(); buildPieces(); place();
  window.addEventListener('pointermove',onMove,{passive:false});
  window.addEventListener('pointerup',onUp);
  window.addEventListener('pointercancel',onUp);
  window.addEventListener('resize',()=>{computeSize();place();renderArrows(TILE*GRID);});
});
</script>
</body>
</html>
